<html lang="fr">

<style>
  :root{--green:#1a9e6e;--green-dark:#0f7a53;--green-light:#e6f7f1;--bg:#f4efe9;--text:#1a1f1c;--muted:#6b7672;--border:#dde5e0;--gold:#f5a623;--red:#e84040}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background-color:#f0ebe3;background-image:url(bg.jpg);background-repeat:repeat;background-size:1024px 571px;color:var(--text);min-height:100vh;padding:32px 20px 60px}
  .page{max-width:960px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
  .badge{display:inline-block;background:var(--green);color:white;font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:100px;margin-bottom:8px}
  /* h1 moved to additions */
  h1 span{color:var(--green)}
  .home-btn{background:white;color:var(--green);font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;border:1.5px solid var(--green);padding:10px 20px;border-radius:12px;cursor:pointer;text-decoration:none;transition:all .2s}
  .home-btn:hover{background:var(--green-light)}
  .top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
  .btn{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;border:none;padding:10px 20px;border-radius:12px;cursor:pointer;transition:all .2s}
  .btn-green{background:var(--green);color:white}
  .btn-green:hover{background:var(--green-dark)}
  .status-bar{background:white;border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:8px}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--green)}
  .status-dot.saving{background:var(--gold)}
  .status-dot.error{background:var(--red)}
  /* legend moved to additions */
  .legend-item{display:flex;align-items:center;gap:6px}
  .leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

  .day-card.today{border-color:#4285f4;box-shadow:0 0 0 2px rgba(66,133,244,.15)}
  .day-card.past{opacity:.5}
  .day-name{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
  .day-name.today-label{color:#4285f4}
  .slot{margin-bottom:8px}
  .slot:last-child{margin-bottom:0}
  .slot-label{font-size:.66rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px}
  .slot-person{border-radius:8px;padding:5px 9px;font-size:.82rem;font-weight:500;min-height:30px;display:flex;align-items:center;justify-content:space-between}
  .slot-person.official{background:var(--green-light);color:var(--green-dark);border:1px solid var(--border)}
  .slot-person.pending{background:#fff3cd;color:#7a5000;border:1px solid var(--gold)}
  .slot-btns{display:flex;gap:3px;margin-top:4px}
  .slot-btn{background:white;border:1px solid var(--border);border-radius:6px;padding:3px 0;font-size:.72rem;cursor:pointer;color:var(--muted);transition:all .15s;flex:1;text-align:center}
  .slot-btn:hover:not(:disabled){border-color:var(--green);color:var(--green);background:var(--green-light)}
  .slot-btn.ok:hover:not(:disabled){border-color:var(--green-dark);background:var(--green);color:white}
  .slot-btn.no:hover:not(:disabled){border-color:var(--red);color:var(--red);background:#fdeaea}
  .slot-btn.next:hover:not(:disabled){border-color:var(--gold);color:var(--gold);background:#fff3cd}
  .slot-btn:disabled{opacity:.3;cursor:default}
  .loading{text-align:center;padding:60px;color:var(--muted)}

  @media print {
    body{padding:10px;background:white}
    .home-btn,.top-actions,.status-bar,/* legend moved to additions */
    .week-block{page-break-inside:avoid;margin-bottom:16px}
    .days-grid{grid-template-columns:repeat(6,1fr)!important;gap:6px}
    .day-card{border:1px solid #ccc;border-radius:6px;padding:8px;box-shadow:none}
    .day-card.past{opacity:.7}
    .slot-person{padding:3px 6px;font-size:.75rem}
    .slot-label{font-size:.6rem}
    .slot-btns{display:none!important}
    h1{font-size:1.4rem;margin-bottom:8px}
    /* week-title moved to additions */
    .day-name{font-size:.72rem;margin-bottom:6px}
    @page{margin:1.5cm;size:A4 landscape}
  }

  /* Background sur textes pour lisibilité */
  .week-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;margin-bottom:12px;padding:6px 14px;border-bottom:2px solid var(--border);background:rgba(255,255,255,0.88);border-radius:10px 10px 0 0;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;font-size:.82rem;color:var(--muted);background:rgba(255,255,255,0.85);border-radius:12px;padding:10px 16px;}
  h1{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;background:rgba(255,255,255,0.88);border-radius:12px;padding:6px 16px;display:inline-block;}

  /* Jour fermé */
  .day-card.closed{opacity:.6;background:#f5f5f5;}
  .day-closed-label{text-align:center;padding:10px 4px;font-size:.78rem;color:var(--muted);font-weight:600;letter-spacing:.04em;}

  /* Bouton toggle fermeture */
  .btn-close{background:none;border:1px solid var(--border);border-radius:6px;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;cursor:pointer;color:var(--muted);transition:all .15s;margin-left:4px;vertical-align:middle;line-height:1;padding:0;}
  .btn-close:hover{border-color:var(--red);color:var(--red);background:#fdeaea;}
  .btn-close.is-closed{border-color:var(--green);color:var(--green);background:var(--green-light);}


  .slot-select{width:100%;margin-top:5px;padding:4px 6px;border:1.5px solid var(--gold);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--text);background:#fffdf7;cursor:pointer;outline:none;}
  .slot-select:focus{border-color:var(--green);}
  .readonly-hidden { display: none !important; }
</style>

<div class="page">
  <header>

    <button class="btn btn-green" onclick="regenerate()">🔄 Régénérer</button>

      <select id="nb-weeks-select" onchange="changeNbWeeks(this.value)" style="border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;">

        <option value="4" selected>4</option><option value="5">5</option><option value="6">6</option>

    <div class="legend-item"><div class="leg-dot leg-pending"></div>En attente de validation</div>

<script>
const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/69e935c1856a68218960ce08';
const JSONBIN_KEY = '$2a$10$ZdHcrjLMrlKst6zsRu4G3u4Y6rxldjKwXWoCf8Pkp6MT9mI5E915m';

const PEOPLE = ['Anthony','Cha R','Cha M','Georges','Nicolas','Anaïs A','Anaïs B','Ines','Cynthia','Clémentine','Marina B','Fabienne','Nathalie']
const IS_EDIT = new URLSearchParams(window.location.search).get('mode') === 'edit';

// ── Disponibilités EDT ──
let availability = {}; // { "Prénom": { "YYYY-MM-DD": { am: bool, pm: bool } } }

async function loadAvailability() {
  try {
    const r = await fetch('availability.json');
    if (!r.ok) throw new Error();
    const data = await r.json();
    availability = data.availability || {};
  } catch(e) {
    availability = {};
    console.warn('availability.json non chargé — aucun filtrage EDT appliqué');
  }
}

function isAvailable(person, date, slot) {
  // Pas de données pour cette personne ou cette date → considéré disponible
  if (!availability[person]) return true;
  if (!availability[person][date]) return true;
  return availability[person][date][slot] === true;
}

// ── Read-only mode ──
if (!IS_EDIT) {
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('readonly-banner').style.display = 'block';
    // Hide all edit buttons
    document.querySelectorAll('.btn-gen, .btn-validate, .btn-cancel, .btn-print, .btn-close').forEach(el => {
      el.style.display = 'none';
    });
    // Also hide the global action buttons row
    const actionBar = document.querySelector('.action-bar');
    if (actionBar) actionBar.style.display = 'none';
  });
}
;
const SLOTS = ['am','pm'];
const SLOT_LABELS = {am:'Matin', pm:'Après-midi'};
const DAY_SHORT = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

// SOURCE DE VÉRITÉ : officialData = ce qui est dans JSONBin
// pendingData = copie de travail avec les propositions non validées
// pendingSlots = Set des clés "date_slot" avec une proposition en attente
let officialData = null;
let pendingData  = null;
let pendingSlots = new Set();
let closedDays = new Set(); // dates 'YYYY-MM-DD' fermées
let nbWeeks = 4; // nombre de semaines affichées, sauvegardé dans JSONBin
let absences = []; // [{ person, from, to }] — chargées depuis JSONBin
let indisponibilites = []; // [{ person, day, slot, recur }] — chargées depuis JSONBin

function weekNumber(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  const ys = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - ys) / 86400000) + 1) / 7);
}

function isAbsent(person, date) {
  return absences.some(a => a.person === person && date >= a.from && date <= a.to);
}

function isUnavailable(person, date, slot) {
  const d = new Date(date + 'T00:00:00');
  const dow = d.getDay() || 7; // 1=lundi … 6=samedi
  const wn  = weekNumber(date);
  return indisponibilites.some(i => {
    if (i.person !== person) return false;
    if (i.day !== dow) return false;
    if (i.slot !== slot) return false;
    if (i.recur === 'weekly') return true;
    if (i.recur === 'even')   return wn % 2 === 0;
    if (i.recur === 'odd')    return wn % 2 !== 0;
    return false;
  });
}

// ── Dates ──
function localStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayStr() { return localStr(new Date()); }
function getMonday() {
  const d = new Date(), day = d.getDay()||7;
  d.setDate(d.getDate()-day+1); d.setHours(0,0,0,0); return d;
}
function getNWeeks() {
  const mon = getMonday(), out = [];
  for (let w=0; w<nbWeeks; w++)
    for (let dd=0; dd<6; dd++) {
      const dt = new Date(mon); dt.setDate(dt.getDate()+w*7+dd);
      out.push(localStr(dt));
    }
  return out;
}
// Alias pour compatibilité avec le reste du code
function get4Weeks() { return getNWeeks(); }
function weekKey(dateStr) {
  const d = new Date(dateStr+'T00:00:00'), day = d.getDay()||7;
  d.setDate(d.getDate()+4-day);
  const ys = new Date(d.getFullYear(),0,1);
  const w = Math.ceil((((d-ys)/86400000)+1)/7);
  return d.getFullYear()+'-W'+String(w).padStart(2,'0');
}

// ── Algorithm ──
function lastPassage(person, date, history, planning) {
  // Cherche la date la plus récente (< date) où la personne est assignée,
  // dans l'historique JSONBin ET dans le planning en cours de génération.
  let latest = null;
  // Depuis l'historique
  history.forEach(h => {
    if (h.person === person && h.date < date) {
      if (!latest || h.date > latest) latest = h.date;
    }
  });
  // Depuis le planning pendingData (créneaux déjà calculés avant cette date)
  if (planning) {
    Object.entries(planning).forEach(([d, slots]) => {
      if (d >= date) return;
      if (slots.am === person || slots.pm === person) {
        if (!latest || d > latest) latest = d;
      }
    });
  }
  return latest;
}

function weight(person, date, history, dispense, wa, slot, planning) {
  // Personne absente sur ce créneau selon l'EDT → poids quasi nul
  if (slot && !isAvailable(person, date, slot)) return 0.001;
  // Personne en congés/absence → poids quasi nul
  if (isAbsent(person, date)) return 0.001;
  // Personne en indisponibilité récurrente sur ce créneau → poids quasi nul
  if (slot && isUnavailable(person, date, slot)) return 0.001;
  const last = lastPassage(person, date, history, planning);
  let ds = last
    ? Math.max(0, Math.round((new Date(date+'T00:00:00') - new Date(last+'T00:00:00')) / 86400000))
    : 999;
  let w = ds;
  const wk = weekKey(date);
  if (wa[wk]?.[person]) w *= 0.05;
  if (dispense?.person===person && dispense?.week===wk) w *= 0.01;
  return Math.max(w, 0.001);
}
function pick(people, weights) {
  const total = weights.reduce((s,w)=>s+w,0);
  let r = Math.random()*total;
  for (let i=0; i<people.length; i++) { r-=weights[i]; if(r<=0) return people[i]; }
  return people[people.length-1];
}
function generate(data) {
  const planning = data?.planning || {};
  const history  = data?.history  || [];
  const dispense = data?.champion_dispense || {person:null,week:null};
  const dates    = get4Weeks();
  const wa       = {};

  // Count existing assignments for week-constraint
  dates.forEach(date => {
    const wk = weekKey(date);
    if (!wa[wk]) wa[wk]={};
    if (planning[date]) SLOTS.forEach(s => { const p=planning[date][s]; if(p) wa[wk][p]=(wa[wk][p]||0)+1; });
  });

  // Fill missing
  dates.forEach(date => {
    const wk = weekKey(date);
    if (!wa[wk]) wa[wk]={};
    if (!planning[date]) planning[date]={am:null,pm:null};
    SLOTS.forEach(slot => {
      if (!planning[date][slot]) {
        const weights = PEOPLE.map(p=>weight(p,date,history,dispense,wa,slot,planning));
        const chosen  = pick(PEOPLE, weights);
        planning[date][slot] = chosen;
        wa[wk][chosen] = (wa[wk][chosen]||0)+1;
        history.push({person:chosen,date,slot});
      }
    });
  });
  return {planning, history, champion_dispense:dispense};
}

// Recalculate non-pending slots after fromDate/fromSlot
function recalcAfter(fromDate, fromSlot) {
  const all = [];
  get4Weeks().forEach(d => SLOTS.forEach(s => all.push({date:d,slot:s})));
  let si = 0;
  for (let i=0; i<all.length; i++) {
    if (all[i].date===fromDate && all[i].slot===fromSlot) { si=i+1; break; }
  }
  const wa={};
  for (let i=0; i<si; i++) {
    const {date,slot}=all[i], p=pendingData.planning[date]?.[slot], wk=weekKey(date);
    if (!wa[wk]) wa[wk]={};
    if (p) wa[wk][p]=(wa[wk][p]||0)+1;
  }
  const hist = pendingData.history.filter(h => {
    const idx=all.findIndex(s=>s.date===h.date&&s.slot===h.slot);
    return idx<si;
  });
  const dispense = pendingData.champion_dispense||{person:null,week:null};
  for (let i=si; i<all.length; i++) {
    const {date,slot}=all[i], wk=weekKey(date);
    if (!wa[wk]) wa[wk]={};
    if (!pendingData.planning[date]) pendingData.planning[date]={am:null,pm:null};
    if (!pendingSlots.has(date+'_'+slot)) {
      const weights=PEOPLE.map(p=>weight(p,date,hist,dispense,wa,slot,pendingData.planning));
      const chosen=pick(PEOPLE,weights);
      pendingData.planning[date][slot]=chosen;
      hist.push({person:chosen,date,slot});
    }
    const p=pendingData.planning[date][slot];
    if(p) wa[wk][p]=(wa[wk][p]||0)+1;
  }
  pendingData.history=hist;
}

// ── API ──
function setStatus(state, txt) {
  document.getElementById('sdot').className='status-dot '+state;
  document.getElementById('stxt').textContent=txt;
}
async function load() {
  setStatus('saving','Chargement…');
  try {
    const r = await fetch(JSONBIN_URL+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
    if (!r.ok) throw new Error();
    const d = await r.json();
    officialData = d.record || {planning:{},history:[],champion_dispense:{person:null,week:null}};
    // Lire les absences
    absences = (officialData.absences || []).filter(a => a.to >= todayStr());
    // Lire les indisponibilités récurrentes
    indisponibilites = officialData.indisponibilites || [];
    // Lire le nombre de semaines configuré
    if (officialData.nb_weeks) {
      nbWeeks = officialData.nb_weeks;
    }
    // Liens vers pages annexes : transmettre le mode edit si applicable
    const absBtn = document.getElementById('absences-btn');
    if (absBtn && IS_EDIT) absBtn.href = 'absences.html?mode=edit';
    const indispBtn = document.getElementById('indisp-btn');
    if (indispBtn && IS_EDIT) indispBtn.href = 'indisponibilites.html?mode=edit';
    // Afficher le sélecteur uniquement en mode édition
    if (IS_EDIT) {
      const sel = document.getElementById('weeks-selector');
      if (sel) sel.style.display = 'flex';
      const nbSel = document.getElementById('nb-weeks-select');
      if (nbSel) nbSel.value = nbWeeks;
    }
    setStatus('','Planning chargé');
    return true;
  } catch(e) { setStatus('error','Erreur de chargement'); return false; }
}
function syncClosedDays() {
  // store in officialData so it persists
  officialData.closedDays = [...closedDays];
}
async function save() {
  syncClosedDays();
  setStatus('saving','Sauvegarde…');
  try {
    await fetch(JSONBIN_URL,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
      body:JSON.stringify(officialData)
    });
    setStatus('','Sauvegardé ✓');
  } catch(e) { setStatus('error','Erreur de sauvegarde'); }
}

function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

// ── Sélecteur nb semaines ──
async function changeNbWeeks(val) {
  nbWeeks = parseInt(val) || 4;
  officialData.nb_weeks = nbWeeks;
  await save();
  renderPlanning();
}

// ── Actions ──

function toggleClose(date) {
  if (closedDays.has(date)) {
    // Réactiver : remettre les personnes officielles
    closedDays.delete(date);
    // Restore from officialData or regenerate
    if (!pendingData.planning[date] || !pendingData.planning[date].am) {
      // Regenerate this single day
      const wk = weekKey(date);
      const wa = {};
      get4Weeks().forEach(d => {
        if (d !== date && pendingData.planning[d]) {
          SLOTS.forEach(s => { const p=pendingData.planning[d][s]; if(p) wa[p]=(wa[p]||0)+1; });
        }
      });
      const disp = pendingData.champion_dispense||{person:null,week:null};
      SLOTS.forEach(slot => {
        const weights = PEOPLE.map(p => weight(p, date, pendingData.history, disp, {[wk]:wa}, slot, pendingData.planning));
        pendingData.planning[date][slot] = pick(PEOPLE, weights);
        pendingData.planning[date][slot+'_modified'] = false;
      });
    }
  } else {
    closedDays.add(date);
    // Clear pending for this day
    pendingSlots.delete(date+'_am');
    pendingSlots.delete(date+'_pm');
  }
  officialData = clone(pendingData);
  closedDays.forEach(d => { if(officialData.planning[d]) { officialData.planning[d].am=null; officialData.planning[d].pm=null; } });
  officialData.closedDays = [...closedDays];
  save();
  renderPlanning();
}

// Propose: change slot in pendingData, recalc downstream, do NOT save
function propose(date, slot) {
  const cur = pendingData.planning[date][slot];
  const cands = PEOPLE.filter(p=>p!==cur);
  const wk = weekKey(date);
  const wa = {[wk]:{}};
  SLOTS.forEach(s=>{ if(s!==slot&&pendingData.planning[date]?.[s]){const p=pendingData.planning[date][s];wa[wk][p]=(wa[wk][p]||0)+1;} });
  const dispense=pendingData.champion_dispense||{person:null,week:null};
  const weights=cands.map(p=>weight(p,date,pendingData.history,dispense,wa,slot,pendingData.planning));
  const chosen=pick(cands,weights);
  pendingData.planning[date][slot]=chosen;
  pendingSlots.add(date+'_'+slot);
  recalcAfter(date,slot);
  renderPlanning();
}


function handleManualPick(date, slot, selectEl) {
  const val = selectEl.value;
  if (val === '__autre__') {
    const name = prompt('Nom du remplaçant :');
    if (name && name.trim()) {
      manualPick(date, slot, name.trim());
    } else {
      // Annulé — remettre la valeur précédente
      selectEl.value = pendingData.planning[date][slot] || PEOPLE[0];
    }
    return;
  }
  manualPick(date, slot, val);
}

function manualPick(date, slot, person) {
  if (!person) return;
  pendingData.planning[date][slot] = person;
  pendingSlots.add(date + '_' + slot);
  recalcAfter(date, slot);
  renderPlanning();
}

// Validate: promote pendingData to official, save, clear pending for this slot
async function validate(date, slot) {
  officialData = clone(pendingData);
  officialData.closedDays = [...closedDays]; // préserver les jours fermés
  pendingSlots.delete(date+'_'+slot);
  await save();
  renderPlanning();
}

// Cancel: discard all pending changes, revert pendingData to official
function cancel() {
  pendingData  = clone(officialData);
  pendingSlots = new Set();
  // Ne pas réinitialiser closedDays depuis officialData — on garde l'état courant
  closedDays   = new Set(officialData.closedDays || []);
  renderPlanning();
}

// ── Render ──
function renderPlanning() {
  const today = todayStr();
  const dates = get4Weeks();
  const el    = document.getElementById('planning-content');
  el.innerHTML='';

  for (let w=0; w<nbWeeks; w++) {
    const wd = dates.slice(w*6, w*6+6);
    const d0 = new Date(wd[0]+'T00:00:00'), d5=new Date(wd[5]+'T00:00:00');
    const lbl = d0.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})+' – '+d5.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
    const isoW = weekKey(wd[0]).split('-W')[1];
    const blk = document.createElement('div'); blk.className='week-block';
    blk.innerHTML=`<div class="week-title">Semaine ${isoW} <span>${lbl}</span></div><div class="days-grid" id="wg-${w}"></div>`;
    el.appendChild(blk);

    const grid=document.getElementById('wg-'+w);
    wd.forEach(date=>{
      const dt=new Date(date+'T00:00:00');
      const isPast=date<today, isToday=date===today;
      const dd=pendingData.planning[date]||{am:null,pm:null};
      const card=document.createElement('div');
      card.className='day-card'+(isToday?' today':'')+(isPast?' past':'');

      const isClosed = closedDays.has(date);
      if (isClosed) card.classList.add('closed');

      let html=`<div class="day-name${isToday?' today-label':''}">${DAY_SHORT[dt.getDay()]} ${dt.getDate()}${(!isPast && IS_EDIT) ? `<button class="btn-close${isClosed?' is-closed':''}" onclick="toggleClose('${date}')" title="${isClosed?'Réactiver':'Fermer'}"> ${isClosed?'✓':'✕'} </button>` : ''}</div>`;

      if (isClosed) {
        html += '<div class="day-closed-label">🔒 Fermé</div>';
        card.innerHTML = html;
        grid.appendChild(card);
        return;
      }

      SLOTS.forEach(slot=>{
        const person=dd[slot]||'—';
        const isPend=pendingSlots.has(date+'_'+slot);
        const cls=isPend?'pending':'official';
        const isGuest = person !== '—' && !PEOPLE.includes(person);
        const personDisplay = isGuest ? `<em>${person}</em>` : person;
        const selectOptions = PEOPLE.map(p =>
          `<option value="${p}" ${p===person?'selected':''}>${p}</option>`
        ).join('') + `<option value="__autre__">Autre…</option>`;
        html+=`<div class="slot">
          <div class="slot-label">${SLOT_LABELS[slot]}</div>
          <div class="slot-person ${cls}">${personDisplay}${isPend?' ⏳':''}</div>
          ${isPend && !isPast ? `<select class="slot-select" onchange="handleManualPick('${date}','${slot}',this)">${selectOptions}</select>` : ''}
          <div class="slot-btns">`;
        if (!isPast && IS_EDIT) {
          if (isPend) {
            html+=`<button class="slot-btn ok" onclick="validate('${date}','${slot}')" title="Valider">✓</button>
                   <button class="slot-btn no" onclick="cancel()"                     title="Annuler">✗</button>`;
          }
          html+=`<button class="slot-btn next" onclick="propose('${date}','${slot}')" title="Proposer →">→</button>`;
        }
        html+=`</div></div>`;
      });
      card.innerHTML=html;
      grid.appendChild(card);
    });
  }
}

// ── Regenerate ──
async function regenerate() {
  if (!confirm('Régénérer le planning ? Les affectations actuelles seront effacées.')) return;
  const savedClosed = [...closedDays]; // préserver les jours fermés
  officialData = generate({champion_dispense: officialData?.champion_dispense||{person:null,week:null}});
  officialData.closedDays = savedClosed;
  // Effacer les créneaux des jours fermés dans le nouveau planning
  closedDays.forEach(d => {
    if (officialData.planning[d]) { officialData.planning[d].am=null; officialData.planning[d].pm=null; }
  });
  await save();
  pendingData  = clone(officialData);
  pendingSlots = new Set();
  renderPlanning();
}

// ── Init ──
async function init() {
  // ── Point C : parallélisation des deux fetches indépendants ──
  const [, ok] = await Promise.all([loadAvailability(), load()]);
  if (!ok) return;
  const dates  = get4Weeks();
  const needsGen = dates.some(d=>!officialData.planning?.[d]);
  if (needsGen) {
    officialData = generate(officialData);
    await save();
  }
  pendingData  = clone(officialData);
  pendingSlots = new Set();
  closedDays   = new Set(officialData.closedDays || []);
  renderPlanning();
}

init();
</script>
