<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Vaccination Jeunes Enfants – Facile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--green:#1a9e6e;--green-dark:#0f7a53;--green-light:#e6f7f1;--red:#e84040;--red-light:#fdeaea;--bg:#f4f6f3;--text:#1a1f1c;--muted:#6b7672;--border:#dde5e0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
  .screen{display:none;width:100%;max-width:680px}
  .screen.active{display:flex;flex-direction:column;align-items:center}
  #screen-intro{text-align:center;gap:20px}
  .badge{display:inline-block;background:var(--green);color:white;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:8px}
  #screen-intro h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,6vw,3rem);font-weight:800;line-height:1.1}
  #screen-intro h1 span{color:var(--green)}
  #screen-intro p{color:var(--muted);font-size:1rem;max-width:460px}
  .intro-stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .stat-pill{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 22px;text-align:center;min-width:100px}
  .stat-pill strong{display:block;font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--green)}
  .stat-pill span{font-size:.82rem;color:var(--muted)}
  .btn-start{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;border:none;padding:18px 48px;border-radius:14px;cursor:pointer;transition:background .2s,transform .15s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .btn-start:hover{background:var(--green-dark);transform:translateY(-2px)}
  #screen-quiz{gap:20px}
  .progress-row{width:100%;display:flex;align-items:center;gap:12px}
  .progress-bar-track{flex:1;height:6px;background:var(--border);border-radius:100px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--green);border-radius:100px;transition:width .4s ease;width:0%}
  .progress-label{font-size:.82rem;color:var(--muted);white-space:nowrap;font-weight:500}
  .score-badge{background:var(--green-light);color:var(--green-dark);font-size:.82rem;font-weight:500;padding:5px 12px;border-radius:100px;white-space:nowrap}
  .question-card{background:white;border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06);animation:fadeIn .3s ease}
  .q-meta{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .q-meta em{background:var(--green-light);color:var(--green-dark);padding:2px 8px;border-radius:6px;font-style:normal;margin-left:6px}
  .question-text{font-family:'Syne',sans-serif;font-size:clamp(1.05rem,2.5vw,1.22rem);font-weight:700;line-height:1.4;margin-bottom:24px}
  .options-grid{display:flex;flex-direction:column;gap:10px}
  .option-btn{width:100%;text-align:left;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:.95rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;line-height:1.4}
  .option-btn .opt-letter{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:white;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;color:var(--muted);transition:all .18s}
  .option-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-light)}
  .option-btn:hover:not(:disabled) .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn:disabled{cursor:default}
  .option-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:500}
  .option-btn.correct .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
  .option-btn.wrong .opt-letter{background:var(--red);border-color:var(--red);color:white}
  .option-btn.dimmed{opacity:.45}
  .feedback-box{margin-top:20px;padding:18px 20px;border-radius:12px;font-size:.9rem;line-height:1.6;display:none;animation:fadeIn .3s ease}
  .feedback-box.show{display:block}
  .feedback-box.correct-fb{background:var(--green-light);border-left:4px solid var(--green);color:#0f5c3c}
  .feedback-box.wrong-fb{background:var(--red-light);border-left:4px solid var(--red);color:#8c1a1a}
  .feedback-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:5px}
  .next-btn{width:100%;background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px;border-radius:12px;cursor:pointer;transition:background .2s;display:none}
  .next-btn.show{display:block}
  .next-btn:hover{background:var(--green-dark)}
  #screen-results{text-align:center;gap:24px}
  .result-circle{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--green) 0%,var(--green) var(--pct),var(--border) var(--pct));display:flex;align-items:center;justify-content:center;position:relative}
  .result-circle::before{content:'';position:absolute;width:110px;height:110px;border-radius:50%;background:white}
  .result-inner{position:relative;z-index:1;text-align:center}
  .result-score{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--green);line-height:1}
  .result-total{font-size:.8rem;color:var(--muted)}
  #screen-results h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800}
  #screen-results .result-msg{color:var(--muted);max-width:420px;font-size:.95rem;line-height:1.6}
  .review-list{width:100%;display:flex;flex-direction:column;gap:10px;text-align:left}
  .review-item{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:.88rem;display:flex;gap:12px;align-items:flex-start;line-height:1.5}
  .review-icon{flex-shrink:0;font-size:1rem;margin-top:1px}
  .review-q{font-weight:500;color:var(--text)}
  .review-ans{color:var(--muted);margin-top:2px}
  .review-ans strong{color:var(--green-dark)}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .retry-btn{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px 40px;border-radius:14px;cursor:pointer;transition:background .2s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .retry-btn:hover{background:var(--green-dark)}
  .home-btn{background:white;color:var(--green);font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;border:1.5px solid var(--green);padding:12px 28px;border-radius:14px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .home-btn:hover{background:var(--green-light)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="screen-intro" class="screen active">
  <div><div class="badge">Formation Officine</div>
  <h1>Vaccination<br><span>Jeunes Enfants – Facile</span></h1></div>
  <p>Les fondamentaux du calendrier vaccinal 0-6 ans : vaccins obligatoires, types de vaccins, notions de base.</p>
  <div class="intro-stats">
    <div class="stat-pill"><strong>12</strong><span>questions</span></div>
    <div class="stat-pill"><strong>QCM</strong><span>format</span></div>
    <div class="stat-pill"><strong>~5 min</strong><span>durée</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Commencer →</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="progress-row">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label">1 / 12</span>
    <span class="score-badge" id="score-display">Score : 0</span>
  </div>
  <div class="question-card">
    <div class="q-meta">Question <span id="q-num">1</span> <em id="q-theme"></em></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="fb-title"></div>
      <div id="fb-body"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
</div>

<div id="screen-results" class="screen">
  <div class="result-circle" id="result-circle">
    <div class="result-inner">
      <div class="result-score" id="res-score">0/12</div>
      <div class="result-total" id="res-pct">0%</div>
    </div>
  </div>
  <h2 id="res-title"></h2>
  <p class="result-msg" id="res-msg"></p>
  <div class="review-list" id="review-list"></div>
  <div class="btn-row">
    <button class="retry-btn" onclick="restartQuiz()">🔄 Recommencer</button>
    <a class="home-btn" href="home.html">← Accueil</a>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    theme:"Généralités",
    text:"Pourquoi commence-t-on la vaccination dès l'âge de 2 mois ?",
    options:["Le système immunitaire est mature à 2 mois et répond mieux aux vaccins","Les anticorps maternels transmis à la naissance disparaissent progressivement, laissant le nourrisson vulnérable","Les vaccins sont contre-indiqués avant 2 mois en raison de la fragilité du nouveau-né","La HAS a fixé cet âge arbitrairement pour simplifier le calendrier"],
    correct:1,
    explanation:"Les <strong>anticorps maternels</strong> transmis pendant la grossesse protègent le nourrisson les premières semaines, mais disparaissent progressivement. À 2 mois, cette protection naturelle s'amenuise et le nourrisson devient vulnérable aux infections graves. C'est pourquoi la primovaccination débute à cet âge, avant l'exposition au risque en collectivité."
  },
  {
    theme:"Types de vaccins",
    text:"Quels sont les deux grands types de vaccins selon leur composition ?",
    options:["Vaccins injectables et vaccins oraux","Vaccins vivants atténués et vaccins inactivés","Vaccins monovalents et vaccins polyvalents","Vaccins obligatoires et vaccins recommandés"],
    correct:1,
    explanation:"Les <strong>vaccins vivants atténués</strong> contiennent des micro-organismes vivants mais affaiblis (ROR, rotavirus, BCG) : ils induisent une immunité forte mais sont contre-indiqués chez les immunodéprimés et les femmes enceintes. Les <strong>vaccins inactivés</strong> contiennent des micro-organismes tués ou des fragments (hexavalent, pneumocoque, méningocoque) : plus sûrs, mais nécessitent plusieurs doses et des rappels."
  },
  {
    theme:"Hexavalent",
    text:"Quelles maladies sont couvertes par le vaccin hexavalent ?",
    options:["Diphtérie, tétanos, polio, coqueluche, Haemophilus influenzae b, hépatite B","Diphtérie, tétanos, polio, coqueluche, rougeole, rubéole","Diphtérie, tétanos, polio, méningocoque B, Haemophilus influenzae b, hépatite B","Diphtérie, tétanos, polio, coqueluche, pneumocoque, hépatite B"],
    correct:0,
    explanation:"L'hexavalent (Infanrix Hexa®, Hexyon®, Vaxelis®) couvre <strong>6 maladies</strong> : diphtérie (D), tétanos (T), coqueluche acellulaire (Ca), poliomyélite (Polio), Haemophilus influenzae b (Hib) et hépatite B (HBV). C'est le vaccin central de la primovaccination, administré à 2, 4 et 11 mois."
  },
  {
    theme:"Primovaccination vs rappel",
    text:"Qu'est-ce qu'une primovaccination et en quoi diffère-t-elle d'un rappel ?",
    options:["La primovaccination est la première dose uniquement ; le rappel désigne toutes les doses suivantes","La primovaccination est le schéma de base qui crée l'immunité initiale ; le rappel entretient et renforce cette immunité dans le temps","La primovaccination concerne les vaccins obligatoires ; le rappel concerne les vaccins recommandés","Il n'y a pas de différence fonctionnelle, c'est uniquement une question de terminologie"],
    correct:1,
    explanation:"La <strong>primovaccination</strong> est le schéma initial qui construit une réponse immunitaire protectrice (ex : 2 doses d'hexavalent à 2 et 4 mois). Le <strong>rappel</strong> est une dose administrée ultérieurement pour entretenir et renforcer cette immunité qui tend à diminuer avec le temps (ex : rappel hexavalent à 11 mois, puis DTCaP à 6 ans). Certains vaccins nécessitent plusieurs doses en primovaccination pour atteindre un niveau de protection suffisant."
  },
  {
    theme:"Voie d'administration",
    text:"Parmi les vaccins du nourrisson, lequel est administré par voie orale et non par injection ?",
    options:["Le vaccin contre la coqueluche","Le vaccin contre le rotavirus","Le vaccin contre le pneumocoque","Le vaccin ROR"],
    correct:1,
    explanation:"Le vaccin contre le <strong>rotavirus</strong> (Rotarix® et RotaTeq®) est le seul vaccin du calendrier nourrisson administré <strong>par voie orale</strong> (buvable). Tous les autres vaccins du calendrier sont administrés par injection intramusculaire ou sous-cutanée. C'est un point pratique important à expliquer aux parents."
  },
  {
    theme:"Vaccins obligatoires",
    text:"Pour quelles maladies la vaccination est-elle obligatoire pour les enfants nés après le 1er janvier 2018 (calendrier 2025 inclus) ?",
    options:["Diphtérie, tétanos, poliomyélite uniquement (3 vaccins)","11 vaccins depuis 2018, incluant méningocoque C, ROR, pneumocoque, hépatite B, Hib, coqueluche","13 vaccins depuis 2025 : les 11 vaccins initiaux, avec remplacement du méningocoque C par ACWY et ajout du méningocoque B","Tous les vaccins du calendrier vaccinal sont obligatoires"],
    correct:2,
    explanation:"Depuis 2018 : <strong>11 vaccins obligatoires</strong>. Depuis le <strong>1er janvier 2025</strong> : le méningocoque C est <strong>remplacé</strong> par les méningocoques <strong>ACWY</strong>, et le méningocoque <strong>B</strong> devient également obligatoire, portant le total à <strong>13 vaccins</strong>. Les nourrissons ayant reçu une dose de méningocoque C avant 2025 doivent recevoir une dose ACWY à 12 mois en complément, pour couvrir les sérogroupes W et Y."
  },
  {
    theme:"Rotavirus",
    text:"Quel vaccin est recommandé (non obligatoire) contre une gastro-entérite sévère du nourrisson ?",
    options:["Le vaccin pneumocoque","Le vaccin contre le rotavirus","Le vaccin Haemophilus influenzae b","Le vaccin méningocoque B"],
    correct:1,
    explanation:"Le vaccin contre le <strong>rotavirus</strong> (Rotarix® ou RotaTeq®) est recommandé pour prévenir les gastro-entérites sévères à rotavirus, principale cause d'hospitalisation pour diarrhée chez le nourrisson. Il est administré par voie orale. Bien que non obligatoire, il est remboursé et fortement recommandé."
  },
  {
    theme:"Méningocoques",
    text:"Depuis janvier 2025, que remplace le vaccin contre les méningocoques ACWY dans le calendrier vaccinal du nourrisson ?",
    options:["Il s'ajoute au vaccin méningocoque C sans le remplacer","Il remplace le vaccin méningocoque C — les nourrissons ne font donc pas les deux","Il remplace le vaccin méningocoque B","Il remplace le vaccin pneumocoque pour les moins de 2 ans"],
    correct:1,
    explanation:"Depuis le 1er janvier 2025, le vaccin contre les méningocoques <strong>ACWY remplace le vaccin méningocoque C seul</strong>. Les nourrissons reçoivent directement ACWY (à 6 mois + rappel à 12 mois), sans recevoir le méningocoque C en plus. Le méningocoque B (Bexsero®) devient simultanément obligatoire (3, 5 et 12 mois). Un rattrapage transitoire est recommandé jusqu'à 4 ans révolus pour les enfants non encore vaccinés contre ACWY et B."
  },
  {
    theme:"Pneumocoque",
    text:"Jusqu'à quel âge environ la vaccination contre le pneumocoque est-elle recommandée en l'absence de facteur de risque ?",
    options:["6 mois","12 mois","2 ans","5 ans"],
    correct:2,
    explanation:"La vaccination anti-pneumococcique est recommandée et obligatoire jusqu'à <strong>2 ans</strong> en l'absence de facteur de risque (schéma 2+1 : doses à 2, 4 et 11 mois avec le Prevenar 13®). Au-delà de 2 ans, elle reste recommandée uniquement en présence de situations à risque élevé d'infections invasives à pneumocoque (asplénie, immunodépression, cardiopathie…)."
  },
  {
    theme:"Conseil au comptoir",
    text:"Un parent vous demande si son enfant peut être vacciné s'il a un peu de fièvre (38°C). Que lui répondez-vous ?",
    options:["Oui, une fièvre modérée n'est pas une contre-indication formelle à la vaccination","Non, toute fièvre impose de reporter la vaccination","Oui, mais uniquement pour les vaccins inactivés","Cela dépend uniquement de l'âge de l'enfant"],
    correct:0,
    explanation:"Une <strong>fièvre modérée (38°C)</strong> n'est pas une contre-indication formelle à la vaccination. Seule une <strong>maladie fébrile aiguë sévère</strong> justifie un report, par précaution et pour ne pas attribuer à tort des effets secondaires au vaccin. Le médecin reste le décisionnaire final, mais une légère fièvre ne compromet pas l'efficacité vaccinale. Il convient de rassurer les parents tout en les orientant vers le médecin."
  },
  {
    theme:"ROR et collectivité",
    text:"Un parent vous demande si son enfant de 13 mois, ayant reçu une seule dose de ROR, peut entrer en crèche. Que lui répondez-vous ?",
    options:["Non, les deux doses de ROR sont obligatoires avant toute entrée en collectivité","Oui, une admission provisoire est possible ; la 2ème dose doit être réalisée dans les 3 mois suivant l'entrée","Oui, une seule dose de ROR suffit pour l'entrée en collectivité avant 18 mois","Non, il faut attendre les 24 mois et les 2 doses complètes"],
    correct:1,
    explanation:"L'obligation vaccinale ne constitue pas un blocage absolu à l'entrée en collectivité. Une <strong>admission provisoire est possible</strong> si le schéma vaccinal est en cours : les parents disposent alors de <strong>3 mois pour régulariser la situation</strong>. La 2ème dose de ROR est normalement administrée entre 16 et 18 mois. C'est un point de conseil important pour éviter d'inquiéter inutilement les parents dont le nourrisson est en cours de vaccination."
  },
  {
    theme:"Doses multiples",
    text:"Un parent vous demande pourquoi son enfant doit recevoir plusieurs doses du même vaccin. Que lui expliquez-vous ?",
    options:["C'est une mesure de précaution au cas où une dose n'aurait pas été absorbée","Plusieurs doses permettent de construire progressivement une immunité solide ; les rappels entretiennent ensuite cette protection dans le temps","Les laboratoires imposent plusieurs doses pour des raisons commerciales","Une seule dose suffirait mais la réglementation impose plusieurs injections"],
    correct:1,
    explanation:"Plusieurs doses sont nécessaires pour deux raisons : d'abord, la <strong>primovaccination</strong> en plusieurs doses permet au système immunitaire immature du nourrisson de monter une réponse protectrice progressive. Ensuite, l'immunité vaccinale diminue avec le temps — les <strong>rappels</strong> entretiennent un niveau d'anticorps protecteur durable. Pour certains vaccins (ROR), la 2ème dose couvre aussi les non-répondeurs à la 1ère dose."
  }
];

let current=0,score=0,userAnswers=[];
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function startQuiz(){current=0;score=0;userAnswers=[];showScreen('screen-quiz');renderQuestion()}
function renderQuestion(){
  const q=QUESTIONS[current],total=QUESTIONS.length;
  document.getElementById('progress-bar').style.width=((current/total)*100)+'%';
  document.getElementById('progress-label').textContent=`${current+1} / ${total}`;
  document.getElementById('score-display').textContent=`Score : ${score}`;
  document.getElementById('q-num').textContent=current+1;
  document.getElementById('q-theme').textContent=q.theme;
  document.getElementById('q-text').textContent=q.text;
  const grid=document.getElementById('options-grid');grid.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="opt-letter">${l}</span><span>${q.options[i]}</span>`;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('next-btn').className='next-btn';
}
function selectAnswer(chosen){
  const q=QUESTIONS[current];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const ok=chosen===q.correct;if(ok)score++;userAnswers[current]=chosen;
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{if(i===q.correct)btn.classList.add('correct');else if(i===chosen&&!ok)btn.classList.add('wrong');else btn.classList.add('dimmed')});
  const fb=document.getElementById('feedback-box');
  document.getElementById('fb-title').textContent=ok?'✓ Bonne réponse !':'✗ Pas tout à fait…';
  document.getElementById('fb-body').innerHTML=q.explanation;
  fb.className='feedback-box show '+(ok?'correct-fb':'wrong-fb');
  const nb=document.getElementById('next-btn');nb.className='next-btn show';
  nb.textContent=current<QUESTIONS.length-1?'Question suivante →':'Voir mes résultats →';
}
function nextQuestion(){current++;if(current>=QUESTIONS.length)showResults();else renderQuestion()}
function showResults(){
  showScreen('screen-results');
  const total=QUESTIONS.length,pct=Math.round((score/total)*100);
  document.getElementById('res-score').textContent=`${score}/${total}`;
  document.getElementById('res-pct').textContent=`${pct}%`;
  document.getElementById('result-circle').style.setProperty('--pct',pct+'%');
  const t=['🔁 À retravailler','📚 Des lacunes à combler','👍 Très bon niveau','🏆 Expertise confirmée !'];
  const m=['Les fondamentaux ne sont pas encore acquis. Recommencez après révision.','Niveau intermédiaire. Certains points méritent une révision.','Bonne maîtrise générale. Relisez les points manqués.','Résultat parfait. Vos bases en vaccination nourrisson sont solides.'];
  const idx=pct===100?3:pct>=75?2:pct>=50?1:0;
  document.getElementById('res-title').textContent=t[idx];document.getElementById('res-msg').textContent=m[idx];
  const list=document.getElementById('review-list');list.innerHTML='';
  QUESTIONS.forEach((q,i)=>{const ok=userAnswers[i]===q.correct;const item=document.createElement('div');item.className='review-item';item.innerHTML=`<span class="review-icon">${ok?'✅':'❌'}</span><div><div class="review-q">${q.text}</div>${!ok?`<div class="review-ans">Bonne réponse : <strong>${q.options[q.correct]}</strong></div>`:''}</div>`;list.appendChild(item)});
}
function restartQuiz(){startQuiz()}
</script>
</body>
</html>
