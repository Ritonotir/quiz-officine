<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Contraception Vol.1 – Formation Officine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --green:#1a9e6e; --green-dark:#0f7a53; --green-light:#e6f7f1; --red:#e84040; --red-light:#fdeaea; --bg:#f4f6f3; --text:#1a1f1c; --muted:#6b7672; --border:#dde5e0; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
  .screen{display:none;width:100%;max-width:680px}
  .screen.active{display:flex;flex-direction:column;align-items:center}
  #screen-intro{text-align:center;gap:20px}
  .badge{display:inline-block;background:var(--green);color:white;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:8px}
  #screen-intro h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,6vw,3rem);font-weight:800;line-height:1.1}
  #screen-intro h1 span{color:var(--green)}
  #screen-intro p{color:var(--muted);font-size:1rem;max-width:460px}
  .intro-stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .stat-pill{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 22px;text-align:center;min-width:100px}
  .stat-pill strong{display:block;font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--green)}
  .stat-pill span{font-size:.82rem;color:var(--muted)}
  .btn-start{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;border:none;padding:18px 48px;border-radius:14px;cursor:pointer;transition:background .2s,transform .15s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .btn-start:hover{background:var(--green-dark);transform:translateY(-2px)}
  #screen-quiz{gap:20px}
  .progress-row{width:100%;display:flex;align-items:center;gap:12px}
  .progress-bar-track{flex:1;height:6px;background:var(--border);border-radius:100px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--green);border-radius:100px;transition:width .4s ease;width:0%}
  .progress-label{font-size:.82rem;color:var(--muted);white-space:nowrap;font-weight:500}
  .score-badge{background:var(--green-light);color:var(--green-dark);font-size:.82rem;font-weight:500;padding:5px 12px;border-radius:100px;white-space:nowrap}
  .question-card{background:white;border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06);animation:fadeIn .3s ease}
  .q-meta{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .q-meta em{background:var(--green-light);color:var(--green-dark);padding:2px 8px;border-radius:6px;font-style:normal;margin-left:6px}
  .question-text{font-family:'Syne',sans-serif;font-size:clamp(1.05rem,2.5vw,1.22rem);font-weight:700;line-height:1.4;margin-bottom:24px}
  .options-grid{display:flex;flex-direction:column;gap:10px}
  .option-btn{width:100%;text-align:left;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:.95rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;line-height:1.4}
  .option-btn .opt-letter{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:white;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;color:var(--muted);transition:all .18s}
  .option-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-light)}
  .option-btn:hover:not(:disabled) .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn:disabled{cursor:default}
  .option-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:500}
  .option-btn.correct .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
  .option-btn.wrong .opt-letter{background:var(--red);border-color:var(--red);color:white}
  .option-btn.dimmed{opacity:.45}
  .feedback-box{margin-top:20px;padding:18px 20px;border-radius:12px;font-size:.9rem;line-height:1.6;display:none;animation:fadeIn .3s ease}
  .feedback-box.show{display:block}
  .feedback-box.correct-fb{background:var(--green-light);border-left:4px solid var(--green);color:#0f5c3c}
  .feedback-box.wrong-fb{background:var(--red-light);border-left:4px solid var(--red);color:#8c1a1a}
  .feedback-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:5px}
  .next-btn{width:100%;background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px;border-radius:12px;cursor:pointer;transition:background .2s;display:none}
  .next-btn.show{display:block}
  .next-btn:hover{background:var(--green-dark)}
  #screen-results{text-align:center;gap:24px}
  .result-circle{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--green) 0%,var(--green) var(--pct),var(--border) var(--pct));display:flex;align-items:center;justify-content:center;position:relative}
  .result-circle::before{content:'';position:absolute;width:110px;height:110px;border-radius:50%;background:white}
  .result-inner{position:relative;z-index:1;text-align:center}
  .result-score{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--green);line-height:1}
  .result-total{font-size:.8rem;color:var(--muted)}
  #screen-results h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800}
  #screen-results .result-msg{color:var(--muted);max-width:420px;font-size:.95rem;line-height:1.6}
  .review-list{width:100%;display:flex;flex-direction:column;gap:10px;text-align:left}
  .review-item{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:.88rem;display:flex;gap:12px;align-items:flex-start;line-height:1.5}
  .review-icon{flex-shrink:0;font-size:1rem;margin-top:1px}
  .review-q{font-weight:500;color:var(--text)}
  .review-ans{color:var(--muted);margin-top:2px}
  .review-ans strong{color:var(--green-dark)}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .retry-btn{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px 40px;border-radius:14px;cursor:pointer;transition:background .2s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .retry-btn:hover{background:var(--green-dark)}
  .home-btn{background:white;color:var(--green);font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;border:1.5px solid var(--green);padding:12px 28px;border-radius:14px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .home-btn:hover{background:var(--green-light)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="screen-intro" class="screen active">
  <div>
    <div class="badge">Formation Officine</div>
    <h1>Contraception<br><span>Vol. 1</span></h1>
  </div>
  <p>Oublis de pilule, contre-indications OP, contraception d'urgence, vomissements et effets indésirables.</p>
  <div class="intro-stats">
    <div class="stat-pill"><strong>12</strong><span>questions</span></div>
    <div class="stat-pill"><strong>QCM</strong><span>format</span></div>
    <div class="stat-pill"><strong>~6 min</strong><span>durée</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Commencer →</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="progress-row">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label">1 / 12</span>
    <span class="score-badge" id="score-display">Score : 0</span>
  </div>
  <div class="question-card" id="question-card">
    <div class="q-meta">Question <span id="q-num">1</span> <em id="q-theme"></em></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="fb-title"></div>
      <div id="fb-body"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
</div>

<div id="screen-results" class="screen">
  <div class="result-circle" id="result-circle">
    <div class="result-inner">
      <div class="result-score" id="res-score">0/12</div>
      <div class="result-total" id="res-pct">0%</div>
    </div>
  </div>
  <h2 id="res-title"></h2>
  <p class="result-msg" id="res-msg"></p>
  <div class="review-list" id="review-list"></div>
  <div class="btn-row">
    <button class="retry-btn" onclick="restartQuiz()">🔄 Recommencer</button>
    <a class="home-btn" href="home.html">← Accueil</a>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    theme: "Oubli de pilule OP",
    text: "Une patiente a oublié son comprimé OP il y a 14 heures. Elle n'a pas eu de rapport sexuel depuis 6 jours. Que conseillez-vous ?",
    options: [
      "Prendre le comprimé oublié immédiatement + préservatif 7 jours",
      "Ne rien faire, l'oubli est inférieur à 24h",
      "Prendre une contraception d'urgence sans attendre",
      "Sauter le comprimé oublié et continuer normalement"
    ],
    correct: 0,
    explanation: "L'oubli dépasse <strong>12 heures</strong> : prendre le comprimé oublié dès que possible + <strong>préservatif 7 jours</strong>. Pas de contraception d'urgence ici car aucun rapport dans les 5 jours précédant l'oubli. Si l'oubli concerne les 7 derniers comprimés actifs, enchaîner directement avec la plaquette suivante sans placebo."
  },
  {
    theme: "Oubli de pilule OP",
    text: "Quelles sont les 3 informations clés à recueillir systématiquement face à un oubli de pilule OP ?",
    options: [
      "Génération de la pilule, heure de l'oubli, poids de la patiente",
      "Date de l'oubli, position du comprimé dans la plaquette, rapports sexuels dans les jours précédents",
      "Date des dernières règles, nombre de plaquettes prises, traitement associé",
      "Délai depuis l'oubli, nausées éventuelles, heure habituelle de prise"
    ],
    correct: 1,
    explanation: "Les <strong>3 informations indispensables</strong> : la <strong>date et l'heure de l'oubli</strong> (délai > ou < 12h), la <strong>position du comprimé dans la plaquette</strong> (un oubli en fin de plaquette est plus à risque), et l'<strong>existence de rapports dans les 5 jours précédents</strong> (pour décider d'une contraception d'urgence)."
  },
  {
    theme: "Contre-indications OP",
    text: "Une patiente de 38 ans, fumeuse à 20 cigarettes/jour, migraineuse avec aura, vient renouveler sa pilule OP. Quelle est votre attitude ?",
    options: [
      "Délivrer normalement, ces facteurs sont juste à surveiller",
      "Délivrer en conseillant fortement l'arrêt du tabac",
      "Refuser la délivrance et orienter vers le médecin",
      "Proposer une pilule moins dosée en œstrogènes"
    ],
    correct: 2,
    explanation: "Le <strong>tabagisme > 15 cig/jour chez une femme > 35 ans</strong> et les <strong>migraines avec aura</strong> sont chacun des <strong>contre-indications absolues</strong> aux OP. Leur association renforce l'impossibilité de délivrer. Orienter vers le prescripteur pour une alternative (microprogestatif, DIU)."
  },
  {
    theme: "Contre-indications OP",
    text: "Combien de facteurs de risque modérés équivalent à une contre-indication absolue aux œstroprogestatifs ?",
    options: ["1 seul suffit", "2 facteurs modérés", "3 facteurs modérés", "Cela dépend des facteurs"],
    correct: 1,
    explanation: "<strong>2 facteurs de risque modérés = 1 contre-indication absolue.</strong> Facteurs modérés : migraine simple, tabagisme modéré, HTA contrôlée, diabète type 2, surpoids, certaines maladies auto-immunes. À surveiller à chaque renouvellement : évolution de l'âge, nouveaux traitements, nouveaux facteurs de risque."
  },
  {
    theme: "Contre-indications OP",
    text: "Parmi ces situations, laquelle est une contre-indication absolue aux pilules OP ?",
    options: [
      "Diabète de type 2 équilibré",
      "Surpoids (IMC 27)",
      "Antécédent personnel de phlébite",
      "Migraine simple sans aura"
    ],
    correct: 2,
    explanation: "Un <strong>antécédent de phlébite (thrombose veineuse)</strong> est une contre-indication absolue aux OP — risque de récidive thromboembolique majeur. Les autres propositions sont des <strong>facteurs de risque modérés</strong> qui nécessitent une vigilance mais ne contre-indiquent pas seuls les OP. Rappel : embolie pulmonaire, AVC, IDM, thrombophilie sont également des CI absolues."
  },
  {
    theme: "Contraception d'urgence",
    text: "Une patiente se présente 60 heures après un rapport non protégé. Quelle contraception d'urgence privilégier ?",
    options: [
      "Lévonorgestrel — encore dans les 72h théoriques",
      "Ulipristal — efficace jusqu'à 5 jours, recommandé en 1ère intention",
      "Les deux sont équivalents à ce délai",
      "Il est trop tard, seul le DIU au cuivre est possible"
    ],
    correct: 1,
    explanation: "L'<strong>ulipristal</strong> est recommandé en <strong>1ère intention</strong> par les gynécologues : efficace jusqu'à <strong>5 jours (120h)</strong>, avec une efficacité supérieure au lévonorgestrel passé 72h. Le lévonorgestrel est optimal dans les <strong>12-24h</strong>. Le DIU au cuivre reste une option, surtout si contraception au long cours souhaitée ensuite."
  },
  {
    theme: "Contraception d'urgence",
    text: "Après la prise d'ulipristal, la patiente reprend sa pilule OP le soir même. Que lui précisez-vous ?",
    options: [
      "Aucune précaution, la pilule reprend son efficacité immédiatement",
      "Utiliser une protection complémentaire pendant 12 jours ou jusqu'aux prochaines règles",
      "Attendre les prochaines règles avant de reprendre la pilule",
      "Doubler la dose de pilule pendant 7 jours"
    ],
    correct: 1,
    explanation: "Après ulipristal, la reprise d'une contraception hormonale nécessite une <strong>protection complémentaire pendant 12 jours</strong> (ou jusqu'aux prochaines règles). L'ulipristal module les récepteurs à la progestérone : une pilule reprise trop tôt peut réduire son efficacité. Point spécifique à l'ulipristal — ne s'applique pas au lévonorgestrel. Penser aussi au <strong>dépistage des IST</strong> après un rapport non protégé."
  },
  {
    theme: "Contraception d'urgence",
    text: "Une patiente allaitante a pris du lévonorgestrel en contraception d'urgence. Quel conseil donner pour l'allaitement ?",
    options: [
      "Suspendre l'allaitement 8 heures après la prise",
      "Suspendre l'allaitement 7 jours",
      "Aucune précaution, le lévonorgestrel est compatible avec l'allaitement sans restriction",
      "Arrêter définitivement l'allaitement"
    ],
    correct: 0,
    explanation: "Après lévonorgestrel : <strong>suspendre l'allaitement 8 heures</strong>. Après ulipristal, selon le CRAT, la suspension de 7 jours initialement recommandée n'est plus nécessaire — <strong>8 heures suffisent également</strong>. Ces données pratiques sont importantes à délivrer car elles lèvent une crainte fréquente qui peut conduire à un abandon injustifié de l'allaitement."
  },
  {
    theme: "Diarrhées / Vomissements",
    text: "Une patiente a vomi 2 heures après sa prise de pilule OP et a eu des diarrhées. Elle a eu un rapport ce matin. Quelle est la conduite à tenir ?",
    options: [
      "Rien — les vomissements après 1h n'affectent pas l'absorption",
      "Comprimé supplémentaire + préservatif 7 jours + envisager contraception d'urgence",
      "Arrêter la plaquette et attendre les prochaines règles",
      "Uniquement un préservatif, pas besoin de comprimé supplémentaire"
    ],
    correct: 1,
    explanation: "Vomissement <strong>dans les 4 heures</strong> = assimilé à un <strong>oubli de pilule</strong>. Prendre un comprimé supplémentaire + préservatif 7 jours. Rapport dans les 5 jours : envisager une <strong>contraception d'urgence</strong>. Si incident en dernière semaine : enchaîner avec la plaquette suivante. Conseil pratique : avoir une <strong>plaquette de secours</strong> à disposition."
  },
  {
    theme: "Diarrhées / Vomissements",
    text: "Une patiente sous pilule OP a eu des vomissements 5 heures après sa prise. Faut-il adapter la contraception ?",
    options: [
      "Oui — tout vomissement impose un comprimé supplémentaire",
      "Non — au-delà de 4 heures, l'absorption est correcte, pas d'impact",
      "Oui — mais uniquement si les vomissements se répètent",
      "Non — sauf si elle est en fin de plaquette"
    ],
    correct: 1,
    explanation: "Si le vomissement survient <strong>après 4 heures</strong> : l'absorption du comprimé est considérée comme correcte, <strong>pas d'impact sur l'efficacité contraceptive</strong>. Aucune mesure supplémentaire n'est nécessaire. La règle des 4 heures est le seuil clé à retenir — en dessous, on gère comme un oubli."
  },
  {
    theme: "Effets indésirables OP",
    text: "Une patiente débute une pilule OP depuis 5 semaines. Elle se plaint de spotting et de nausées. Elle veut changer de pilule. Que lui conseillez-vous ?",
    options: [
      "Changer de pilule immédiatement pour une mieux tolérée",
      "Patienter jusqu'à 3 mois — période d'adaptation normale",
      "Arrêter la pilule et passer à un DIU",
      "Prendre la pilule à jeun et doubler si spotting"
    ],
    correct: 1,
    explanation: "Les <strong>3 premiers mois</strong> sont une <strong>période d'adaptation</strong> : spotting, nausées et mastodynies sont fréquents et s'estompent souvent spontanément. Changer trop tôt est inutile. Conseils : pilule <strong>au repas ou au coucher</strong> pour les nausées, régularité des prises pour le spotting. Consulter si persistance après 3 mois. Signes d'alarme qui imposent l'arrêt : migraine avec aura, troubles visuels, signes de phlébite."
  },
  {
    theme: "Effets indésirables OP",
    text: "Parmi ces effets indésirables signalés sous pilule OP, lequel impose l'arrêt immédiat et une consultation médicale ?",
    options: [
      "Spotting en milieu de cycle",
      "Légère augmentation du volume des seins",
      "Nausées matinales les premières semaines",
      "Apparition d'une migraine avec aura"
    ],
    correct: 3,
    explanation: "La <strong>migraine avec aura</strong> sous pilule OP est un signal d'alarme grave : elle devient une <strong>contre-indication absolue</strong> et impose l'arrêt immédiat. Autres signaux graves : troubles visuels, douleur/rougeur/chaleur d'une jambe (signe de phlébite). Le spotting, les mastodynies légères et les nausées sont des effets courants de la période d'adaptation, sans danger immédiat."
  }
];

let current=0,score=0,userAnswers=[];

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function startQuiz(){current=0;score=0;userAnswers=[];showScreen('screen-quiz');renderQuestion()}

function renderQuestion(){
  const q=QUESTIONS[current],total=QUESTIONS.length;
  document.getElementById('progress-bar').style.width=((current/total)*100)+'%';
  document.getElementById('progress-label').textContent=`${current+1} / ${total}`;
  document.getElementById('score-display').textContent=`Score : ${score}`;
  document.getElementById('q-num').textContent=current+1;
  document.getElementById('q-theme').textContent=q.theme;
  document.getElementById('q-text').textContent=q.text;
  const grid=document.getElementById('options-grid');
  grid.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="opt-letter">${l}</span><span>${q.options[i]}</span>`;
    btn.onclick=()=>selectAnswer(i);
    grid.appendChild(btn);
  });
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('next-btn').className='next-btn';
}

function selectAnswer(chosen){
  const q=QUESTIONS[current];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const ok=chosen===q.correct;
  if(ok)score++;
  userAnswers[current]=chosen;
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{
    if(i===q.correct)btn.classList.add('correct');
    else if(i===chosen&&!ok)btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });
  const fb=document.getElementById('feedback-box');
  document.getElementById('fb-title').textContent=ok?'✓ Bonne réponse !':'✗ Pas tout à fait…';
  document.getElementById('fb-body').innerHTML=q.explanation;
  fb.className='feedback-box show '+(ok?'correct-fb':'wrong-fb');
  const nb=document.getElementById('next-btn');
  nb.className='next-btn show';
  nb.textContent=current<QUESTIONS.length-1?'Question suivante →':'Voir mes résultats →';
}

function nextQuestion(){current++;if(current>=QUESTIONS.length)showResults();else renderQuestion()}

function showResults(){
  showScreen('screen-results');
  const total=QUESTIONS.length,pct=Math.round((score/total)*100);
  document.getElementById('res-score').textContent=`${score}/${total}`;
  document.getElementById('res-pct').textContent=`${pct}%`;
  document.getElementById('result-circle').style.setProperty('--pct',pct+'%');
  const t=['🔁 À retravailler','📚 Des lacunes à combler','👍 Très bon niveau','🏆 Expertise confirmée !'];
  const m=['Les fondamentaux ne sont pas encore acquis. Recommencez après révision.','Niveau intermédiaire. Certains points clés méritent une révision.','Bonne maîtrise. Relisez les points manqués pour consolider.','Résultat parfait. Votre conseil en contraception est solide.'];
  const idx=pct===100?3:pct>=75?2:pct>=50?1:0;
  document.getElementById('res-title').textContent=t[idx];
  document.getElementById('res-msg').textContent=m[idx];
  const list=document.getElementById('review-list');
  list.innerHTML='';
  QUESTIONS.forEach((q,i)=>{
    const ok=userAnswers[i]===q.correct;
    const item=document.createElement('div');
    item.className='review-item';
    item.innerHTML=`<span class="review-icon">${ok?'✅':'❌'}</span><div><div class="review-q">${q.text}</div>${!ok?`<div class="review-ans">Bonne réponse : <strong>${q.options[q.correct]}</strong></div>`:''}</div>`;
    list.appendChild(item);
  });
}

function restartQuiz(){startQuiz()}
</script>
</body>
</html>
