<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaccination Seniors 65+ – Formation Officine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--green:#1a9e6e;--green-dark:#0f7a53;--green-light:#e6f7f1;--red:#e84040;--red-light:#fdeaea;--bg:#f4efe9;--text:#1a1f1c;--muted:#6b7672;--border:#dde5e0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background-color:#f0ebe3;background-image:url(bg.jpg);background-repeat:repeat;background-size:1024px 571px;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
  .screen{display:none;width:100%;max-width:680px}
  .screen.active{display:flex;flex-direction:column;align-items:center}
  #screen-intro{text-align:center;gap:20px}
  .badge{display:inline-block;background:var(--green);color:white;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:8px}
  #screen-intro h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,6vw,3rem);font-weight:800;line-height:1.1;background:rgba(255,255,255,0.88);border-radius:14px;padding:10px 20px;display:inline-block}
  #screen-intro h1 span{color:var(--green)}
  #screen-intro p{color:var(--muted);font-size:1rem;max-width:460px;background:rgba(255,255,255,0.88);border-radius:12px;padding:8px 16px}
  .intro-stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .stat-pill{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 22px;text-align:center;min-width:100px}
  .stat-pill strong{display:block;font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--green)}
  .stat-pill span{font-size:.82rem;color:var(--muted)}
  .pool-info{background:rgba(230,247,241,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:.82rem;color:var(--green-dark);text-align:center;width:100%}
  .btn-start{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;border:none;padding:18px 48px;border-radius:14px;cursor:pointer;transition:background .2s,transform .15s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .btn-start:hover{background:var(--green-dark);transform:translateY(-2px)}
  #screen-quiz{gap:20px}
  .progress-row{width:100%;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.85);border-radius:12px;padding:8px 14px;}
  .progress-bar-track{flex:1;height:6px;background:var(--border);border-radius:100px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--green);border-radius:100px;transition:width .4s ease;width:0%}
  .progress-label{font-size:.82rem;color:var(--muted);white-space:nowrap;font-weight:500}
  .score-badge{background:var(--green-light);color:var(--green-dark);font-size:.82rem;font-weight:500;padding:5px 12px;border-radius:100px;white-space:nowrap}
  .question-card{background:white;border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06);animation:fadeIn .3s ease}
  .q-meta{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .q-theme-tag{background:var(--green-light);color:var(--green-dark);padding:2px 8px;border-radius:6px;font-style:normal}
  .diff-tag{padding:2px 8px;border-radius:6px;font-weight:600}
  .diff-facile{background:#e8f8f0;color:#0a6640}
  .diff-modere{background:#fff8e6;color:#7a5000}
  .diff-difficile{background:#fdeaea;color:#8c1a1a}
  .question-text{font-family:'Syne',sans-serif;font-size:clamp(1.05rem,2.5vw,1.22rem);font-weight:700;line-height:1.4;margin-bottom:24px}
  .options-grid{display:flex;flex-direction:column;gap:10px}
  .option-btn{width:100%;text-align:left;background-color:#f4efe9;border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:.95rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;line-height:1.4}
  .option-btn .opt-letter{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:white;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;color:var(--muted);transition:all .18s}
  .option-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-light)}
  .option-btn:hover:not(:disabled) .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn:disabled{cursor:default}
  .option-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:500}
  .option-btn.correct .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
  .option-btn.wrong .opt-letter{background:var(--red);border-color:var(--red);color:white}
  .option-btn.dimmed{opacity:.45}
  .feedback-box{margin-top:20px;padding:18px 20px;border-radius:12px;font-size:.9rem;line-height:1.6;display:none;animation:fadeIn .3s ease}
  .feedback-box.show{display:block}
  .feedback-box.correct-fb{background:var(--green-light);border-left:4px solid var(--green);color:#0f5c3c}
  .feedback-box.wrong-fb{background:var(--red-light);border-left:4px solid var(--red);color:#8c1a1a}
  .feedback-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:5px}
  .next-btn{width:100%;background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px;border-radius:12px;cursor:pointer;transition:background .2s;display:none}
  .next-btn.show{display:block}
  .next-btn:hover{background:var(--green-dark)}
  #screen-results{text-align:center;gap:24px}
  .result-circle{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--green) 0%,var(--green) var(--pct),var(--border) var(--pct));display:flex;align-items:center;justify-content:center;position:relative}
  .result-circle::before{content:'';position:absolute;width:110px;height:110px;border-radius:50%;background:white}
  .result-inner{position:relative;z-index:1;text-align:center}
  .result-score{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--green);line-height:1}
  .result-total{font-size:.8rem;color:var(--muted)}
  #screen-results h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;background:rgba(255,255,255,0.88);border-radius:12px;padding:8px 20px;display:inline-block}
  #screen-results .result-msg{color:var(--muted);max-width:420px;font-size:.95rem;line-height:1.6;background:rgba(255,255,255,0.88);border-radius:12px;padding:8px 16px}
  .review-list{width:100%;display:flex;flex-direction:column;gap:10px;text-align:left}
  .review-item{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:.88rem;display:flex;gap:12px;align-items:flex-start;line-height:1.5}
  .review-icon{flex-shrink:0;font-size:1rem;margin-top:1px}
  .review-q{font-weight:500;color:var(--text)}
  .review-diff{font-size:.72rem;font-weight:600;margin-top:2px}
  .review-ans{color:var(--muted);margin-top:2px}
  .review-ans strong{color:var(--green-dark)}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .retry-btn{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px 40px;border-radius:14px;cursor:pointer;transition:background .2s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .retry-btn:hover{background:var(--green-dark)}
  .home-btn{background:white;color:var(--green);font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;border:1.5px solid var(--green);padding:12px 28px;border-radius:14px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .home-btn:hover{background:var(--green-light)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="screen-intro" class="screen active">
  <div><div class="badge">Formation Officine</div>
  <h1><span>Vaccination Seniors 65+</span></h1></div>
  <p>Shingrix, grippe haute dose, DTP 10 ans, pneumocoque VPC20.</p>
  <div class="intro-stats">
    <div class="stat-pill"><strong>12</strong><span>questions</span></div>
    <div class="stat-pill"><strong>QCM</strong><span>format</span></div>
    <div class="stat-pill"><strong>~7 min</strong><span>durée</span></div>
  </div>
  <div class="pool-info">🎲 Tirage aléatoire — 36 questions disponibles</div>
  <button class="btn-start" onclick="startQuiz()">Commencer →</button>
</div>
<div id="screen-quiz" class="screen">
  <div class="progress-row">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label">1 / 12</span>
    <span class="score-badge" id="score-display">Score : 0</span>
  </div>
  <div class="question-card">
    <div class="q-meta">Question <span id="q-num">1</span>
      <em class="q-theme-tag" id="q-theme"></em>
      <span class="diff-tag" id="q-diff"></span>
    </div>
    <div class="question-text" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="fb-title"></div>
      <div id="fb-body"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
</div>
<div id="screen-results" class="screen">
  <div class="result-circle" id="result-circle">
    <div class="result-inner">
      <div class="result-score" id="res-score">0/12</div>
      <div class="result-total" id="res-pct">0%</div>
    </div>
  </div>
  <h2 id="res-title"></h2>
  <p class="result-msg" id="res-msg"></p>
  <div class="review-list" id="review-list"></div>
  <div class="btn-row">
    <button class="retry-btn" onclick="restartQuiz()">🔄 Nouveau tirage</button>
    <a class="home-btn" href="home.html">← Accueil</a>
  </div>
</div>
<script>
const QUIZ_ID = 'vaccination-seniors';
const QUESTION_POOL = [
  {quiz:"vaccination-seniors",theme:"DTP Senior",difficulte:"modere",
   text:"À partir de 45 ans, quels sont les âges fixes de rappel DTP recommandés en France ?",
   options:["45, 55, 65, 75, 85 ans","50, 60, 70, 80 ans","45, 65, 75, 85, 95 ans","Tous les 10 ans sans âge fixe"], correct:2,
   explanation:"À partir de 65 ans, la fréquence des rappels passe à dix ans. Cette périodicité accrue compense l'affaiblissement naturel du système immunitaire en stimulant plus régulièrement les défenses de l'organisme."},
  {quiz:"vaccination-seniors",theme:"Pneumocoque",difficulte:"facile",
   text:"Quelle valence de vaccin pneumococcique est désormais recommandée en dose unique pour les seniors ?",
   options:["VPC13 (Prevenar 13)", "VPP23 (Pneumovax)", "VPC20 (Prevenar 20)", "VPC15 (Vaxneuvance)"],correct:2,
   explanation:"Depuis 2025, le <strong>VPC20 (Prevenar 20®)</strong> est recommandé en <strong>dose unique</strong> pour toutes les personnes de 65 ans et plus. Il couvre 20 sérotypes pneumococciques et remplace le schéma séquentiel VPC13 + VPP23. C'est la recommandation actuelle, simplifiée et plus large que ses prédécesseurs."},
  {quiz:"vaccination-seniors",theme:"Zona",difficulte:"facile",
   text:"Le vaccin Shingrix® est-il un vaccin vivant ou inactivé ?",
   options:["Vivant atténué", "Inactivé recombinant adjuvé", "À ARN messager", "À vecteur viral"],correct:1,
   explanation:"Shingrix® est un vaccin <strong>inactivé recombinant adjuvé</strong> : il contient une protéine recombinante de l'enveloppe du virus varicelle-zona (gE) associée à un puissant système adjuvant (AS01B). Cette nature inactivée le rend utilisable chez les immunodéprimés — contrairement à l'ancien Zostavax® (vaccin vivant)."},
  {quiz:"vaccination-seniors",theme:"Zona",difficulte:"facile",
   text:"Peut-on vacciner contre le zona une personne qui a déjà eu la maladie ?",
   options:["Non, inutile — elle est immunisée", "Oui, la vaccination est recommandée malgré l'antécédent", "Seulement après 10 ans sans récidive", "Contre-indiqué après zona"],correct:1,
   explanation:"Oui — avoir eu le zona n'est pas une contre-indication à Shingrix®. La vaccination reste recommandée car <strong>l'immunité naturelle post-zona peut s'estomper</strong> avec l'âge, laissant le patient vulnérable à une récidive. Il est conseillé d'attendre 1 an après l'épisode de zona avant de vacciner."},
  {quiz:"vaccination-seniors",theme:"Zona",difficulte:"facile",
   text:"Quel est le principal avantage de Shingrix® par rapport à l'ancien vaccin Zostavax® ?",
   options:["Une seule dose suffit", "Moins d'effets secondaires locaux", "Efficacité nettement supérieure, notamment chez les plus âgés", "Absence de douleur à l'injection"],correct:2,
   explanation:"La supériorité de Shingrix® réside dans son <strong>efficacité bien maintenue avec l'âge</strong> : plus de 90% d'efficacité contre le zona chez les 70 ans et plus, et plus de 85% contre les douleurs post-zostériennes. L'ancien Zostavax® (vivant) voyait son efficacité chuter rapidement avec l'âge et après quelques années."},
  {quiz:"vaccination-seniors",theme:"Grippe senior",difficulte:"facile",
   text:"Quel vaccin grippe est spécifiquement recommandé pour les plus de 65 ans ?",
   options:["VaxigripTetra (standard)", "Influvac Tetra (standard)", "Efluelda (haute dose)", "Fluenz (nasal)"],correct:2,
   explanation:"Le vaccin <strong>Efluelda®</strong> (haute dose) est spécifiquement recommandé pour les personnes de 65 ans et plus depuis 2023. Il contient <strong>4 fois plus d'antigènes</strong> que les vaccins standard, ce qui compense la réponse immunitaire diminuée par l'immunosénescence. Il est remboursé pour cette tranche d'âge."},
  {quiz:"vaccination-seniors",theme:"Zona",difficulte:"facile",
   text:"À quel âge s'arrête la recommandation vaccinale pour le zona chez l'adulte sain ?",
   options:["75 ans", "80 ans", "85 ans", "Pas d'âge limite supérieur"],correct:3,
   explanation:"Il n'y a <strong>pas d'âge limite supérieur</strong> pour la vaccination Shingrix® chez l'adulte sain. La vaccination reste recommandée et bénéfique à tout âge car le risque de zona et de complications (douleurs post-zostériennes) augmente avec l'âge. L'efficacité de Shingrix® se maintient même chez les très âgés grâce à son système adjuvant."},
  {quiz:"vaccination-seniors",theme:"Co-administration",difficulte:"facile",
   text:"La co-administration Grippe et Covid-19 est-elle possible chez un patient de 70 ans ?",
   options:["Non, un intervalle de 15 jours est nécessaire", "Oui, dans le même bras", "Oui, sur deux sites d'injection différents", "Seulement sur prescription médicale"],correct:2,
   explanation:"La co-administration grippe + Covid-19 est <strong>possible et recommandée</strong> chez les seniors pour simplifier le parcours vaccinal. Les deux vaccins doivent être injectés sur <strong>deux sites d'injection différents</strong> (bras différents de préférence). Cette co-administration peut être réalisée en pharmacie."},
  {quiz:"vaccination-seniors",theme:"Vaccination officinale",difficulte:"facile",
   text:"En 2026, un pharmacien peut-il prescrire et administrer le vaccin Shingrix® à un patient de 68 ans ?",
   options:["Non, prescription médicale obligatoire", "Oui, le pharmacien peut prescrire et vacciner", "Uniquement si le patient est en ALD", "Uniquement pour le 2e rappel"],correct:1,
   explanation:"Depuis 2023, les <strong>pharmaciens peuvent prescrire et administrer</strong> tous les vaccins du calendrier vaccinal aux personnes de 11 ans et plus, y compris Shingrix®. Un pharmacien peut donc prescrire, délivrer et injecter ce vaccin à un patient de 68 ans sans ordonnance médicale préalable."},
  {quiz:"vaccination-seniors",theme:"Covid-19",difficulte:"facile",
   text:"Quelle est la recommandation actuelle de rappel Covid-19 pour les plus de 65 ans ?",
   options:["Tous les 6 mois", "Annuel, en période automnale", "Tous les 2 ans", "Plus de rappel recommandé"],correct:1,
   explanation:"Pour les personnes de 65 ans et plus, un rappel Covid-19 est recommandé chaque année en période automnale (<strong>rappel annuel</strong>), avant la saison hivernale. Ce rappel est co-administrable avec la grippe. La vaccination annuelle vise à maintenir une protection suffisante face à l'évolution des variants."},
  {quiz:"vaccination-seniors",theme:"Grippe — accès",difficulte:"facile",
   text:"En 2026, un patient de 65 ans peut-il se faire vacciner contre la grippe en pharmacie sans bon de l'Assurance Maladie reçu par courrier ?",
   options:["Non, le bon est obligatoire", "Oui, le pharmacien édite le bon et vaccine directement", "Uniquement sur prescription médicale", "Uniquement après 75 ans"],correct:1,
   explanation:"Depuis 2019, les patients éligibles à la vaccination grippe gratuite peuvent se rendre directement en pharmacie : le <strong>pharmacien édite lui-même le bon de vaccination</strong> et peut vacciner sur place. Il n'est plus nécessaire d'attendre le bon envoyé par courrier par l'Assurance Maladie."},
  {quiz:"vaccination-seniors",theme:"Vaccin adulte — valence réduite",difficulte:"facile",
   text:"Pourquoi la valence diphtérique est-elle dosée plus faiblement (",
   options:["Pour réduire les coûts", "Pour limiter les réactions locales d'hypersensibilité chez les adultes pré-immunisés", "Parce que l'adulte est totalement immunisé", "Pour une meilleure conservation"],correct:1,
   explanation:"Les adultes pré-immunisés par les vaccinations antérieures réagiraient de façon exagérée (érythème, douleur, induration importantes) à une dose complète d'anatoxine diphtérique. La <strong>dose réduite "},
  {quiz:"vaccination-seniors",theme:"Zona",difficulte:"modere",
   text:"Quel est le schéma vaccinal complet du vaccin Shingrix® en population générale ?",
   options:["1 dose unique", "2 doses (M0 et entre M2 et M6)", "3 doses (M0, M1, M6)", "2 doses à 1 an d'écart"],correct:1,
   explanation:"Le schéma Shingrix® standard est <strong>2 doses</strong> : M0 puis entre <strong>M2 et M6</strong>. L'intervalle minimal est de 2 mois, l'intervalle maximal de 6 mois. Chez l'immunodéprimé, l'intervalle est réduit à 1-2 mois. Il n'existe pas de schéma à 3 doses ni de dose de rappel après ce schéma complet."},
  {quiz:"vaccination-seniors",theme:"DTP senior",difficulte:"modere",
   text:"Pourquoi les rappels DTP sont-ils plus rapprochés (tous les 10 ans) après 65 ans ?",
   options:["Immunodépression iatrogène systématique", "Immunosénescence : déclin naturel de l'immunité avec l'âge", "Utilisation de doses pédiatriques", "Risque de tétanos tellurique accru"],correct:1,
   explanation:"L'<strong>immunosénescence</strong> est le déclin progressif et naturel des fonctions immunitaires avec l'âge. Ce phénomène réduit la durée de protection conférée par les vaccinations. C'est pourquoi les rappels DTP passent de tous les 20 ans (adulte) à <strong>tous les 10 ans</strong> après 65 ans pour maintenir une protection suffisante."},
  {quiz:"vaccination-seniors",theme:"Zona",difficulte:"modere",
   text:"Quel délai minimal faut-il respecter après un épisode de zona avant de vacciner avec Shingrix® ?",
   options:["15 jours", "1 mois", "1 an", "5 ans"],correct:2,
   explanation:"Il est recommandé d'attendre <strong>au moins 1 an</strong> après un épisode de zona avant d'administrer Shingrix®. Ce délai permet à l'immunité naturelle post-zona de se stabiliser. Vacciner trop tôt après l'épisode n'est pas dangereux mais pourrait être moins efficace car l'immunité est alors déjà stimulée."},
  {quiz:"vaccination-seniors",theme:"Zona — immunodéprimé",difficulte:"modere",
   text:"Peut-on injecter Shingrix® à un patient sous corticoïdes ou immunosuppresseurs ?",
   options:["Non, c'est un vaccin vivant contre-indiqué", "Oui, car c'est un vaccin inactivé recombinant", "Uniquement après l'arrêt du traitement", "À demi-dose"],correct:1,
   explanation:"Shingrix® est un vaccin <strong>inactivé recombinant</strong> — il ne contient pas de virus vivant. Il est donc <strong>utilisable chez les immunodéprimés</strong>, y compris sous corticoïdes ou immunosuppresseurs. C'est une différence majeure avec l'ancien Zostavax® (vivant, contre-indiqué sous immunosuppresseurs). La réponse immunitaire peut être réduite mais la vaccination reste bénéfique."},
  {quiz:"vaccination-seniors",theme:"Zona",difficulte:"modere",
   text:"Doit-on revacciner avec Shingrix® une personne ayant déjà reçu le vaccin Zostavax® ?",
   options:["Non, la vaccination est définitive", "Oui, Shingrix® est recommandé même après Zostavax®", "Uniquement après 80 ans", "Seulement si immunodéprimée"],correct:1,
   explanation:"Oui — Shingrix® est recommandé même chez les personnes ayant déjà reçu Zostavax® (ancien vaccin vivant). L'<strong>efficacité nettement supérieure</strong> de Shingrix® (>90% vs ~50% pour Zostavax® chez les 70+) justifie la revaccination. Un délai d'au moins 1 an après Zostavax® est souhaitable."},
  {quiz:"vaccination-seniors",theme:"Anticoagulants",difficulte:"modere",
   text:"Un patient de 70 ans sous anticoagulants oraux (AOD) peut-il être vacciné par voie IM ?",
   options:["Non, voie sous-cutanée obligatoire", "Oui, avec une aiguille fine et compression prolongée de 2 minutes", "Uniquement à l'hôpital", "Contre-indiqué"],correct:1,
   explanation:"La vaccination IM est possible chez un patient sous anticoagulants oraux. La technique recommandée : utiliser une <strong>aiguille fine (23G ou 25G)</strong> et appliquer une <strong>compression ferme de 2 minutes</strong> après l'injection sans masser. Aucun arrêt de l'anticoagulant n'est nécessaire. La voie SC n'est pas recommandée car elle peut réduire l'immunogénicité pour certains vaccins."},
  {quiz:"vaccination-seniors",theme:"Zona",difficulte:"modere",
   text:"Quelle est la complication majeure du zona que la vaccination vise principalement à prévenir ?",
   options:["La paralysie faciale", "Les douleurs post-zostériennes (DPZ)", "La cécité", "La surdité"],correct:1,

function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pickQuizQuestions(quizId){
  const pool=shuffleArray(QUESTION_POOL.filter(q=>q.quiz===quizId));
  const f=pool.filter(q=>q.difficulte==='facile');
  const m=pool.filter(q=>q.difficulte==='modere');
  const d=pool.filter(q=>q.difficulte==='difficile');
  let sel=[...f.slice(0,4),...m.slice(0,4),...d.slice(0,4)];
  if(sel.length<12){const used=new Set(sel.map(q=>q.text));const rem=shuffleArray(pool.filter(q=>!used.has(q.text)));sel=[...sel,...rem.slice(0,12-sel.length)];}
  return shuffleArray(sel.slice(0,12));
}

const DIFF_LABELS = {facile:'🟢 Facile', modere:'🟡 Modéré', difficile:'🔴 Difficile'};
const DIFF_CLASSES = {facile:'diff-facile', modere:'diff-modere', difficile:'diff-difficile'};

let current=0, score=0, userAnswers=[];
let shuffledQuestions=[], shuffledOptions=[];

function startQuiz(){
  current=0; score=0; userAnswers=[];
  shuffledQuestions=pickQuizQuestions(QUIZ_ID);
  shuffledOptions=shuffledQuestions.map(q=>shuffleArray(q.options.map((text,origIndex)=>({text,origIndex}))));
  showScreen('screen-quiz'); renderQuestion();
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function renderQuestion(){
  const q=shuffledQuestions[current],opts=shuffledOptions[current],total=shuffledQuestions.length;
  document.getElementById('progress-bar').style.width=((current/total)*100)+'%';
  document.getElementById('progress-label').textContent=(current+1)+' / '+total;
  document.getElementById('score-display').textContent='Score : '+score;
  document.getElementById('q-num').textContent=current+1;
  document.getElementById('q-theme').textContent=q.theme;
  const de=document.getElementById('q-diff');
  de.textContent=DIFF_LABELS[q.difficulte]||q.difficulte;
  de.className='diff-tag '+(DIFF_CLASSES[q.difficulte]||'');
  document.getElementById('q-text').textContent=q.text;
  const grid=document.getElementById('options-grid'); grid.innerHTML='';
  const letters=['A','B','C','D'];
  opts.forEach((opt,di)=>{
    const btn=document.createElement('button'); btn.className='option-btn';
    btn.innerHTML='<span class="opt-letter">'+letters[di]+'</span><span>'+opt.text+'</span>';
    btn.onclick=(function(o){return function(){selectAnswer(o.origIndex);};})(opt);
    grid.appendChild(btn);
  });
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('next-btn').className='next-btn';
}
function selectAnswer(chosenOrig){
  const q=shuffledQuestions[current],opts=shuffledOptions[current];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const ok=chosenOrig===q.correct; if(ok)score++; userAnswers[current]=chosenOrig;
  document.querySelectorAll('.option-btn').forEach((btn,di)=>{
    const orig=opts[di].origIndex;
    if(orig===q.correct)btn.classList.add('correct');
    else if(orig===chosenOrig&&!ok)btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });
  const fb=document.getElementById('feedback-box');
  document.getElementById('fb-title').textContent=ok?'✓ Bonne réponse !':'✗ Pas tout à fait…';
  document.getElementById('fb-body').innerHTML=q.explanation;
  fb.className='feedback-box show '+(ok?'correct-fb':'wrong-fb');
  const nb=document.getElementById('next-btn'); nb.className='next-btn show';
  nb.textContent=current<shuffledQuestions.length-1?'Question suivante →':'Voir mes résultats →';
}
function nextQuestion(){current++;if(current>=shuffledQuestions.length)showResults();else renderQuestion();}
function showResults(){
  showScreen('screen-results');
  const total=shuffledQuestions.length,pct=Math.round((score/total)*100);
  document.getElementById('res-score').textContent=score+'/'+total;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('result-circle').style.setProperty('--pct',pct+'%');
  const t=['🔁 À retravailler','📚 Des lacunes à combler','👍 Très bon niveau','🏆 Expertise confirmée !'];
  const m=['Les fondamentaux ne sont pas encore acquis. Recommencez après révision.',
           'Niveau intermédiaire. Certains points méritent une révision.',
           'Bonne maîtrise. Relisez les points manqués pour consolider.',
           'Résultat parfait. Votre maîtrise est solide.'];
  const idx=pct===100?3:pct>=75?2:pct>=50?1:0;
  document.getElementById('res-title').textContent=t[idx];
  document.getElementById('res-msg').textContent=m[idx];
  const list=document.getElementById('review-list'); list.innerHTML='';
  shuffledQuestions.forEach((q,i)=>{
    const ok=userAnswers[i]===q.correct;
    const item=document.createElement('div'); item.className='review-item';
    item.innerHTML='<span class="review-icon">'+(ok?'✅':'❌')+'</span><div>'
      +'<div class="review-q">'+q.text+'</div>'
      +'<div class="review-diff '+(DIFF_CLASSES[q.difficulte]||'')+'">'+( DIFF_LABELS[q.difficulte]||'')+'</div>'
      +(!ok?'<div class="review-ans">Bonne réponse : <strong>'+q.options[q.correct]+'</strong></div>':'')
      +'</div>';
    list.appendChild(item);
  });
}
function restartQuiz(){startQuiz();}
