<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratique Vaccinale – Formation Officine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--green:#1a9e6e;--green-dark:#0f7a53;--green-light:#e6f7f1;--red:#e84040;--red-light:#fdeaea;--bg:#f4efe9;--text:#1a1f1c;--muted:#6b7672;--border:#dde5e0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background-color:#f0ebe3;background-image:url(bg.jpg);background-repeat:repeat;background-size:1024px 571px;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
  .screen{display:none;width:100%;max-width:680px}
  .screen.active{display:flex;flex-direction:column;align-items:center}
  #screen-intro{text-align:center;gap:20px}
  .badge{display:inline-block;background:var(--green);color:white;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:8px}
  #screen-intro h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,6vw,3rem);font-weight:800;line-height:1.1;background:rgba(255,255,255,0.88);border-radius:14px;padding:10px 20px;display:inline-block}
  #screen-intro h1 span{color:var(--green)}
  #screen-intro p{color:var(--muted);font-size:1rem;max-width:460px;background:rgba(255,255,255,0.88);border-radius:12px;padding:8px 16px}
  .intro-stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .stat-pill{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 22px;text-align:center;min-width:100px}
  .stat-pill strong{display:block;font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--green)}
  .stat-pill span{font-size:.82rem;color:var(--muted)}
  .pool-info{background:rgba(230,247,241,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:.82rem;color:var(--green-dark);text-align:center;width:100%}
  .btn-start{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;border:none;padding:18px 48px;border-radius:14px;cursor:pointer;transition:background .2s,transform .15s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .btn-start:hover{background:var(--green-dark);transform:translateY(-2px)}
  #screen-quiz{gap:20px}
  .progress-row{width:100%;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.85);border-radius:12px;padding:8px 14px;}
  .progress-bar-track{flex:1;height:6px;background:var(--border);border-radius:100px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--green);border-radius:100px;transition:width .4s ease;width:0%}
  .progress-label{font-size:.82rem;color:var(--muted);white-space:nowrap;font-weight:500}
  .score-badge{background:var(--green-light);color:var(--green-dark);font-size:.82rem;font-weight:500;padding:5px 12px;border-radius:100px;white-space:nowrap}
  .question-card{background:white;border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06);animation:fadeIn .3s ease}
  .q-meta{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .q-theme-tag{background:var(--green-light);color:var(--green-dark);padding:2px 8px;border-radius:6px;font-style:normal}
  .diff-tag{padding:2px 8px;border-radius:6px;font-weight:600}
  .diff-facile{background:#e8f8f0;color:#0a6640}
  .diff-modere{background:#fff8e6;color:#7a5000}
  .diff-difficile{background:#fdeaea;color:#8c1a1a}
  .question-text{font-family:'Syne',sans-serif;font-size:clamp(1.05rem,2.5vw,1.22rem);font-weight:700;line-height:1.4;margin-bottom:24px}
  .options-grid{display:flex;flex-direction:column;gap:10px}
  .option-btn{width:100%;text-align:left;background-color:#f4efe9;border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:.95rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;line-height:1.4}
  .option-btn .opt-letter{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:white;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;color:var(--muted);transition:all .18s}
  .option-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-light)}
  .option-btn:hover:not(:disabled) .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn:disabled{cursor:default}
  .option-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:500}
  .option-btn.correct .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
  .option-btn.wrong .opt-letter{background:var(--red);border-color:var(--red);color:white}
  .option-btn.dimmed{opacity:.45}
  .feedback-box{margin-top:20px;padding:18px 20px;border-radius:12px;font-size:.9rem;line-height:1.6;display:none;animation:fadeIn .3s ease}
  .feedback-box.show{display:block}
  .feedback-box.correct-fb{background:var(--green-light);border-left:4px solid var(--green);color:#0f5c3c}
  .feedback-box.wrong-fb{background:var(--red-light);border-left:4px solid var(--red);color:#8c1a1a}
  .feedback-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:5px}
  .next-btn{width:100%;background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px;border-radius:12px;cursor:pointer;transition:background .2s;display:none}
  .next-btn.show{display:block}
  .next-btn:hover{background:var(--green-dark)}
  #screen-results{text-align:center;gap:24px}
  .result-circle{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--green) 0%,var(--green) var(--pct),var(--border) var(--pct));display:flex;align-items:center;justify-content:center;position:relative}
  .result-circle::before{content:'';position:absolute;width:110px;height:110px;border-radius:50%;background:white}
  .result-inner{position:relative;z-index:1;text-align:center}
  .result-score{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--green);line-height:1}
  .result-total{font-size:.8rem;color:var(--muted)}
  #screen-results h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;background:rgba(255,255,255,0.88);border-radius:12px;padding:8px 20px;display:inline-block}
  #screen-results .result-msg{color:var(--muted);max-width:420px;font-size:.95rem;line-height:1.6;background:rgba(255,255,255,0.88);border-radius:12px;padding:8px 16px}
  .review-list{width:100%;display:flex;flex-direction:column;gap:10px;text-align:left}
  .review-item{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:.88rem;display:flex;gap:12px;align-items:flex-start;line-height:1.5}
  .review-icon{flex-shrink:0;font-size:1rem;margin-top:1px}
  .review-q{font-weight:500;color:var(--text)}
  .review-diff{font-size:.72rem;font-weight:600;margin-top:2px}
  .review-ans{color:var(--muted);margin-top:2px}
  .review-ans strong{color:var(--green-dark)}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .retry-btn{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px 40px;border-radius:14px;cursor:pointer;transition:background .2s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .retry-btn:hover{background:var(--green-dark)}
  .home-btn{background:white;color:var(--green);font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;border:1.5px solid var(--green);padding:12px 28px;border-radius:14px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .home-btn:hover{background:var(--green-light)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="screen-intro" class="screen active">
  <div><div class="badge">Formation Officine</div>
  <h1><span>Pratique Vaccinale</span></h1></div>
  <p>Technique d'injection, conservation, traçabilité, situations critiques.</p>
  <div class="intro-stats">
    <div class="stat-pill"><strong>12</strong><span>questions</span></div>
    <div class="stat-pill"><strong>QCM</strong><span>format</span></div>
    <div class="stat-pill"><strong>~7 min</strong><span>durée</span></div>
  </div>
  <div class="pool-info">🎲 Tirage aléatoire — 36 questions disponibles</div>
  <button class="btn-start" onclick="startQuiz()">Commencer →</button>
</div>
<div id="screen-quiz" class="screen">
  <div class="progress-row">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label">1 / 12</span>
    <span class="score-badge" id="score-display">Score : 0</span>
  </div>
  <div class="question-card">
    <div class="q-meta">Question <span id="q-num">1</span>
      <em class="q-theme-tag" id="q-theme"></em>
      <span class="diff-tag" id="q-diff"></span>
    </div>
    <div class="question-text" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="fb-title"></div>
      <div id="fb-body"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
</div>
<div id="screen-results" class="screen">
  <div class="result-circle" id="result-circle">
    <div class="result-inner">
      <div class="result-score" id="res-score">0/12</div>
      <div class="result-total" id="res-pct">0%</div>
    </div>
  </div>
  <h2 id="res-title"></h2>
  <p class="result-msg" id="res-msg"></p>
  <div class="review-list" id="review-list"></div>
  <div class="btn-row">
    <button class="retry-btn" onclick="restartQuiz()">🔄 Nouveau tirage</button>
    <a class="home-btn" href="home.html">← Accueil</a>
  </div>
</div>
<script>
const QUIZ_ID = 'pratique-vaccinale';
const QUESTION_POOL = [
  {quiz:"pratique-vaccinale",theme:"Nombre d'injections",difficulte:"facile",
   text:"Combien d'injections peuvent être réalisées au maximum au cours d'une même séance de vaccination ?",
   options:["Une seule", "Deux", "Trois", "Pas de limite théorique, selon les sites disponibles"],correct:3,
   explanation:"Il n'y a <strong>pas de limite théorique</strong> au nombre d'injections par séance. En pratique, le nombre est limité par les sites d'injection disponibles (deltoïdes, cuisses) et la tolérance du patient. Les co-administrations multiples sont courantes dans le cadre du rattrapage vaccinal ou du calendrier nourrisson."},
  {quiz:"pratique-vaccinale",theme:"Réglementation",difficulte:"facile",
   text:"Quels vaccins sont exclus de la prescription officinale et nécessitent un centre spécialisé ?",
   options:["Hépatite A et B", "Grippe et Covid-19", "Fièvre jaune et rage (en prophylaxie pré-exposition)", "DTP et Pneumocoque"],correct:2,
   explanation:"La <strong>fièvre jaune</strong> ne peut être administrée que dans des centres de vaccination internationaux agréés, en raison de la nécessité d'un certificat international. La <strong>rage en prophylaxie pré-exposition</strong> relève également de centres spécialisés. Ces deux vaccins échappent à la prescription officinale."},
  {quiz:"pratique-vaccinale",theme:"Contre-indications",difficulte:"facile",
   text:"Une infection mineure (rhume, légère fièvre < 38,5°C) contre-indique-t-elle la vaccination ?",
   options:["Oui, toujours reporter", "Oui, risque d'inefficacité du vaccin", "Non, ce n'est pas une contre-indication", "Uniquement pour les vaccins vivants"],correct:2,
   explanation:"Une infection mineure (rhume, légère fièvre < 38,5°C, otite légère…) <strong>n'est pas une contre-indication à la vaccination</strong>. Reporter systématiquement la vaccination pour ces motifs bénins fait manquer des opportunités vaccinales. Seule une maladie fébrile aiguë sévère justifie un report temporaire."},
  {quiz:"pratique-vaccinale",theme:"Sur-vaccination",difficulte:"facile",
   text:"Est-il dangereux de vacciner par erreur une personne déjà immune (ex: oubli de carnet) ?",
   options:["Oui, risque de réaction grave", "Non, cela peut simplement augmenter les réactions locales (effet rappel)", "Oui, l'immunité s'annule", "Uniquement dangereux pour le tétanos"],correct:1,
   explanation:"Vacciner une personne déjà immune n'est <strong>pas dangereux</strong>. On observe parfois un <strong>effet rappel</strong> se traduisant par des réactions locales légèrement accentuées (rougeur, douleur). L'immunité est renforcée, pas annulée. C'est pourquoi il est préférable de vacciner plutôt que de ne pas vacciner en cas de doute sur le statut vaccinal."},
  {quiz:"pratique-vaccinale",theme:"Traçabilité",difficulte:"facile",
   text:"Quel document le pharmacien doit-il impérativement remplir après l'acte vaccinal pour la traçabilité ?",
   options:["Une facture détaillée", "La notice du vaccin", "Le carnet de santé (DMP ou papier) avec le numéro de lot du vaccin", "Une décharge de responsabilité"],correct:2,
   explanation:"Après toute vaccination, le pharmacien doit renseigner <strong>le carnet de santé</strong> (papier ou DMP — Dossier Médical Partagé) avec : le nom du vaccin, le numéro de lot, la date et le site d'injection. La traçabilité du numéro de lot est obligatoire pour permettre le suivi en cas de rappel de lot par le fabricant."},
  {quiz:"pratique-vaccinale",theme:"Élimination des déchets",difficulte:"facile",
   text:"Où doit-on éliminer la seringue et l'aiguille immédiatement après l'acte vaccinal ?",
   options:["Poubelle ménagère ordinaire", "Sac jaune des déchets d'activité de soins", "Sac DASRI rouge", "Collecteur d'aiguilles rigide (boîte jaune DASRI)"],correct:3,
   explanation:"Les aiguilles et seringues doivent être éliminées immédiatement dans un <strong>collecteur d'aiguilles rigide (boîte jaune DASRI)</strong> — sans recapuchonnage de l'aiguille pour éviter les AES. Ne jamais les mettre dans une poubelle ordinaire. Les collecteurs doivent être éliminés selon la filière DASRI réglementaire."},
  {quiz:"pratique-vaccinale",theme:"Allaitement",difficulte:"facile",
   text:"Peut-on vacciner une femme qui allaite ?",
   options:["Non, aucun vaccin n'est compatible avec l'allaitement", "Oui, l'allaitement ne contre-indique aucune vaccination (sauf exception très rare)", "Uniquement la grippe et le Covid", "Uniquement après 6 mois d'allaitement"],correct:1,
   explanation:"L'<strong>allaitement ne contre-indique pratiquement aucune vaccination</strong>. Les vaccins inactivés (grippe, coqueluche, hépatite B, pneumocoque…) sont compatibles sans restriction. Les vaccins vivants (ROR, varicelle) sont également compatibles avec l'allaitement selon les référentiels actuels. C'est un point important pour ne pas reporter des vaccinations chez les mères allaitantes."},
  {quiz:"pratique-vaccinale",theme:"Surveillance post-injection",difficulte:"facile",
   text:"Quel est le temps d'observation minimal recommandé après toute vaccination à l'officine ?",
   options:["5 minutes", "10 minutes", "15 minutes", "30 minutes"],correct:2,
   explanation:"Une surveillance de <strong>15 minutes</strong> minimum est recommandée après toute vaccination pour détecter une réaction anaphylactique précoce. Pour certains vaccins à risque allergique plus élevé (notamment en cas d'antécédent allergique), la surveillance peut être prolongée à 30 minutes. Le matériel d'urgence (adrénaline, antihistaminiques) doit être disponible."},
  {quiz:"pratique-vaccinale",theme:"Vaccination officinale — enfants",difficulte:"facile",
   text:"Un pharmacien peut-il prescrire et vacciner un enfant de 12 ans en 2026 ?",
   options:["Non, réservé aux médecins", "Oui, pour tous les vaccins du calendrier (hors exceptions voyage)", "Uniquement la grippe", "Uniquement sur ordonnance médicale"],correct:1,
   explanation:"Depuis 2023, les pharmaciens peuvent <strong>prescrire et administrer</strong> tous les vaccins du calendrier vaccinal aux personnes de <strong>11 ans et plus</strong>. Un enfant de 12 ans peut donc être vacciné en pharmacie sans ordonnance médicale préalable. Les seules exceptions concernent les vaccins nécessitant des centres spécialisés (fièvre jaune, rage pré-exposition)."},
  {quiz:"pratique-vaccinale",theme:"Malaise vagal",difficulte:"facile",
   text:"Que faire si un patient présente des signes de malaise vagal (pâleur, sueurs, nausées) après l'injection ?",
   options:["Lui donner du sucre en position assise", "L'allonger immédiatement avec les jambes surélevées", "Administrer de l'adrénaline", "Le laisser prendre l'air à l'extérieur"],correct:1,
   explanation:"Le malaise vagal (réaction vaso-vagale) est la réaction post-vaccinale la plus fréquente. La conduite est : <strong>allonger le patient immédiatement avec les jambes surélevées</strong> (position de Trendelenburg), ce qui restaure la perfusion cérébrale. Surveiller les constantes. Ne pas confondre avec une anaphylaxie (qui nécessite l'adrénaline)."},
  {quiz:"pratique-vaccinale",theme:"Conservation — congélation",difficulte:"facile",
   text:"Pourquoi ne faut-il jamais congeler un vaccin, même par erreur de réglage du réfrigérateur ?",
   options:["Il devient toxique", "Le gel détruit les adjuvants aluminiques et inactive le vaccin", "Il change de couleur définitivement", "Il ne peut plus être prélevé dans la seringue"],correct:1,
   explanation:"La congélation <strong>détruit irréversiblement les adjuvants aluminiques</strong> (hydroxyde d'aluminium) qui précipitent de façon permanente. Un vaccin congelé perd son immunogénicité tout en conservant un aspect visuel parfois normal. C'est pourquoi il faut toujours vérifier que le réfrigérateur ne descend pas en dessous de +2°C et utiliser le guide de stabilité en cas de doute."},
  {quiz:"pratique-vaccinale",theme:"Technique d'injection",difficulte:"facile",
   text:"Quelle est la conduite systématique avant d'injecter une seringue pré-remplie ?",
   options:["Purger l'air de la seringue", "Vérifier la tension artérielle du patient", "Homogénéiser la suspension par agitation douce", "Désinfecter l'aiguille avec un antiseptique"],correct:2,
   explanation:"Avant d'injecter une seringue pré-remplie (notamment pour les vaccins adsorbés avec dépôt), il faut <strong>homogénéiser la suspension par agitation douce</strong>. Le dépôt blanchâtre qui se forme pendant le stockage doit être remis en suspension pour garantir une dose homogène. Ne pas agiter vigoureusement. Vérifier également l'aspect (pas d'agrégats) et la date de péremption."},
  {quiz:"pratique-vaccinale",theme:"Technique",difficulte:"modere",
   text:"Quelle distance minimale doit séparer deux sites d'injection sur un même membre ?",
   options:["1 cm", "2,5 cm (environ deux doigts)", "10 cm", "Interdit sur le même membre"],correct:1,
   explanation:"Deux sites d'injection sur un même membre doivent être espacés d'au moins <strong>2,5 cm (environ deux largeurs de doigt)</strong>. Cette distance minimise les interactions entre les vaccins et permet de distinguer les réactions locales éventuelles. En pratique, les bras différents sont préférés, mais le même membre est autorisé si nécessaire."},
  {quiz:"pratique-vaccinale",theme:"Vaccins vivants",difficulte:"modere",
   text:"Quel intervalle respecter entre deux vaccins vivants s'ils ne sont pas co-administrés le même jour ?",
   options:["15 jours", "28 jours (4 semaines) minimum", "2 mois", "6 mois"],correct:1,
   explanation:"Deux vaccins vivants non co-administrés doivent être séparés de <strong>28 jours (4 semaines) minimum</strong>. En dessous de ce délai, le premier vaccin peut interférer avec la réplication du second (compétition virale), réduisant son immunogénicité. En revanche, co-administrés le même jour, aucun délai n'est requis."},
  {quiz:"pratique-vaccinale",theme:"Reconstitution",difficulte:"modere",
   text:"Dans quel délai maximal un vaccin reconstitué doit-il être administré (règle générale) ?",
   options:["1 heure", "Selon le RCP, généralement dans les 6 heures au réfrigérateur", "24 heures", "48 heures"],correct:1,
   explanation:"La règle générale est d'administrer un vaccin reconstitué <strong>selon les indications du RCP</strong>, généralement dans les <strong>6 heures au réfrigérateur</strong>. Par exemple, Shingrix® reconstitué peut être conservé 6h au frigo. Passé ce délai, le vaccin doit être éliminé. Toujours se référer au RCP spécifique de chaque vaccin car les délais varient."},
  {quiz:"pratique-vaccinale",theme:"Aiguille",difficulte:"modere",
   text:"Quelle aiguille privilégier pour une injection IM chez une personne très menue ou un enfant ?",
   options:["40mm verte (adulte standard)", "16mm orange (sous-cutanée)", "25mm bleue (IM standard)", "Aiguille à insuline (8mm)"],correct:2,
   explanation:"Pour une injection IM chez une personne menue ou un enfant, une <strong>aiguille de 25mm bleue</strong> est adaptée. L'aiguille de 40mm (verte) est réservée aux patients obèses. L'aiguille de 16mm (orange) est sous-cutanée. Le choix de la longueur doit garantir que le produit est bien déposé dans le muscle et non dans le tissu adipeux."},
  {quiz:"pratique-vaccinale",theme:"Aspect vaccin",difficulte:"modere",
   text:"Comment doit apparaître un vaccin adsorbé (type DTCaP, pneumocoque) après agitation ?",
   options:["Parfaitement limpide", "Suspension trouble et blanchâtre homogène", "Liquide avec dépôt solide résiduel", "Avec une coloration légèrement rosée"],correct:1,
   explanation:"Un vaccin adsorbé (contenant de l'aluminium comme adjuvant) doit présenter une <strong>suspension trouble et blanchâtre homogène</strong> après agitation. Un dépôt blanc au fond qui ne se remet pas en suspension, des agrégats persistants ou une coloration anormale sont des signes que le vaccin ne doit pas être utilisé (congélation possible, dégradation)."},
  {quiz:"pratique-vaccinale",theme:"Voie d'injection",difficulte:"modere",
   text:"Quel est le risque d'injecter un vaccin adsorbé par voie sous-cutanée au lieu d'intramusculaire ?",
   options:["Inefficacité totale du vaccin", "Risque accru de réactions locales sévères ou formation de nodules", "Choc anaphylactique", "Paralysie locale"],correct:1,
   explanation:"L'injection sous-cutanée d'un vaccin adsorbé (destiné à la voie IM) provoque un dépôt d'aluminium dans le tissu adipeux, entraînant un risque accru de <strong>réactions locales sévères</strong> (induration, érythème, douleur prolongée) et de <strong>nodules</strong> pouvant persister plusieurs mois. La réponse immunitaire peut également être sous-optimale."},
  {quiz:"pratique-vaccinale",theme:"Aiguille — changement",difficulte:"modere",
   text:"Pourquoi est-il recommandé de ne pas utiliser la même aiguille pour le prélèvement et l'injection ?",
   options:["Pour des raisons de coût", "Pour préserver le biseau de l'aiguille et garantir la stérilité", "Obligation légale systématique", "Pour changer de calibre selon le site"],correct:1,
   explanation:"Utiliser la même aiguille pour le prélèvement et l'injection <strong>émousse le biseau</strong>, rendant l'injection plus douloureuse. De plus, l'aiguille peut être contaminée lors du prélèvement à travers un bouchon (traces de caoutchouc). Changer l'aiguille entre le prélèvement et l'injection préserve le biseau et garantit la stérilité."},
  {quiz:"pratique-vaccinale",theme:"Hépatite B — rattrapage",difficulte:"modere",
   text:"Un patient a commencé un schéma hépatite B (2 doses reçues) et a oublié les 2 dernières doses. Que faire ?",
   options:["Recommencer à zéro avec 3 nouvelles doses", "Reprendre là où il s'est arrêté — les doses déjà reçues sont valides", "Administrer une double dose pour compenser", "Abandonner le schéma — délai trop long"],correct:1,
   explanation:"Principe fondamental du rattrapage vaccinal : <strong>on ne recommence jamais à zéro</strong>. Les doses déjà reçues restent valides quelle que soit la durée de l'interruption. On reprend le schéma là où il s'est arrêté en administrant les doses manquantes. Ce principe s'applique à tous les vaccins sauf exceptions spécifiques mentionnées dans le RCP."},
  {quiz:"pratique-vaccinale",theme:"Rupture de chaîne du froid",difficulte:"modere",
   text:"Un vaccin est resté 2h sur le comptoir à 20°C. Que faites-vous ?",
   options:["L'éliminer immédiatement", "L'utiliser normalement sans précaution", "Le mettre en quarantaine et vérifier le guide de stabilité selon le vaccin", "Le remettre au réfrigérateur sans rien noter"],correct:2,
   explanation:"En cas de doute sur la chaîne du froid, la bonne pratique est de <strong>mettre le vaccin en quarantaine</strong> et de <strong>consulter le guide de stabilité</strong> spécifique à ce vaccin. Certains vaccins tolèrent des excursions de température limitées. Il ne faut pas utiliser un vaccin potentiellement altéré ni l'éliminer systématiquement sans vérification — un guide de stabilité permet souvent de confirmer l'utilisation possible."},
  {quiz:"pratique-vaccinale",theme:"Immunodépression",difficulte:"modere",
   text:"À partir de quelle dose de prednisone (équivalent), sur plus de 2 semaines, les vaccins vivants sont-ils contre-indiqués ?",
   options:["2 mg/j", "5 mg/j", "10 mg/j", "40 mg/j"],correct:2,
   explanation:"Une corticothérapie à dose <strong>≥ 10 mg/j d'équivalent prednisone pendant plus de 2 semaines</strong> est considérée comme immunosuppressive et contre-indique les vaccins vivants atténués. En dessous de ce seuil, les vaccins vivants peuvent généralement être administrés. Cette règle des 10 mg/j est une référence pratique, à moduler selon le tableau clinique."},
  {quiz:"pratique-vaccinale",theme:"Substitution",difficulte:"modere",
   text:"Quelle est la règle de substitution d'un vaccin en pharmacie ?",
   options:["Libre, comme pour les médicaments génériques", "Possible uniquement si biosimilaire validé ou arrêté ministériel spécifique", "Interdite dans tous les cas", "Uniquement autorisée pour la grippe"],correct:1,
   explanation:"La substitution des vaccins en pharmacie est <strong>encadrée</strong> : contrairement aux médicaments génériques, les vaccins ne peuvent pas être substitués librement. Une substitution n'est possible que si elle est prévue par un <strong>arrêté ministériel spécifique</strong> (notamment en situation de pénurie). L'interchangeabilité est validée pour certains vaccins (ex: hépatite B entre marques), mais pas automatique."},
  {quiz:"pratique-vaccinale",theme:"Anticoagulants",difficulte:"modere",
   text:"Un patient sous aspirine 75mg/j peut-il être vacciné en IM ?",
   options:["Non, voie sous-cutanée obligatoire", "Oui, injection IM standard sans précaution particulière", "Arrêt de l'aspirine 3 jours avant", "Hospitalisation nécessaire"],correct:1,
   explanation:"L'aspirine à faible dose (75-100mg) <strong>ne contre-indique pas la vaccination IM</strong>. Une injection IM standard avec compression de quelques secondes suffit. Seuls les patients sous anticoagulants à dose thérapeutique (AVK avec INR élevé, AOD) requièrent une aiguille fine (23-25G) et une compression prolongée (2 minutes). L'arrêt de l'aspirine n'est pas nécessaire."},
  {quiz:"pratique-vaccinale",theme:"Vaccins vivants — urgence",difficulte:"difficile",
   text:"Exception de délai entre deux vaccins vivants en cas de départ imminent non simultanés ?",
   options:["Réduction à 7 jours validée", "Réduction à 15 jours validée", "Aucun délai raccourci validé — le risque d'interférence persiste", "Attente de 3 mois recommandée"],correct:2,
   explanation:"Il n'existe <strong>aucun délai raccourci validé</strong> entre deux vaccins vivants non co-administrés. Le risque d'interférence immunologique est maintenu quelle que soit l'urgence. La seule solution validée est la <strong>co-administration le même jour</strong>. En cas d'impossibilité, l'évaluation bénéfice/risque doit être faite avec le médecin en tenant compte du risque infectieux au voyage."},
  {quiz:"pratique-vaccinale",theme:"Aspect anormal",difficulte:"difficile",
   text:"Que faire si un vaccin présente une coloration anormale ou des agrégats persistants après agitation ?",
   options:["Filtrer le vaccin avant injection", "Mettre en quarantaine, ne pas utiliser et contacter le laboratoire", "Injecter quand même si la date est valide", "Diluer au NaCl 0,9%"],correct:1,
   explanation:"Tout vaccin présentant une <strong>coloration anormale ou des agrégats persistants</strong> après agitation ne doit <strong>pas être utilisé</strong>. Il faut le mettre en quarantaine, noter le numéro de lot, et contacter le laboratoire fabricant pour signalement. Ces anomalies peuvent signaler une dégradation, une contamination ou un problème de fabrication."},
  {quiz:"pratique-vaccinale",theme:"Hépatite B — interchangeabilité",difficulte:"difficile",
   text:"En rupture de stock, peut-on alterner deux marques différentes pour un schéma hépatite B ?",
   options:["Non, même marque obligatoire tout au long du schéma", "Faire une sérologie avant de continuer", "Oui, l'interchangeabilité des vaccins HBV est validée entre les spécialités", "Recommencer à zéro avec la nouvelle marque"],correct:2,
   explanation:"L'<strong>interchangeabilité des vaccins hépatite B</strong> entre spécialités est <strong>validée</strong> : Engerix B®, HBVaxPro®, Twinrix® (hépatite A+B) peuvent être utilisés indifféremment pour compléter un schéma. Cette interchangeabilité est une exception notable car pour d'autres vaccins (ex: HPV, rotavirus), l'interchangeabilité n'est pas recommandée."},
  {quiz:"pratique-vaccinale",theme:"Allergie — néomycine",difficulte:"difficile",
   text:"Quel antécédent allergique impose de vérifier la présence de néomycine dans un vaccin ?",
   options:["Allergie au lactose", "Antécédent de choc anaphylactique à cet antibiotique", "Allergie aux œufs", "Asthme allergique"],correct:1,
   explanation:"Un antécédent de <strong>choc anaphylactique à la néomycine</strong> impose de vérifier la composition du vaccin car plusieurs vaccins (MMR-II, Varivax, certains vaccins polio…) contiennent des traces de néomycine. En cas d'allergie documentée sévère, une évaluation spécialisée est nécessaire. Une allergie de contact (eczéma) ne contre-indique pas la vaccination."},
  {quiz:"pratique-vaccinale",theme:"Vaccins vivants — immunodéprimé",difficulte:"difficile",
   text:"Un patient immunodéprimé peut-il recevoir un vaccin vivant atténué (ex: ROR) ?",
   options:["Oui, avec une dose réduite", "Non, contre-indication absolue en cas d'immunodépression sévère", "À demi-dose uniquement", "Seulement si sérologie négative préalable"],correct:1,
   explanation:"Les vaccins vivants atténués sont <strong>contre-indiqués en cas d'immunodépression sévère</strong>. Le risque est que le pathogène atténué se réplique de façon incontrôlée chez l'hôte immunodéprimé et provoque une maladie vaccinale grave. La décision dépend du type et du degré d'immunodépression — une immunodépression légère (corticothérapie < 10mg/j) peut ne pas contre-indiquer."},
  {quiz:"pratique-vaccinale",theme:"Méthotrexate",difficulte:"difficile",
   text:"Pour un patient sous méthotrexate, quelle conduite optimise la réponse au vaccin grippal ?",
   options:["Doubler la dose du vaccin", "Suspendre le méthotrexate 2 semaines après la vaccination", "Arrêt définitif du méthotrexate", "Injection par voie intraveineuse"],correct:1,
   explanation:"Le méthotrexate réduit la réponse immunitaire aux vaccins. Une stratégie validée consiste à <strong>suspendre le méthotrexate pendant 2 semaines après la vaccination</strong> (et non avant) pour permettre une meilleure réponse immunitaire au vaccin grippal. Cette approche a été validée par des études cliniques chez les patients rhumatoïdes, avec un bénéfice sans aggravation de la maladie."},
  {quiz:"pratique-vaccinale",theme:"Désensibilisation allergique",difficulte:"difficile",
   text:"Peut-on utiliser le même site d'injection pour un vaccin et une désensibilisation allergique ?",
   options:["Oui, si les produits sont compatibles", "Non, il faut utiliser deux membres différents", "Oui, après 24h d'intervalle", "Uniquement si le vaccin est inactivé"],correct:1,
   explanation:"Un vaccin et une désensibilisation allergique doivent être administrés sur <strong>deux membres différents</strong>. L'utilisation du même site pourrait entraîner des interactions locales et rendre difficile l'interprétation des réactions (réaction au vaccin vs réaction à l'allergène). C'est une recommandation de bonne pratique pour la sécurité et la lisibilité des réactions."},
  {quiz:"pratique-vaccinale",theme:"AES",difficulte:"difficile",
   text:"Conduite à tenir en cas d'exposition accidentelle au sang (AES) lors d'une injection à l'officine ?",
   options:["Pansement compressif et surveillance", "Nettoyage immédiat, désinfection et orientation vers les urgences pour protocole AES", "Sérologie du patient en urgence", "Ne rien faire si le patient semble en bonne santé"],correct:1,
   explanation:"En cas d'AES (piqûre accidentelle) : <strong>1/ Nettoyage immédiat</strong> (eau + savon, rinçage abondant), <strong>2/ Désinfection</strong> avec antiseptique, <strong>3/ Orientation urgente vers les urgences ou le médecin du travail</strong> pour évaluation du risque (VIH, VHB, VHC) et mise en place d'un éventuel traitement prophylactique post-exposition dans les délais requis (< 4h pour VIH)."},
  {quiz:"pratique-vaccinale",theme:"Immunoglobulines",difficulte:"difficile",
   text:"Quelle précaution s'impose pour les vaccins vivants après une administration récente d'immunoglobulines ?",
   options:["Aucune précaution particulière", "Respecter un délai de 3 à 11 mois selon la dose d'Ig (neutralisation du vaccin)", "Co-administration possible le même jour", "Doubler la dose du vaccin vivant"],correct:1,
   explanation:"Les immunoglobulines neutralisent les vaccins vivants en circulant dans l'organisme. Un délai de <strong>3 à 11 mois</strong> doit être respecté entre l'administration d'immunoglobulines et un vaccin vivant, selon la dose d'Ig reçue. Ce délai est essentiel pour éviter que les anticorps passifs ne neutralisent le virus vaccinal avant qu'il puisse stimuler le système immunitaire."},
  {quiz:"pratique-vaccinale",theme:"Vaccin multidose",difficulte:"difficile",
   text:"Quelle est la durée de conservation d'un vaccin multidose après le premier prélèvement ?",
   options:["24 heures systématiquement", "7 jours dans tous les cas", "Selon le RCP : souvent 6 à 28 jours au réfrigérateur", "1 heure uniquement"],correct:2,
   explanation:"La durée de conservation d'un vaccin multidose après ouverture varie <strong>selon le RCP du produit</strong>. Elle est généralement de 6 à 28 jours au réfrigérateur pour les vaccins grippe multidoses. Toujours noter la date et l'heure d'ouverture. Respecter strictement les indications du RCP et éliminer le flacon si la durée est dépassée."},
  {quiz:"pratique-vaccinale",theme:"Urticaire post-injection",difficulte:"difficile",
   text:"Quelle est la conduite si un patient présente un urticaire 10 minutes après l'injection ?",
   options:["Le renvoyer chez lui avec des antihistaminiques", "Administrer un antihistaminique et surveiller étroitement — évaluer la progression vers une anaphylaxie", "Adrénaline d'emblée systématique", "Ne rien faire, c'est une réaction normale"],correct:1,
   explanation:"Un urticaire post-vaccinal doit être pris au sérieux. Conduite : <strong>administrer un antihistaminique</strong> et <strong>surveiller étroitement</strong> l'évolution. L'urticaire isolée peut évoluer vers une anaphylaxie (hypotension, bronchospasme) qui nécessiterait alors l'adrénaline IM (0,3-0,5mg en IM cuisse). Ne pas renvoyer le patient avant stabilisation complète. L'adrénaline n'est pas indiquée d'emblée pour un urticaire isolée sans signe systémique."},
  {quiz:"pratique-vaccinale",theme:"Rituximab",difficulte:"difficile",
   text:"Pour un patient traité par rituximab, quel est le moment optimal pour la vaccination grippe ?",
   options:["N'importe quand, l'efficacité est maintenue", "Juste avant la perfusion de rituximab", "Au moins 4 mois après la dernière cure (repopulation des lymphocytes B)", "Pendant la perfusion pour effet synergique"],correct:2,
   explanation:"Le rituximab (anti-CD20) détruit les lymphocytes B pendant plusieurs mois, rendant la réponse vaccinale insuffisante. Le moment optimal est <strong>au moins 4 mois après la dernière cure</strong>, quand la repopulation des lymphocytes B est suffisante. Vacciner trop tôt après rituximab aboutit à une protection inadéquate. Cette règle des 4 mois s'applique également aux autres vaccins."}
];

function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pickQuizQuestions(quizId){
  const pool=shuffleArray(QUESTION_POOL.filter(q=>q.quiz===quizId));
  const f=pool.filter(q=>q.difficulte==='facile');
  const m=pool.filter(q=>q.difficulte==='modere');
  const d=pool.filter(q=>q.difficulte==='difficile');
  let sel=[...f.slice(0,4),...m.slice(0,4),...d.slice(0,4)];
  if(sel.length<12){const used=new Set(sel.map(q=>q.text));const rem=shuffleArray(pool.filter(q=>!used.has(q.text)));sel=[...sel,...rem.slice(0,12-sel.length)];}
  return shuffleArray(sel.slice(0,12));
}

const DIFF_LABELS = {facile:'🟢 Facile', modere:'🟡 Modéré', difficile:'🔴 Difficile'};
const DIFF_CLASSES = {facile:'diff-facile', modere:'diff-modere', difficile:'diff-difficile'};

let current=0, score=0, userAnswers=[];
let shuffledQuestions=[], shuffledOptions=[];

function startQuiz(){
  current=0; score=0; userAnswers=[];
  shuffledQuestions=pickQuizQuestions(QUIZ_ID);
  shuffledOptions=shuffledQuestions.map(q=>shuffleArray(q.options.map((text,origIndex)=>({text,origIndex}))));
  showScreen('screen-quiz'); renderQuestion();
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function renderQuestion(){
  const q=shuffledQuestions[current],opts=shuffledOptions[current],total=shuffledQuestions.length;
  document.getElementById('progress-bar').style.width=((current/total)*100)+'%';
  document.getElementById('progress-label').textContent=(current+1)+' / '+total;
  document.getElementById('score-display').textContent='Score : '+score;
  document.getElementById('q-num').textContent=current+1;
  document.getElementById('q-theme').textContent=q.theme;
  const de=document.getElementById('q-diff');
  de.textContent=DIFF_LABELS[q.difficulte]||q.difficulte;
  de.className='diff-tag '+(DIFF_CLASSES[q.difficulte]||'');
  document.getElementById('q-text').textContent=q.text;
  const grid=document.getElementById('options-grid'); grid.innerHTML='';
  const letters=['A','B','C','D'];
  opts.forEach((opt,di)=>{
    const btn=document.createElement('button'); btn.className='option-btn';
    btn.innerHTML='<span class="opt-letter">'+letters[di]+'</span><span>'+opt.text+'</span>';
    btn.onclick=(function(o){return function(){selectAnswer(o.origIndex);};})(opt);
    grid.appendChild(btn);
  });
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('next-btn').className='next-btn';
}
function selectAnswer(chosenOrig){
  const q=shuffledQuestions[current],opts=shuffledOptions[current];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const ok=chosenOrig===q.correct; if(ok)score++; userAnswers[current]=chosenOrig;
  document.querySelectorAll('.option-btn').forEach((btn,di)=>{
    const orig=opts[di].origIndex;
    if(orig===q.correct)btn.classList.add('correct');
    else if(orig===chosenOrig&&!ok)btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });
  const fb=document.getElementById('feedback-box');
  document.getElementById('fb-title').textContent=ok?'✓ Bonne réponse !':'✗ Pas tout à fait…';
  document.getElementById('fb-body').innerHTML=q.explanation;
  fb.className='feedback-box show '+(ok?'correct-fb':'wrong-fb');
  const nb=document.getElementById('next-btn'); nb.className='next-btn show';
  nb.textContent=current<shuffledQuestions.length-1?'Question suivante →':'Voir mes résultats →';
}
function nextQuestion(){current++;if(current>=shuffledQuestions.length)showResults();else renderQuestion();}
function showResults(){
  showScreen('screen-results');
  const total=shuffledQuestions.length,pct=Math.round((score/total)*100);
  document.getElementById('res-score').textContent=score+'/'+total;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('result-circle').style.setProperty('--pct',pct+'%');
  const t=['🔁 À retravailler','📚 Des lacunes à combler','👍 Très bon niveau','🏆 Expertise confirmée !'];
  const m=['Les fondamentaux ne sont pas encore acquis. Recommencez après révision.',
           'Niveau intermédiaire. Certains points méritent une révision.',
           'Bonne maîtrise. Relisez les points manqués pour consolider.',
           'Résultat parfait. Votre maîtrise est solide.'];
  const idx=pct===100?3:pct>=75?2:pct>=50?1:0;
  document.getElementById('res-title').textContent=t[idx];
  document.getElementById('res-msg').textContent=m[idx];
  const list=document.getElementById('review-list'); list.innerHTML='';
  shuffledQuestions.forEach((q,i)=>{
    const ok=userAnswers[i]===q.correct;
    const item=document.createElement('div'); item.className='review-item';
    item.innerHTML='<span class="review-icon">'+(ok?'✅':'❌')+'</span><div>'
      +'<div class="review-q">'+q.text+'</div>'
      +'<div class="review-diff '+(DIFF_CLASSES[q.difficulte]||'')+'">'+( DIFF_LABELS[q.difficulte]||'')+'</div>'
      +(!ok?'<div class="review-ans">Bonne réponse : <strong>'+q.options[q.correct]+'</strong></div>':'')
      +'</div>';
    list.appendChild(item);
  });
}
function restartQuiz(){startQuiz();}

</script>
