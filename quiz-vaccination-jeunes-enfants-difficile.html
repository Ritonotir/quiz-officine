<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Vaccination Jeunes Enfants – Difficile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--green:#1a9e6e;--green-dark:#0f7a53;--green-light:#e6f7f1;--red:#e84040;--red-light:#fdeaea;--bg:#f4f6f3;--text:#1a1f1c;--muted:#6b7672;--border:#dde5e0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
  .screen{display:none;width:100%;max-width:680px}
  .screen.active{display:flex;flex-direction:column;align-items:center}
  #screen-intro{text-align:center;gap:20px}
  .badge{display:inline-block;background:var(--green);color:white;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:8px}
  #screen-intro h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,6vw,3rem);font-weight:800;line-height:1.1}
  #screen-intro h1 span{color:var(--green)}
  #screen-intro p{color:var(--muted);font-size:1rem;max-width:460px}
  .intro-stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .stat-pill{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 22px;text-align:center;min-width:100px}
  .stat-pill strong{display:block;font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--green)}
  .stat-pill span{font-size:.82rem;color:var(--muted)}
  .btn-start{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;border:none;padding:18px 48px;border-radius:14px;cursor:pointer;transition:background .2s,transform .15s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .btn-start:hover{background:var(--green-dark);transform:translateY(-2px)}
  #screen-quiz{gap:20px}
  .progress-row{width:100%;display:flex;align-items:center;gap:12px}
  .progress-bar-track{flex:1;height:6px;background:var(--border);border-radius:100px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--green);border-radius:100px;transition:width .4s ease;width:0%}
  .progress-label{font-size:.82rem;color:var(--muted);white-space:nowrap;font-weight:500}
  .score-badge{background:var(--green-light);color:var(--green-dark);font-size:.82rem;font-weight:500;padding:5px 12px;border-radius:100px;white-space:nowrap}
  .question-card{background:white;border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06);animation:fadeIn .3s ease}
  .q-meta{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .q-meta em{background:var(--green-light);color:var(--green-dark);padding:2px 8px;border-radius:6px;font-style:normal;margin-left:6px}
  .question-text{font-family:'Syne',sans-serif;font-size:clamp(1.05rem,2.5vw,1.22rem);font-weight:700;line-height:1.4;margin-bottom:24px}
  .options-grid{display:flex;flex-direction:column;gap:10px}
  .option-btn{width:100%;text-align:left;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:.95rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;line-height:1.4}
  .option-btn .opt-letter{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:white;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;color:var(--muted);transition:all .18s}
  .option-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-light)}
  .option-btn:hover:not(:disabled) .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn:disabled{cursor:default}
  .option-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:500}
  .option-btn.correct .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
  .option-btn.wrong .opt-letter{background:var(--red);border-color:var(--red);color:white}
  .option-btn.dimmed{opacity:.45}
  .feedback-box{margin-top:20px;padding:18px 20px;border-radius:12px;font-size:.9rem;line-height:1.6;display:none;animation:fadeIn .3s ease}
  .feedback-box.show{display:block}
  .feedback-box.correct-fb{background:var(--green-light);border-left:4px solid var(--green);color:#0f5c3c}
  .feedback-box.wrong-fb{background:var(--red-light);border-left:4px solid var(--red);color:#8c1a1a}
  .feedback-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:5px}
  .next-btn{width:100%;background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px;border-radius:12px;cursor:pointer;transition:background .2s;display:none}
  .next-btn.show{display:block}
  .next-btn:hover{background:var(--green-dark)}
  #screen-results{text-align:center;gap:24px}
  .result-circle{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--green) 0%,var(--green) var(--pct),var(--border) var(--pct));display:flex;align-items:center;justify-content:center;position:relative}
  .result-circle::before{content:'';position:absolute;width:110px;height:110px;border-radius:50%;background:white}
  .result-inner{position:relative;z-index:1;text-align:center}
  .result-score{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--green);line-height:1}
  .result-total{font-size:.8rem;color:var(--muted)}
  #screen-results h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800}
  #screen-results .result-msg{color:var(--muted);max-width:420px;font-size:.95rem;line-height:1.6}
  .review-list{width:100%;display:flex;flex-direction:column;gap:10px;text-align:left}
  .review-item{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:.88rem;display:flex;gap:12px;align-items:flex-start;line-height:1.5}
  .review-icon{flex-shrink:0;font-size:1rem;margin-top:1px}
  .review-q{font-weight:500;color:var(--text)}
  .review-ans{color:var(--muted);margin-top:2px}
  .review-ans strong{color:var(--green-dark)}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .retry-btn{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px 40px;border-radius:14px;cursor:pointer;transition:background .2s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .retry-btn:hover{background:var(--green-dark)}
  .home-btn{background:white;color:var(--green);font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;border:1.5px solid var(--green);padding:12px 28px;border-radius:14px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .home-btn:hover{background:var(--green-light)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="screen-intro" class="screen active">
  <div><div class="badge">Formation Officine</div>
  <h1>Vaccination<br><span>Jeunes Enfants – Difficile</span></h1></div>
  <p>Situations complexes : schémas avancés, pénurie, rattrapage, immunodépression, effets indésirables, cocooning.</p>
  <div class="intro-stats">
    <div class="stat-pill"><strong>12</strong><span>questions</span></div>
    <div class="stat-pill"><strong>QCM</strong><span>format</span></div>
    <div class="stat-pill"><strong>~7 min</strong><span>durée</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Commencer →</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="progress-row">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label">1 / 12</span>
    <span class="score-badge" id="score-display">Score : 0</span>
  </div>
  <div class="question-card">
    <div class="q-meta">Question <span id="q-num">1</span> <em id="q-theme"></em></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="fb-title"></div>
      <div id="fb-body"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
</div>

<div id="screen-results" class="screen">
  <div class="result-circle" id="result-circle">
    <div class="result-inner">
      <div class="result-score" id="res-score">0/12</div>
      <div class="result-total" id="res-pct">0%</div>
    </div>
  </div>
  <h2 id="res-title"></h2>
  <p class="result-msg" id="res-msg"></p>
  <div class="review-list" id="review-list"></div>
  <div class="btn-row">
    <button class="retry-btn" onclick="restartQuiz()">🔄 Recommencer</button>
    <a class="home-btn" href="home.html">← Accueil</a>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    theme:"Hexavalent – schémas",
    text:"Quelle est la différence pratique entre le schéma 2 doses + 1 rappel et le schéma 3 doses + 1 rappel pour l'hexavalent ?",
    options:["Le schéma 3+1 est réservé aux enfants immunodéprimés uniquement","Le schéma 2+1 est le schéma standard pour les nourrissons à terme ; le schéma 3+1 (2, 3 et 4 mois + rappel à 11 mois) est recommandé pour les prématurés","Le schéma 3+1 est utilisé en cas d'oubli d'une dose dans le schéma 2+1","Les deux schémas sont interchangeables au choix du médecin"],
    correct:1,
    explanation:"Le schéma <strong>2+1</strong> (2 et 4 mois + rappel 11 mois) est le schéma standard pour les nourrissons <strong>nés à terme</strong>. Le schéma <strong>3+1</strong> (2, 3 et 4 mois + rappel 11 mois) est réservé aux <strong>prématurés</strong> (< 37 SA) : leur système immunitaire moins mature nécessite une stimulation plus rapprochée pour assurer une protection précoce suffisante. Le rappel à 11 mois est maintenu dans les deux cas."
  },
  {
    theme:"Rattrapage vaccinal",
    text:"Un enfant de 4 ans a reçu 2 doses d'hexavalent à 2 et 4 mois, puis a été perdu de vue. Que doit proposer le médecin pour compléter sa vaccination ?",
    options:["Tout recommencer depuis le début avec un nouveau schéma complet","Reprendre le schéma là où il a été interrompu : administrer le rappel manquant, adapté à l'âge","Attendre 6 ans pour intégrer le rappel DTCaP directement","Une seule dose de rattrapage suffit quelle que soit la lacune"],
    correct:1,
    explanation:"Principe fondamental du rattrapage : <strong>il n'est jamais nécessaire de recommencer un schéma vaccinal depuis le début</strong>. On reprend là où il a été interrompu. Ici : la 3ème dose (rappel) est manquante — le médecin administre cette dose en adaptant le vaccin à l'âge (DTCaP à 4 ans, l'hexavalent étant réservé aux nourrissons). Les doses déjà reçues restent valides."
  },
  {
    theme:"Pénurie / Substitution",
    text:"En cas de pénurie de vaccin pédiatrique DTCaP à 6 ans, quel vaccin le médecin peut-il utiliser en substitution et avec quelle précaution ?",
    options:["Le vaccin dTcaP adulte peut être utilisé sans précaution particulière","Le vaccin dTcaP adulte (doses réduites) peut être utilisé, mais le rappel de 11-13 ans devra être réalisé avec un vaccin à pleine dose DTCaP pour compenser","Aucun substitut n'est possible, la vaccination doit être reportée","Le vaccin hexavalent peut être utilisé jusqu'à 10 ans en cas de pénurie"],
    correct:1,
    explanation:"En situation de pénurie, le vaccin <strong>dTcaP adulte</strong> (doses réduites en diphtérie et coqueluche : Boostrix Tetra®, Repevax®) peut être utilisé à 6 ans. <strong>Précaution clé</strong> : son utilisation à 6 ans implique d'adapter le rappel suivant : le rappel de 11-13 ans devra être réalisé avec un vaccin à <strong>pleine dose DTCaP</strong> pour compenser — c'est l'inverse du schéma habituel."
  },
  {
    theme:"Pénurie / Substitution",
    text:"Un enfant a reçu un vaccin dTcaP (dose réduite adulte) à 6 ans par nécessité. Comment le médecin doit-il gérer le rappel de 11-13 ans ?",
    options:["Rappel normal avec dTcaP à doses réduites comme prévu","Rappel avec DTCaP à pleine dose pour compenser les doses réduites reçues à 6 ans","Pas de rappel nécessaire à 11-13 ans si dTcaP reçu à 6 ans","Rappel avancé à 9 ans avec dTcaP"],
    correct:1,
    explanation:"Si le rappel de 6 ans a été réalisé avec un vaccin à <strong>doses réduites (dTcaP)</strong>, le rappel de 11-13 ans doit être réalisé avec un vaccin à <strong>pleine dose (DTCaP)</strong>. C'est l'inverse du schéma habituel : normalement, c'est le rappel de 6 ans en pleine dose et celui de 11-13 ans en doses réduites. L'inversion impose d'adapter en conséquence pour maintenir une immunité optimale."
  },
  {
    theme:"Coqueluche",
    text:"Pourquoi l'immunité conférée par le vaccin contre la coqueluche (composant acellulaire) est-elle moins durable que celle induite par la maladie naturelle ?",
    options:["Le vaccin acellulaire contient trop peu d'antigènes pour stimuler durablement le système immunitaire","La maladie naturelle expose à l'ensemble des antigènes bactériens et génère une réponse plus large et durable, tandis que le vaccin acellulaire ne contient que 2 à 5 antigènes purifiés","Les rappels vaccinaux neutralisent la mémoire immunitaire","Le système immunitaire ne reconnaît pas les antigènes acellulaires à long terme"],
    correct:1,
    explanation:"Le vaccin <strong>acellulaire (Ca)</strong> ne contient que <strong>2 à 5 antigènes purifiés</strong> de Bordetella pertussis. La maladie naturelle expose à l'ensemble du pathogène, générant une réponse plus large et plus durable. Cette limitation explique la nécessité de rappels fréquents (6 ans, 11-13 ans) et la stratégie de <strong>cocooning</strong> pour protéger les nourrissons non encore immunisés."
  },
  {
    theme:"Effets indésirables",
    text:"Des parents vous signalent que leur nourrisson de 2 mois a eu de la fièvre 48h après son hexavalent. Quels effets sont attendus et lesquels doivent alerter ?",
    options:["Tout signe après un vaccin est anormal et impose une consultation urgente","Fièvre modérée, irritabilité et rougeur locale sont attendus ; fièvre > 40°C, convulsions ou malaise intense doivent alerter","La fièvre est toujours un signe grave après vaccination du nourrisson","Seule une rougeur locale est normale ; toute fièvre impose un avis médical"],
    correct:1,
    explanation:"Les <strong>effets attendus</strong> après l'hexavalent : fièvre modérée (38-39°C), irritabilité, pleurs, rougeur/gonflement au site d'injection — tous régressent en 24-48h. Les <strong>signes d'alarme</strong> : fièvre > 40°C persistante, convulsions, hypotonie, malaise intense, pleurs inconsolables > 3h, réaction allergique. Ces signes sont rares mais imposent une évaluation médicale rapide."
  },
  {
    theme:"Rotavirus",
    text:"Pourquoi la vaccination contre le rotavirus doit-elle impérativement débuter avant 12 semaines de vie ?",
    options:["Le nourrisson devient immunocompétent uniquement avant 12 semaines","Le risque d'invagination intestinale aiguë, effet indésirable rare du vaccin, augmente avec l'âge — une première dose tardive est donc plus risquée","Le rotavirus ne circule que dans les premières semaines de vie","Les anticorps maternels neutralisent le vaccin après 12 semaines"],
    correct:1,
    explanation:"L'effet indésirable rare mais grave des vaccins rotavirus est l'<strong>invagination intestinale aiguë (IIA)</strong>. Le risque naturel d'IIA augmente avec l'âge du nourrisson. Administrer la première dose après 12 semaines expose à un risque accru d'IIA post-vaccinale. La fenêtre étroite (6 à 12 semaines pour la 1ère dose) a été définie pour maximiser le rapport bénéfice/risque. C'est une <strong>contre-indication définitive</strong> si la fenêtre est dépassée."
  },
  {
    theme:"ROR – contre-indications",
    text:"Quelle est la contre-indication absolue à la vaccination par le ROR, et comment la dépister au comptoir ?",
    options:["L'allergie aux œufs — vérifier par un questionnaire systématique","L'immunodépression sévère — demander les antécédents médicaux et traitements en cours","La prématurité — le ROR est contre-indiqué avant 18 mois chez le prématuré","La fièvre — tout état fébrile contre-indique le ROR de manière définitive"],
    correct:1,
    explanation:"Le ROR est un vaccin <strong>vivant atténué</strong> : sa principale contre-indication absolue est l'<strong>immunodépression sévère</strong> (déficit immunitaire congénital, VIH avec CD4 bas, chimiothérapie, corticothérapie immunosuppressive > 10 mg/j d'équivalent prednisone). Au comptoir : interroger sur les traitements immunosuppresseurs et les antécédents. L'allergie à l'œuf n'est plus une contre-indication depuis la reformulation des vaccins actuels."
  },
  {
    theme:"ROR – désinformation",
    text:"Un parent refuse le vaccin ROR pour son enfant de 12 mois en invoquant un lien avec l'autisme. Quels arguments factuels lui apporter ?",
    options:["Reconnaître l'incertitude scientifique et respecter le choix parental sans argumenter","L'étude de Wakefield établissant ce lien a été rétractée pour fraude scientifique ; de nombreuses études portant sur des millions d'enfants confirment l'absence de lien entre ROR et autisme","Le lien avec l'autisme existe mais concerne uniquement les enfants génétiquement prédisposés","Minimiser les craintes sans donner d'arguments précis"],
    correct:1,
    explanation:"L'étude de <strong>Wakefield (1998)</strong> est à l'origine de cette rumeur. Elle a été <strong>rétractée par The Lancet en 2010</strong> pour fraude scientifique. Depuis, de nombreuses études portant sur <strong>des centaines de milliers d'enfants</strong> ont confirmé l'absence de lien entre ROR et autisme, dont une étude danoise de 2019 sur 650 000 enfants suivis plus de 10 ans. Il est important de délivrer cette information factuellement, sans stigmatiser le parent."
  },
  {
    theme:"ROR – immunodépression",
    text:"Un enfant immunodéprimé doit recevoir le ROR. Quelle est la règle générale concernant les vaccins vivants atténués chez ce profil ?",
    options:["Les vaccins vivants sont autorisés si l'immunodépression est légère","Les vaccins vivants atténués sont contre-indiqués en cas d'immunodépression sévère car le pathogène atténué peut se répliquer et provoquer une infection vraie","Les vaccins vivants peuvent être administrés en doublant la dose","Il n'existe pas de règle générale, cela dépend uniquement du vaccin"],
    correct:1,
    explanation:"Les <strong>vaccins vivants atténués</strong> sont <strong>contre-indiqués en cas d'immunodépression sévère</strong> : le pathogène atténué peut se répliquer normalement chez un hôte immunodéprimé et provoquer une infection vraie. La décision dépend du type et du degré d'immunodépression. Idéalement, vacciner <strong>4 à 6 semaines avant</strong> la mise en place d'une immunosuppression programmée."
  },
  {
    theme:"Corticothérapie",
    text:"Un enfant de 3 ans reçoit une corticothérapie au long cours. Quelles précautions le médecin doit-il prendre concernant sa vaccination ?",
    options:["Tous les vaccins sont contre-indiqués pendant une corticothérapie","Les vaccins inactivés peuvent être administrés normalement ; les vaccins vivants sont contre-indiqués si la dose est immunosuppressive (> 10 mg/j d'équivalent prednisone ou > 2 mg/kg/j)","La corticothérapie n'a aucun impact sur la vaccination","Tous les vaccins doivent être administrés en urgence avant le début de la corticothérapie"],
    correct:1,
    explanation:"Sous corticothérapie : les <strong>vaccins inactivés</strong> (hexavalent, pneumocoque, méningocoque…) peuvent être administrés, mais leur efficacité peut être réduite. Les <strong>vaccins vivants atténués</strong> (ROR…) sont contre-indiqués si la dose est <strong>immunosuppressive (> 10 mg/j ou > 2 mg/kg/j chez l'enfant)</strong>. Idéalement, vacciner avant la mise en place du traitement ou 1 mois après l'arrêt. Évaluation au cas par cas avec le spécialiste."
  },
  {
    theme:"Cocooning",
    text:"Quelle est la stratégie de « cocooning » et pour quel vaccin est-elle particulièrement recommandée en France ?",
    options:["C'est la vaccination du nourrisson en plusieurs doses rapprochées pour créer une immunité rapide","C'est la vaccination de l'entourage du nourrisson pour le protéger indirectement avant qu'il soit lui-même vacciné — particulièrement recommandée pour la coqueluche","C'est la stratégie qui consiste à vacciner en priorité les enfants vivant en collectivité","C'est la vaccination préventive avant un voyage à l'étranger"],
    correct:1,
    explanation:"Le <strong>cocooning</strong> consiste à vacciner l'<strong>entourage immédiat</strong> du nourrisson (parents, fratrie, grands-parents, assistante maternelle) pour créer un « bouclier » protecteur avant qu'il soit lui-même immunisé. Il est particulièrement recommandé pour la <strong>coqueluche</strong> : le nourrisson est très vulnérable avant 2 mois (pas encore vacciné) et la coqueluche peut être mortelle dans les premières semaines de vie. La vaccination maternelle pendant la grossesse (stratégie complémentaire) est également recommandée."
  }
];

let current=0,score=0,userAnswers=[];
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function startQuiz(){current=0;score=0;userAnswers=[];showScreen('screen-quiz');renderQuestion()}
function renderQuestion(){
  const q=QUESTIONS[current],total=QUESTIONS.length;
  document.getElementById('progress-bar').style.width=((current/total)*100)+'%';
  document.getElementById('progress-label').textContent=`${current+1} / ${total}`;
  document.getElementById('score-display').textContent=`Score : ${score}`;
  document.getElementById('q-num').textContent=current+1;
  document.getElementById('q-theme').textContent=q.theme;
  document.getElementById('q-text').textContent=q.text;
  const grid=document.getElementById('options-grid');grid.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="opt-letter">${l}</span><span>${q.options[i]}</span>`;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('next-btn').className='next-btn';
}
function selectAnswer(chosen){
  const q=QUESTIONS[current];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const ok=chosen===q.correct;if(ok)score++;userAnswers[current]=chosen;
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{if(i===q.correct)btn.classList.add('correct');else if(i===chosen&&!ok)btn.classList.add('wrong');else btn.classList.add('dimmed')});
  const fb=document.getElementById('feedback-box');
  document.getElementById('fb-title').textContent=ok?'✓ Bonne réponse !':'✗ Pas tout à fait…';
  document.getElementById('fb-body').innerHTML=q.explanation;
  fb.className='feedback-box show '+(ok?'correct-fb':'wrong-fb');
  const nb=document.getElementById('next-btn');nb.className='next-btn show';
  nb.textContent=current<QUESTIONS.length-1?'Question suivante →':'Voir mes résultats →';
}
function nextQuestion(){current++;if(current>=QUESTIONS.length)showResults();else renderQuestion()}
function showResults(){
  showScreen('screen-results');
  const total=QUESTIONS.length,pct=Math.round((score/total)*100);
  document.getElementById('res-score').textContent=`${score}/${total}`;
  document.getElementById('res-pct').textContent=`${pct}%`;
  document.getElementById('result-circle').style.setProperty('--pct',pct+'%');
  const t=['🔁 À retravailler','📚 Des lacunes à combler','👍 Très bon niveau','🏆 Expertise confirmée !'];
  const m=['Ce niveau requiert une révision approfondie du calendrier et des cas complexes.','Niveau intermédiaire. Certaines situations complexes méritent une révision.','Très bonne maîtrise. Relisez les points manqués pour atteindre l\'expertise.','Parfait. Vous maîtrisez les situations vaccinales complexes du nourrisson.'];
  const idx=pct===100?3:pct>=75?2:pct>=50?1:0;
  document.getElementById('res-title').textContent=t[idx];document.getElementById('res-msg').textContent=m[idx];
  const list=document.getElementById('review-list');list.innerHTML='';
  QUESTIONS.forEach((q,i)=>{const ok=userAnswers[i]===q.correct;const item=document.createElement('div');item.className='review-item';item.innerHTML=`<span class="review-icon">${ok?'✅':'❌'}</span><div><div class="review-q">${q.text}</div>${!ok?`<div class="review-ans">Bonne réponse : <strong>${q.options[q.correct]}</strong></div>`:''}</div>`;list.appendChild(item)});
}
function restartQuiz(){startQuiz()}
</script>
