<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Vaccination Femme Enceinte – Difficile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--green:#1a9e6e;--green-dark:#0f7a53;--green-light:#e6f7f1;--red:#e84040;--red-light:#fdeaea;--bg:#f4f6f3;--text:#1a1f1c;--muted:#6b7672;--border:#dde5e0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
  .screen{display:none;width:100%;max-width:680px}
  .screen.active{display:flex;flex-direction:column;align-items:center}
  #screen-intro{text-align:center;gap:20px}
  .badge{display:inline-block;background:var(--green);color:white;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:8px}
  #screen-intro h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,6vw,3rem);font-weight:800;line-height:1.1}
  #screen-intro h1 span{color:var(--green)}
  #screen-intro p{color:var(--muted);font-size:1rem;max-width:460px}
  .intro-stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .stat-pill{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 22px;text-align:center;min-width:100px}
  .stat-pill strong{display:block;font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--green)}
  .stat-pill span{font-size:.82rem;color:var(--muted)}
  .btn-start{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;border:none;padding:18px 48px;border-radius:14px;cursor:pointer;transition:background .2s,transform .15s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .btn-start:hover{background:var(--green-dark);transform:translateY(-2px)}
  #screen-quiz{gap:20px}
  .progress-row{width:100%;display:flex;align-items:center;gap:12px}
  .progress-bar-track{flex:1;height:6px;background:var(--border);border-radius:100px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--green);border-radius:100px;transition:width .4s ease;width:0%}
  .progress-label{font-size:.82rem;color:var(--muted);white-space:nowrap;font-weight:500}
  .score-badge{background:var(--green-light);color:var(--green-dark);font-size:.82rem;font-weight:500;padding:5px 12px;border-radius:100px;white-space:nowrap}
  .question-card{background:white;border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06);animation:fadeIn .3s ease}
  .q-meta{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .q-meta em{background:var(--green-light);color:var(--green-dark);padding:2px 8px;border-radius:6px;font-style:normal;margin-left:6px}
  .question-text{font-family:'Syne',sans-serif;font-size:clamp(1.05rem,2.5vw,1.22rem);font-weight:700;line-height:1.4;margin-bottom:24px}
  .options-grid{display:flex;flex-direction:column;gap:10px}
  .option-btn{width:100%;text-align:left;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:.95rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;line-height:1.4}
  .option-btn .opt-letter{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:white;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;color:var(--muted);transition:all .18s}
  .option-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-light)}
  .option-btn:hover:not(:disabled) .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn:disabled{cursor:default}
  .option-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:500}
  .option-btn.correct .opt-letter{background:var(--green);border-color:var(--green);color:white}
  .option-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}
  .option-btn.wrong .opt-letter{background:var(--red);border-color:var(--red);color:white}
  .option-btn.dimmed{opacity:.45}
  .feedback-box{margin-top:20px;padding:18px 20px;border-radius:12px;font-size:.9rem;line-height:1.6;display:none;animation:fadeIn .3s ease}
  .feedback-box.show{display:block}
  .feedback-box.correct-fb{background:var(--green-light);border-left:4px solid var(--green);color:#0f5c3c}
  .feedback-box.wrong-fb{background:var(--red-light);border-left:4px solid var(--red);color:#8c1a1a}
  .feedback-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:5px}
  .next-btn{width:100%;background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px;border-radius:12px;cursor:pointer;transition:background .2s;display:none}
  .next-btn.show{display:block}
  .next-btn:hover{background:var(--green-dark)}
  #screen-results{text-align:center;gap:24px}
  .result-circle{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--green) 0%,var(--green) var(--pct),var(--border) var(--pct));display:flex;align-items:center;justify-content:center;position:relative}
  .result-circle::before{content:'';position:absolute;width:110px;height:110px;border-radius:50%;background:white}
  .result-inner{position:relative;z-index:1;text-align:center}
  .result-score{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--green);line-height:1}
  .result-total{font-size:.8rem;color:var(--muted)}
  #screen-results h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800}
  #screen-results .result-msg{color:var(--muted);max-width:420px;font-size:.95rem;line-height:1.6}
  .review-list{width:100%;display:flex;flex-direction:column;gap:10px;text-align:left}
  .review-item{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:.88rem;display:flex;gap:12px;align-items:flex-start;line-height:1.5}
  .review-icon{flex-shrink:0;font-size:1rem;margin-top:1px}
  .review-q{font-weight:500;color:var(--text)}
  .review-ans{color:var(--muted);margin-top:2px}
  .review-ans strong{color:var(--green-dark)}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .retry-btn{background:var(--green);color:white;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;border:none;padding:16px 40px;border-radius:14px;cursor:pointer;transition:background .2s;box-shadow:0 4px 20px rgba(26,158,110,.3)}
  .retry-btn:hover{background:var(--green-dark)}
  .home-btn{background:white;color:var(--green);font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;border:1.5px solid var(--green);padding:12px 28px;border-radius:14px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .home-btn:hover{background:var(--green-light)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="screen-intro" class="screen active">
  <div><div class="badge">Formation Officine</div>
  <h1>Vaccination<br><span>Femme Enceinte – Difficile</span></h1></div>
  <p>Situations complexes : vaccination tardive, varicelle en grossesse, leptospirose, interférence anticorps maternels.</p>
  <div class="intro-stats">
    <div class="stat-pill"><strong>12</strong><span>questions</span></div>
    <div class="stat-pill"><strong>QCM</strong><span>format</span></div>
    <div class="stat-pill"><strong>~7 min</strong><span>durée</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Commencer →</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="progress-row">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label">1 / 12</span>
    <span class="score-badge" id="score-display">Score : 0</span>
  </div>
  <div class="question-card">
    <div class="q-meta">Question <span id="q-num">1</span> <em id="q-theme"></em></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="fb-title"></div>
      <div id="fb-body"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
</div>

<div id="screen-results" class="screen">
  <div class="result-circle" id="result-circle">
    <div class="result-inner">
      <div class="result-score" id="res-score">0/12</div>
      <div class="result-total" id="res-pct">0%</div>
    </div>
  </div>
  <h2 id="res-title"></h2>
  <p class="result-msg" id="res-msg"></p>
  <div class="review-list" id="review-list"></div>
  <div class="btn-row">
    <button class="retry-btn" onclick="restartQuiz()">🔄 Recommencer</button>
    <a class="home-btn" href="home.html">← Accueil</a>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    theme:"Coqueluche – timing",
    text:"Une femme est vaccinée contre la coqueluche à 38 SA (moins d'un mois avant l'accouchement). Que faut-il prévoir en complément ?",
    options:["Rien — la protection du nourrisson est assurée","Le cocooning de l'entourage est nécessaire car le délai est insuffisant pour un transfert optimal d'anticorps","Revacciner la mère à la maternité","Vacciner le nourrisson dès la naissance"],
    correct:1,
    explanation:"Un délai de <strong>moins d'un mois</strong> entre la vaccination maternelle et l'accouchement est insuffisant pour un transfert transplacentaire optimal d'anticorps. Dans ce cas, le <strong>cocooning de l'entourage</strong> est nécessaire : toute personne en contact proche avec le nourrisson dont la dernière vaccination coqueluche remonte à plus de 5 ans doit recevoir un rappel. La mère peut également être revaccinée en post-partum."
  },
  {
    theme:"Maternité",
    text:"Quels vaccins doit-on vérifier systématiquement en maternité chez une femme non à jour ?",
    options:["Grippe et HPV","Coqueluche et ROR","Hépatite A et hépatite B","Pneumocoque et zona"],
    correct:1,
    explanation:"En maternité, deux vaccins sont à vérifier systématiquement : la <strong>coqueluche</strong> (si non vaccinée pendant la grossesse — vacciner avant la sortie, même si allaitement) et le <strong>ROR</strong> (si non immunisée contre rougeole, oreillons ou rubéole — vacciner en post-partum immédiat, avec contraception un mois après). C'est une opportunité vaccinale à ne pas manquer."
  },
  {
    theme:"Varicelle",
    text:"Pourquoi la varicelle est-elle particulièrement surveillée chez les professionnelles de santé en age de procréer ?",
    options:["Parce qu'elle est bénigne chez l'adulte","Risque élevé de complications graves chez l'adulte et risque de transmission nosocomiale aux femmes enceintes hospitalisées","Parce qu'elle est rare","Parce qu'elle n'est pas contagieuse après l'éruption"],
    correct:1,
    explanation:"La varicelle est <strong>plus grave chez l'adulte</strong> que chez l'enfant (pneumonie varicelleuse, encéphalite) et représente un <strong>risque majeur pendant la grossesse</strong> (varicelle congénitale, varicelle néonatale). Les soignantes non immunisées représentent un risque de transmission nosocomiale aux femmes enceintes hospitalisées — d'où l'importance de vérifier le statut immunitaire et de vacciner avant toute grossesse."
  },
  {
    theme:"Varicelle",
    text:"Une femme enceinte non immunisée contre la varicelle est en contact avec un cas confirmé. Quelle est la conduite à tenir ?",
    options:["Vaccination immédiate contre la varicelle","Évaluation spécialisée : vérification sérologique si nécessaire et prise en charge adaptée (immunoglobulines en urgence selon le délai)","Aucun risque — la varicelle est bénigne","Antibiothérapie préventive"],
    correct:1,
    explanation:"Face à ce contact à risque, une <strong>évaluation spécialisée urgente</strong> s'impose. La vaccination est contre-indiquée pendant la grossesse. Selon le délai depuis le contact, des <strong>immunoglobulines spécifiques anti-varicelle</strong> peuvent être administrées (dans les 96h), voire un traitement antiviral (aciclovir) si la varicelle se déclare. Orienter rapidement vers le médecin ou la maternité."
  },
  {
    theme:"Leptospirose",
    text:"Concernant le vaccin leptospirose (Spirolept®) chez la femme enceinte exposée professionnellement :",
    options:["Il est recommandé sans restriction pendant la grossesse","Il est généralement déconseillé par manque de données chez la femme enceinte — évaluation bénéfice/risque au cas par cas","Il est obligatoire pour les femmes enceintes exposées","Il est totalement inefficace pendant la grossesse"],
    correct:1,
    explanation:"Spirolept® est un <strong>vaccin inactivé</strong>, mais son utilisation pendant la grossesse est <strong>généralement déconseillée</strong> en raison de l'<strong>absence de données cliniques</strong> sur son utilisation chez la femme enceinte (aucune étude de toxicité de la reproduction n'a été réalisée). Le RCP mentionne : « ne doit généralement pas être utilisé pendant la grossesse ». Une évaluation du rapport bénéfice/risque est nécessaire au cas par cas, notamment si l'exposition professionnelle est élevée."
  },
  {
    theme:"Immunité naturelle",
    text:"Une mère a eu la coqueluche il y a 3 ans. Ses anticorps naturels protègent-ils suffisamment son futur nourrisson ?",
    options:["Oui, l'immunité naturelle est totalement protectrice pour le nourrisson","Non — les anticorps naturels sont insuffisants pour assurer une protection passive du nourrisson : la vaccination pendant la grossesse reste recommandée","Oui, mais uniquement pendant les 2 premières semaines","Oui, si la maladie était documentée biologiquement"],
    correct:1,
    explanation:"Même si la mère a eu la coqueluche, les <strong>anticorps naturels résiduels</strong> sont insuffisants pour assurer une protection passive efficace du nourrisson. La <strong>vaccination pendant la grossesse reste recommandée</strong> à chaque grossesse, quel que soit l'antécédent de coqueluche naturelle ou de vaccination antérieure. Seul le vaccin administré entre 20 et 36 SA garantit un taux d'anticorps suffisant pour le transfert transplacentaire."
  },
  {
    theme:"Coqueluche – timing",
    text:"Pourquoi la vaccination coqueluche est-elle recommandée entre 20 et 36 SA précisément ?",
    options:["Pour réduire les effets secondaires maternels","Pour optimiser le transfert transplacentaire d'anticorps au fœtus avant l'accouchement","Pour simplifier le calendrier de suivi obstétrical","Pour éviter un rappel ultérieur"],
    correct:1,
    explanation:"La fenêtre 20-36 SA est optimale pour deux raisons : d'une part, le <strong>transfert transplacentaire des IgG</strong> est maximal au 3ème trimestre (le fœtus accumule les anticorps maternels surtout après 28 SA) ; d'autre part, vacciner à 36 SA ou plus laisse <strong>moins d'un mois</strong> avant l'accouchement, ce qui est insuffisant pour obtenir un pic d'anticorps optimal chez la mère."
  },
  {
    theme:"Coqueluche – revaccination",
    text:"Une femme a été vaccinée contre la coqueluche il y a 2 ans lors d'une précédente grossesse. Doit-elle être revaccinée pendant cette nouvelle grossesse ?",
    options:["Non, la protection est encore suffisante","Oui — la revaccination est recommandée à chaque grossesse pour garantir un taux d'anticorps suffisant pour le transfert transplacentaire","Non, seulement si plus de 5 ans se sont écoulés","Oui, mais uniquement si elle allaite"],
    correct:1,
    explanation:"La vaccination coqueluche doit être réalisée à <strong>chaque grossesse</strong>, même si la mère a été vaccinée récemment. La raison : même après une vaccination récente, le taux d'anticorps maternels peut être insuffisant pour assurer un <strong>transfert transplacentaire protecteur</strong> pour le nourrisson. Seule une vaccination pendant la grossesse en cours garantit un taux d'anticorps optimal au moment du transfert."
  },
  {
    theme:"Immunité maternelle",
    text:"Les anticorps maternels transmis au nourrisson peuvent-ils interférer avec sa propre vaccination ?",
    options:["Non, ils n'ont aucun effet sur la réponse vaccinale du nourrisson","Oui, ils peuvent diminuer la réponse initiale à certains vaccins du nourrisson, notamment pour le ROR avant 12 mois","Oui, ils bloquent définitivement la réponse immune du nourrisson","Non, car ils sont éliminés avant le début de la vaccination"],
    correct:1,
    explanation:"Les anticorps maternels peuvent <strong>diminuer la réponse initiale à certains vaccins</strong>, en particulier le ROR. C'est pourquoi le ROR n'est pas administré avant 12 mois : les anticorps maternels anti-rougeole résiduels peuvent neutraliser le virus vaccinal atténué et réduire l'efficacité. Cette interférence n'est pas définitive — elle explique le schéma vaccinal progressif du nourrisson."
  },
  {
    theme:"VRS – stratégie",
    text:"Un parent vous demande s'il faut combiner la vaccination maternelle (Abrysvo®) ET le nirsévimab pour le nourrisson. Que lui répondez-vous ?",
    options:["Oui, les deux stratégies doivent toujours être combinées","Une seule stratégie suffit généralement — les deux ne sont pas combinées en routine","Non, seul le nirsévimab est efficace","Non, seule la vaccination maternelle est recommandée"],
    correct:1,
    explanation:"Les deux stratégies sont disponibles mais <strong>généralement pas combinées en routine</strong> : soit la mère est vaccinée pendant la grossesse (Abrysvo® entre 32-36 SA), soit le nourrisson reçoit le nirsévimab à la naissance ou en début de saison épidémique. Le choix dépend de la situation (statut vaccinal maternel, terme, période épidémique). La double stratégie peut être discutée dans certains cas à risque élevé."
  },
  {
    theme:"Coqueluche – adulte",
    text:"Pourquoi la vaccination coqueluche des adultes de l'entourage est-elle essentielle pour protéger le nourrisson ?",
    options:["Parce que la coqueluche est une maladie grave chez l'adulte","Parce que les adultes constituent le principal réservoir de transmission de la coqueluche vers le nourrisson","Parce que le vaccin est obligatoire pour les adultes","Parce que le vaccin confère une protection de longue durée chez l'adulte"],
    correct:1,
    explanation:"Les adultes sont le <strong>principal réservoir de transmission</strong> de la coqueluche vers les nourrissons. Chez l'adulte, la coqueluche se manifeste souvent par une toux banale prolongée, sans le tableau typique du nourrisson — ce qui retarde le diagnostic et favorise la transmission. Vacciner l'entourage adulte (cocooning) réduit directement le risque d'exposition du nourrisson pendant ses premières semaines de vie."
  },
  {
    theme:"Cocooning – objectif",
    text:"Un parent vous demande pourquoi ses parents âgés devraient se faire vacciner contre la coqueluche avant la naissance du bébé, alors qu'ils ont été vaccinés enfants. Que lui expliquez-vous ?",
    options:["Pour protéger les grands-parents eux-mêmes contre une forme grave","Pour réduire le risque de transmission de la coqueluche au nourrisson, car l'immunité vaccinale s'estompe après 5 à 10 ans","Pour respecter une obligation légale","Pour remplacer la vaccination maternelle insuffisante"],
    correct:1,
    explanation:"L'objectif du cocooning est de <strong>réduire le risque de transmission au nourrisson</strong>. L'immunité vaccinale contre la coqueluche dure <strong>5 à 10 ans</strong> : des personnes vaccinées dans l'enfance ou il y a plus de 5 ans peuvent être porteuses et transmettre la bactérie sans le savoir. Un rappel dTcaP est recommandé si la dernière vaccination remonte à plus de 5 ans (contexte épidémique actuel), quel que soit l'âge."
  }
];

let current=0,score=0,userAnswers=[];
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function startQuiz(){current=0;score=0;userAnswers=[];showScreen('screen-quiz');renderQuestion()}
function renderQuestion(){
  const q=QUESTIONS[current],total=QUESTIONS.length;
  document.getElementById('progress-bar').style.width=((current/total)*100)+'%';
  document.getElementById('progress-label').textContent=`${current+1} / ${total}`;
  document.getElementById('score-display').textContent=`Score : ${score}`;
  document.getElementById('q-num').textContent=current+1;
  document.getElementById('q-theme').textContent=q.theme;
  document.getElementById('q-text').textContent=q.text;
  const grid=document.getElementById('options-grid');grid.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="opt-letter">${l}</span><span>${q.options[i]}</span>`;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('next-btn').className='next-btn';
}
function selectAnswer(chosen){
  const q=QUESTIONS[current];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const ok=chosen===q.correct;if(ok)score++;userAnswers[current]=chosen;
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{if(i===q.correct)btn.classList.add('correct');else if(i===chosen&&!ok)btn.classList.add('wrong');else btn.classList.add('dimmed')});
  const fb=document.getElementById('feedback-box');
  document.getElementById('fb-title').textContent=ok?'✓ Bonne réponse !':'✗ Pas tout à fait…';
  document.getElementById('fb-body').innerHTML=q.explanation;
  fb.className='feedback-box show '+(ok?'correct-fb':'wrong-fb');
  const nb=document.getElementById('next-btn');nb.className='next-btn show';
  nb.textContent=current<QUESTIONS.length-1?'Question suivante →':'Voir mes résultats →';
}
function nextQuestion(){current++;if(current>=QUESTIONS.length)showResults();else renderQuestion()}
function showResults(){
  showScreen('screen-results');
  const total=QUESTIONS.length,pct=Math.round((score/total)*100);
  document.getElementById('res-score').textContent=`${score}/${total}`;
  document.getElementById('res-pct').textContent=`${pct}%`;
  document.getElementById('result-circle').style.setProperty('--pct',pct+'%');
  const t=['🔁 À retravailler','📚 Des lacunes à combler','👍 Très bon niveau','🏆 Expertise confirmée !'];
  const m=['Ce niveau requiert une révision approfondie. Recommencez après révision du cours.','Niveau intermédiaire. Certaines situations complexes méritent une révision.','Très bonne maîtrise. Relisez les points manqués.','Parfait. Vous maîtrisez les situations vaccinales complexes de la période périnatale.'];
  const idx=pct===100?3:pct>=75?2:pct>=50?1:0;
  document.getElementById('res-title').textContent=t[idx];document.getElementById('res-msg').textContent=m[idx];
  const list=document.getElementById('review-list');list.innerHTML='';
  QUESTIONS.forEach((q,i)=>{const ok=userAnswers[i]===q.correct;const item=document.createElement('div');item.className='review-item';item.innerHTML=`<span class="review-icon">${ok?'✅':'❌'}</span><div><div class="review-q">${q.text}</div>${!ok?`<div class="review-ans">Bonne réponse : <strong>${q.options[q.correct]}</strong></div>`:''}</div>`;list.appendChild(item)});
}
function restartQuiz(){startQuiz()}
</script>
</body>
