<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Allergies Saisonnières – Formation Officine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a9e6e;
    --green-dark: #0f7a53;
    --green-light: #e6f7f1;
    --red: #e84040;
    --red-light: #fdeaea;
    --bg: #f4f6f3;
    --card: #ffffff;
    --text: #1a1f1c;
    --muted: #6b7672;
    --border: #dde5e0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .screen { display: none; width: 100%; max-width: 680px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  #screen-intro { text-align: center; gap: 20px; }
  .badge {
    display: inline-block;
    background: var(--green);
    color: white;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 8px;
  }
  #screen-intro h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
  }
  #screen-intro h1 span { color: var(--green); }
  #screen-intro p { color: var(--muted); font-size: 1rem; max-width: 460px; }

  .intro-stats { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .stat-pill {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 22px;
    text-align: center;
    min-width: 100px;
  }
  .stat-pill strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--green);
  }
  .stat-pill span { font-size: 0.82rem; color: var(--muted); }

  .btn-start {
    background: var(--green);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    padding: 18px 48px;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(26,158,110,0.3);
  }
  .btn-start:hover { background: var(--green-dark); transform: translateY(-2px); }

  #screen-quiz { gap: 20px; }

  .progress-row { width: 100%; display: flex; align-items: center; gap: 12px; }
  .progress-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--green); border-radius: 100px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; font-weight: 500; }
  .score-badge { background: var(--green-light); color: var(--green-dark); font-size: 0.82rem; font-weight: 500; padding: 5px 12px; border-radius: 100px; white-space: nowrap; }

  .question-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    animation: fadeIn 0.3s ease;
  }

  .q-meta { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .q-meta em { background: var(--green-light); color: var(--green-dark); padding: 2px 8px; border-radius: 6px; font-style: normal; margin-left: 6px; }

  .question-text { font-family: 'Syne', sans-serif; font-size: clamp(1.05rem, 2.5vw, 1.22rem); font-weight: 700; line-height: 1.4; margin-bottom: 24px; }

  .options-grid { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    width: 100%;
    text-align: left;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 12px;
    line-height: 1.4;
  }
  .option-btn .opt-letter {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    background: white;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.78rem;
    color: var(--muted);
    transition: all 0.18s;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--green); background: var(--green-light); }
  .option-btn:hover:not(:disabled) .opt-letter { background: var(--green); border-color: var(--green); color: white; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { background: var(--green-light); border-color: var(--green); color: var(--green-dark); font-weight: 500; }
  .option-btn.correct .opt-letter { background: var(--green); border-color: var(--green); color: white; }
  .option-btn.wrong { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .option-btn.wrong .opt-letter { background: var(--red); border-color: var(--red); color: white; }
  .option-btn.dimmed { opacity: 0.45; }

  .feedback-box {
    margin-top: 20px; padding: 18px 20px; border-radius: 12px;
    font-size: 0.9rem; line-height: 1.6; display: none; animation: fadeIn 0.3s ease;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb { background: var(--green-light); border-left: 4px solid var(--green); color: #0f5c3c; }
  .feedback-box.wrong-fb { background: var(--red-light); border-left: 4px solid var(--red); color: #8c1a1a; }
  .feedback-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; margin-bottom: 5px; }

  .next-btn {
    width: 100%; background: var(--green); color: white;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    border: none; padding: 16px; border-radius: 12px; cursor: pointer;
    transition: background 0.2s; display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { background: var(--green-dark); }

  #screen-results { text-align: center; gap: 24px; }
  .result-circle {
    width: 140px; height: 140px; border-radius: 50%;
    background: conic-gradient(var(--green) 0%, var(--green) var(--pct), var(--border) var(--pct));
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .result-circle::before { content: ''; position: absolute; width: 110px; height: 110px; border-radius: 50%; background: white; }
  .result-inner { position: relative; z-index: 1; text-align: center; }
  .result-score { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--green); line-height: 1; }
  .result-total { font-size: 0.8rem; color: var(--muted); }
  #screen-results h2 { font-family: 'Syne', sans-serif; font-size: 1.7rem; font-weight: 800; }
  #screen-results .result-msg { color: var(--muted); max-width: 420px; font-size: 0.95rem; line-height: 1.6; }

  .review-list { width: 100%; display: flex; flex-direction: column; gap: 10px; text-align: left; }
  .review-item { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; font-size: 0.88rem; display: flex; gap: 12px; align-items: flex-start; line-height: 1.5; }
  .review-icon { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }
  .review-q { font-weight: 500; color: var(--text); }
  .review-ans { color: var(--muted); margin-top: 2px; }
  .review-ans strong { color: var(--green-dark); }

  .retry-btn {
    background: var(--green); color: white;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    border: none; padding: 16px 40px; border-radius: 14px; cursor: pointer;
    transition: background 0.2s; box-shadow: 0 4px 20px rgba(26,158,110,0.3);
  }
  .retry-btn:hover { background: var(--green-dark); }

  .home-btn {
    background: white; color: var(--green);
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    border: 1.5px solid var(--green); padding: 12px 28px; border-radius: 14px; cursor: pointer;
    transition: all 0.2s; text-decoration: none; display: inline-block;
  }
  .home-btn:hover { background: var(--green-light); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="screen-intro" class="screen active">
  <div>
    <div class="badge">Formation Officine</div>
    <h1>Allergies<br><span>Saisonnières</span></h1>
  </div>
  <p>Antihistaminiques, corticoïdes nasaux, contre-indications et orientation : testez votre conseil au comptoir.</p>
  <div class="intro-stats">
    <div class="stat-pill"><strong>12</strong><span>questions</span></div>
    <div class="stat-pill"><strong>QCM</strong><span>format</span></div>
    <div class="stat-pill"><strong>~5 min</strong><span>durée</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Commencer →</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="progress-row">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <span class="progress-label" id="progress-label">1 / 12</span>
    <span class="score-badge" id="score-display">Score : 0</span>
  </div>
  <div class="question-card" id="question-card">
    <div class="q-meta">Question <span id="q-num">1</span> <em id="q-theme">Généralités</em></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="fb-title"></div>
      <div id="fb-body"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
</div>

<div id="screen-results" class="screen">
  <div class="result-circle" id="result-circle">
    <div class="result-inner">
      <div class="result-score" id="res-score">0/12</div>
      <div class="result-total" id="res-pct">0%</div>
    </div>
  </div>
  <h2 id="res-title">Résultats</h2>
  <p class="result-msg" id="res-msg"></p>
  <div class="review-list" id="review-list"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="retry-btn" onclick="restartQuiz()">🔄 Recommencer</button>
    <a class="home-btn" href="index.html">← Accueil</a>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    theme: "Antihistaminiques",
    text: "Quelle est la différence principale entre un antihistaminique H1 de 1ère et de 2ème génération ?",
    options: [
      "La 2ème génération est plus efficace sur les symptômes nasaux",
      "La 1ère génération est sédative et anticholinergique, la 2ème est non sédative",
      "La 2ème génération agit plus vite mais dure moins longtemps",
      "La 1ère génération est réservée aux enfants"
    ],
    correct: 1,
    explanation: "Les H1 de <strong>1ère génération</strong> (dexchlorphéniramine, prométhazine…) traversent la barrière hémato-encéphalique : sédation marquée + effet anticholinergique (bouche sèche, rétention urinaire…). Les H1 de <strong>2ème génération</strong> (cétirizine, loratadine, bilastine…) ne la traversent pas (ou peu) : pas de somnolence significative, pas d'effet anticholinergique. Ce sont ceux à privilégier en conseil de premier recours."
  },
  {
    theme: "Antihistaminiques",
    text: "Un patient sous traitement au long cours demande un antihistaminique pour sa rhinite allergique printanière. Lequel conseillez-vous en priorité ?",
    options: [
      "Polaramine® (dexchlorphéniramine) — efficace et éprouvé",
      "Cétirizine 10 mg — non sédatif, prise unique quotidienne",
      "Prométhazine — bonne durée d'action",
      "Peu importe, tous les antihistaminiques sont équivalents"
    ],
    correct: 1,
    explanation: "La <strong>cétirizine</strong> (ou loratadine, bilastine) est le choix de référence en traitement continu : non sédatif, une prise par jour, bonne tolérance au long cours. Polaramine et prométhazine sont des H1 de 1ère génération : leur sédation les rend inadaptés à un usage quotidien prolongé, surtout chez un actif."
  },
  {
    theme: "Antihistaminiques",
    text: "La bilastine (Bilaska®, Inorial®) présente une particularité importante à communiquer au patient. Laquelle ?",
    options: [
      "Elle est contre-indiquée en cas d'insuffisance rénale",
      "Elle doit être prise à distance des repas (1h avant ou 2h après)",
      "Elle ne peut pas être associée aux corticoïdes nasaux",
      "Elle est réservée aux plus de 18 ans"
    ],
    correct: 1,
    explanation: "La <strong>bilastine</strong> a une biodisponibilité réduite de 30% si prise avec de la nourriture ou du jus de pamplemousse. Elle doit être prise <strong>à jeun</strong> : 1h avant ou 2h après un repas. C'est un point de conseil souvent oublié qui explique certains échecs thérapeutiques."
  },
  {
    theme: "Corticoïdes nasaux",
    text: "Pourquoi les corticoïdes nasaux sont-ils le traitement de fond de référence de la rhinite allergique persistante ?",
    options: [
      "Parce qu'ils agissent en 30 minutes sur tous les symptômes",
      "Parce qu'ils traitent l'inflammation sous-jacente avec un passage systémique négligeable",
      "Parce qu'ils peuvent remplacer les antihistaminiques sans délai",
      "Parce qu'ils sont les seuls à agir sur les symptômes oculaires"
    ],
    correct: 1,
    explanation: "Les corticoïdes nasaux (mométasone, fluticasone, budésonide…) agissent sur l'<strong>inflammation muqueuse</strong> en profondeur. Leur biodisponibilité systémique est très faible (<1% pour la mométasone), ce qui les rend très sûrs au long cours. Ils sont supérieurs aux antihistaminiques sur la congestion nasale, mais leur effet s'installe en <strong>48 à 72h</strong> — à anticiper."
  },
  {
    theme: "Corticoïdes nasaux",
    text: "Un patient débute un spray de mométasone. Il revient 2 jours plus tard en disant que « ça ne marche pas ». Quelle est votre réponse ?",
    options: [
      "Lui proposer de doubler la dose",
      "Lui expliquer que l'effet complet s'installe en 1 à 2 semaines et qu'il faut persévérer",
      "Lui substituer par un antihistaminique plus rapide",
      "Lui prescrire un bilan allergologique avant de continuer"
    ],
    correct: 1,
    explanation: "C'est un problème d'<strong>observance et d'attente</strong>. L'effet anti-inflammatoire des corticoïdes nasaux est progressif : efficacité partielle à 48-72h, <strong>efficacité maximale après 1 à 2 semaines</strong> de traitement régulier. Ce point doit être anticipé à la dispensation pour éviter l'arrêt prématuré."
  },
  {
    theme: "Corticoïdes nasaux",
    text: "Quelle est la technique d'instillation correcte d'un spray nasal corticoïde ?",
    options: [
      "Tête penchée en arrière, vaporiser vers le haut de la narine",
      "Tête légèrement penchée en avant, orienter le spray vers la paroi externe de la narine",
      "Tête droite, vaporiser au centre de la narine",
      "Technique libre, l'orientation n'a pas d'impact clinique"
    ],
    correct: 1,
    explanation: "La technique correcte : <strong>tête légèrement penchée en avant</strong>, orienter l'embout vers la <strong>paroi externe</strong> (vers l'oreille, pas vers la cloison nasale). Vaporiser vers la cloison favorise les épistaxis et l'irritation septale. C'est un conseil pratique concret à délivrer systématiquement, souvent ignoré des patients."
  },
  {
    theme: "Contre-indications",
    text: "Parmi ces patients, lequel nécessite le plus de précautions avant de délivrer un antihistaminique H1 de 1ère génération ?",
    options: [
      "Femme de 35 ans, sans antécédent, allergie aux graminées",
      "Homme de 70 ans, hypertrophie bénigne de la prostate",
      "Adolescent de 16 ans, rhinite allergique saisonnière",
      "Femme enceinte au 2ème trimestre"
    ],
    correct: 1,
    explanation: "L'<strong>hypertrophie bénigne de la prostate</strong> est une contre-indication aux H1 de 1ère génération : leur effet <strong>anticholinergique</strong> peut provoquer une rétention urinaire aiguë. À retenir également : glaucome à angle fermé, constipation sévère, troubles cognitifs chez le sujet âgé. Chez ce patient, orienter vers un H1 de 2ème génération."
  },
  {
    theme: "Contre-indications",
    text: "Une femme enceinte de 14 semaines vient pour une rhinite allergique. Que lui conseillez-vous ?",
    options: [
      "Cétirizine en priorité — bien documentée pendant la grossesse",
      "Loratadine en priorité — données rassurantes, recommandée en 1ère intention",
      "Éviter tout antihistaminique jusqu'à l'accouchement",
      "Mométasone nasale uniquement, les antihistaminiques oraux sont tous contre-indiqués"
    ],
    correct: 1,
    explanation: "La <strong>loratadine</strong> est l'antihistaminique oral le mieux documenté pendant la grossesse et est recommandée en 1ère intention par la plupart des référentiels. La cétirizine est également acceptable. Les corticoïdes nasaux (mométasone, budésonide) sont aussi utilisables localement. Dans tous les cas, orienter vers le médecin ou la sage-femme pour validation."
  },
  {
    theme: "Contre-indications",
    text: "Un patient sous inhibiteurs de la MAO (IMAO) demande un antihistaminique. Quelle est la précaution majeure ?",
    options: [
      "Les antihistaminiques H1 sont tous contre-indiqués avec les IMAO",
      "Les H1 de 1ère génération sont contre-indiqués — risque d'interactions sérotoninergiques et anticholinergiques",
      "Seule la cétirizine est autorisée avec les IMAO",
      "Il n'y a pas d'interaction connue entre IMAO et antihistaminiques"
    ],
    correct: 1,
    explanation: "Les H1 de <strong>1ère génération</strong> sont contre-indiqués avec les IMAO : risque d'interactions <strong>anticholinergiques et sérotoninergiques</strong> potentiellement sévères. Les H1 de 2ème génération (cétirizine, loratadine) sont utilisables avec prudence, mais une vérification des interactions et un avis médical restent recommandés chez ce type de patient."
  },
  {
    theme: "Orientation médecin",
    text: "Un patient traité depuis 3 semaines par antihistaminique + corticoïde nasal revient : ses symptômes sont toujours très invalidants. Que faites-vous ?",
    options: [
      "Doubler la dose du corticoïde nasal",
      "Ajouter un vasoconstricteur nasal pour déboucher",
      "Orienter vers le médecin pour bilan allergologique et éventuelle désensibilisation",
      "Changer d'antihistaminique en espérant un meilleur résultat"
    ],
    correct: 2,
    explanation: "Un échec d'un traitement bien conduit pendant 3 semaines doit orienter vers le <strong>médecin</strong> pour : confirmer le diagnostic, réaliser un <strong>bilan allergologique</strong> (tests cutanés, IgE spécifiques), et évaluer l'indication d'une <strong>immunothérapie allergénique (désensibilisation)</strong> — seul traitement modifiant le terrain allergique à long terme."
  },
  {
    theme: "Orientation médecin",
    text: "Lequel de ces signes doit vous amener à orienter immédiatement vers le médecin ?",
    options: [
      "Éternuements matinaux répétés pendant la saison pollinique",
      "Nez qui coule avec yeux rouges et larmoiements",
      "Sifflement respiratoire et gêne thoracique associés à la rhinite",
      "Légère fatigue pendant les pics polliniques"
    ],
    correct: 2,
    explanation: "<strong>Sifflements et gêne thoracique</strong> évoquent une atteinte des voies aériennes inférieures — possible <strong>asthme allergique</strong>. C'est un drapeau rouge absolu : orientation médicale sans délai. À retenir : 30% des rhinites allergiques non traitées évoluent vers l'asthme (concept de la « marche allergique »). Les autres signes décrits sont classiques de la rhinite saisonnière non compliquée."
  },
  {
    theme: "Conseil global",
    text: "Quelle association représente la prise en charge optimale d'une rhinite allergique saisonnière modérée à sévère ?",
    options: [
      "Antihistaminique H1 1ère génération + vasoconstricteur nasal",
      "Antihistaminique H1 2ème génération seul, en cure courte",
      "Antihistaminique H1 2ème génération + corticoïde nasal débuté avant la saison",
      "Corticoïde nasal seul, les antihistaminiques sont inutiles si corticoïde bien utilisé"
    ],
    correct: 2,
    explanation: "La combinaison de référence est <strong>antihistaminique H1 de 2ème génération + corticoïde nasal</strong>. Idéalement, le corticoïde nasal est débuté <strong>1 à 2 semaines avant le début de la saison pollinique</strong> pour que l'effet anti-inflammatoire soit installé à l'exposition. L'antihistaminique couvre les symptômes aigus (yeux, nez qui coule) pendant la montée en charge du corticoïde."
  }
];

let current = 0, score = 0, userAnswers = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  current = 0; score = 0; userAnswers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const total = QUESTIONS.length;
  document.getElementById('progress-bar').style.width = ((current / total) * 100) + '%';
  document.getElementById('progress-label').textContent = `${current + 1} / ${total}`;
  document.getElementById('score-display').textContent = `Score : ${score}`;
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('q-theme').textContent = q.theme;
  document.getElementById('q-text').textContent = q.text;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  ['A','B','C','D'].forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${l}</span><span>${q.options[i]}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('next-btn').className = 'next-btn';
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);
  const isCorrect = chosen === q.correct;
  if (isCorrect) score++;
  userAnswers[current] = chosen;

  buttons.forEach((btn, i) => {
    if (i === q.correct) btn.classList.add('correct');
    else if (i === chosen && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });

  const fb = document.getElementById('feedback-box');
  document.getElementById('fb-title').textContent = isCorrect ? '✓ Bonne réponse !' : '✗ Pas tout à fait…';
  document.getElementById('fb-body').innerHTML = q.explanation;
  fb.className = 'feedback-box show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');

  const nb = document.getElementById('next-btn');
  nb.className = 'next-btn show';
  nb.textContent = current < QUESTIONS.length - 1 ? 'Question suivante →' : 'Voir mes résultats →';
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) showResults();
  else renderQuestion();
}

function showResults() {
  showScreen('screen-results');
  const total = QUESTIONS.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('res-score').textContent = `${score}/${total}`;
  document.getElementById('res-pct').textContent = `${pct}%`;
  document.getElementById('result-circle').style.setProperty('--pct', pct + '%');

  const titles = ['🔁 À retravailler', '📚 Des lacunes à combler', '👍 Très bon niveau', '🏆 Expertise confirmée !'];
  const msgs = [
    'Les fondamentaux allergologie ne sont pas encore acquis. Recommencez après révision.',
    'Niveau intermédiaire. Certains points (technique d\'instillation, grossesse, IMAO) méritent une révision.',
    'Bonne maîtrise générale. Relisez les points manqués pour consolider.',
    'Résultat parfait. Votre conseil en allergologie saisonnière est solide.'
  ];
  const idx = pct === 100 ? 3 : pct >= 75 ? 2 : pct >= 50 ? 1 : 0;
  document.getElementById('res-title').textContent = titles[idx];
  document.getElementById('res-msg').textContent = msgs[idx];

  const list = document.getElementById('review-list');
  list.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const ok = userAnswers[i] === q.correct;
    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML = `
      <span class="review-icon">${ok ? '✅' : '❌'}</span>
      <div>
        <div class="review-q">${q.text}</div>
        ${!ok ? `<div class="review-ans">Bonne réponse : <strong>${q.options[q.correct]}</strong></div>` : ''}
      </div>`;
    list.appendChild(item);
  });
}

function restartQuiz() { startQuiz(); }
</script>
</body>
</html>
