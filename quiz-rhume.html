<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Rhume – Formation Officine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a9e6e;
    --green-dark: #0f7a53;
    --green-light: #e6f7f1;
    --red: #e84040;
    --red-light: #fdeaea;
    --gold: #f5a623;
    --bg: #f4f6f3;
    --card: #ffffff;
    --text: #1a1f1c;
    --muted: #6b7672;
    --border: #dde5e0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* ── SCREEN SYSTEM ── */
  .screen { display: none; width: 100%; max-width: 680px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ── INTRO ── */
  #screen-intro {
    text-align: center;
    gap: 20px;
  }
  .badge {
    display: inline-block;
    background: var(--green);
    color: white;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 8px;
  }
  #screen-intro h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
  }
  #screen-intro h1 span { color: var(--green); }
  #screen-intro p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 460px;
  }
  .intro-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 22px;
    text-align: center;
    min-width: 100px;
  }
  .stat-pill strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--green);
  }
  .stat-pill span { font-size: 0.82rem; color: var(--muted); }

  .btn-start {
    background: var(--green);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    padding: 18px 48px;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(26,158,110,0.3);
  }
  .btn-start:hover { background: var(--green-dark); transform: translateY(-2px); }

  /* ── QUIZ ── */
  #screen-quiz { gap: 20px; }

  .progress-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 100px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    font-size: 0.82rem;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 500;
  }

  .score-badge {
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 0.82rem;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 100px;
    white-space: nowrap;
  }

  .question-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .q-meta {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .q-meta em {
    background: var(--green-light);
    color: var(--green-dark);
    padding: 2px 8px;
    border-radius: 6px;
    font-style: normal;
    margin-left: 6px;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.05rem, 2.5vw, 1.22rem);
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 24px;
    color: var(--text);
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 12px;
    line-height: 1.4;
  }
  .option-btn .opt-letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: white;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--muted);
    transition: all 0.18s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--green);
    background: var(--green-light);
  }
  .option-btn:hover:not(:disabled) .opt-letter {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .option-btn:disabled { cursor: default; }

  .option-btn.correct {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green-dark);
    font-weight: 500;
  }
  .option-btn.correct .opt-letter {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .option-btn.wrong {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red);
  }
  .option-btn.wrong .opt-letter {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }
  .option-btn.dimmed { opacity: 0.45; }

  .feedback-box {
    margin-top: 20px;
    padding: 18px 20px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb {
    background: var(--green-light);
    border-left: 4px solid var(--green);
    color: #0f5c3c;
  }
  .feedback-box.wrong-fb {
    background: var(--red-light);
    border-left: 4px solid var(--red);
    color: #8c1a1a;
  }
  .feedback-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 5px;
  }
  .feedback-box strong { font-weight: 600; }

  .next-btn {
    width: 100%;
    background: var(--green);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    padding: 16px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { background: var(--green-dark); }

  /* ── RESULTS ── */
  #screen-results {
    text-align: center;
    gap: 24px;
  }
  .result-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: conic-gradient(var(--green) 0%, var(--green) var(--pct), var(--border) var(--pct));
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .result-circle::before {
    content: '';
    position: absolute;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: white;
  }
  .result-inner {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .result-score {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--green);
    line-height: 1;
  }
  .result-total {
    font-size: 0.8rem;
    color: var(--muted);
  }
  #screen-results h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.7rem;
    font-weight: 800;
  }
  #screen-results .result-msg {
    color: var(--muted);
    max-width: 420px;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .review-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
  }
  .review-item {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 0.88rem;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    line-height: 1.5;
  }
  .review-icon {
    flex-shrink: 0;
    font-size: 1rem;
    margin-top: 1px;
  }
  .review-q { font-weight: 500; color: var(--text); }
  .review-ans { color: var(--muted); margin-top: 2px; }
  .review-ans strong { color: var(--green-dark); }

  .retry-btn {
    background: var(--green);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    padding: 16px 40px;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 4px 20px rgba(26,158,110,0.3);
  }
  .retry-btn:hover { background: var(--green-dark); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .question-card { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<!-- ══════════ INTRO ══════════ -->
<div id="screen-intro" class="screen active">
  <div>
    <div class="badge">Formation Officine</div>
    <h1>Le Rhume<br><span>au Comptoir</span></h1>
  </div>
  <p>Testez vos connaissances sur la prise en charge du rhume : molécules, contre-indications, signaux d'alerte.</p>
  <div class="intro-stats">
    <div class="stat-pill"><strong>12</strong><span>questions</span></div>
    <div class="stat-pill"><strong>QCM</strong><span>format</span></div>
    <div class="stat-pill"><strong>~5 min</strong><span>durée</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Commencer →</button>
</div>

<!-- ══════════ QUIZ ══════════ -->
<div id="screen-quiz" class="screen">
  <div class="progress-row">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <span class="progress-label" id="progress-label">1 / 12</span>
    <span class="score-badge" id="score-display">Score : 0</span>
  </div>

  <div class="question-card" id="question-card">
    <div class="q-meta">Question <span id="q-num">1</span> <em id="q-theme">Généralités</em></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="fb-title"></div>
      <div id="fb-body"></div>
    </div>
  </div>

  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
</div>

<!-- ══════════ RESULTS ══════════ -->
<div id="screen-results" class="screen">
  <div class="result-circle" id="result-circle">
    <div class="result-inner">
      <div class="result-score" id="res-score">0/12</div>
      <div class="result-total" id="res-pct">0%</div>
    </div>
  </div>
  <h2 id="res-title">Résultats</h2>
  <p class="result-msg" id="res-msg"></p>
  <div class="review-list" id="review-list"></div>
  <button class="retry-btn" onclick="restartQuiz()">🔄 Recommencer</button>
</div>

<script>
const QUESTIONS = [
  {
    theme: "Généralités",
    text: "Quelle est la durée habituelle d'un rhume banal non compliqué ?",
    options: ["2 à 4 jours", "7 à 10 jours", "12 à 15 jours", "Variable selon l'antiviral prescrit"],
    correct: 1,
    explanation: "<strong>7 à 10 jours</strong>, sans traitement spécifique. Le traitement est purement symptomatique : on n'agit pas sur le virus, on attend la guérison naturelle tout en améliorant le confort du patient."
  },
  {
    theme: "Acte thérapeutique",
    text: "Pourquoi le lavage de nez est-il considéré comme l'acte thérapeutique majeur du rhume ?",
    options: [
      "Il détruit les virus directement",
      "Il évacue le mucus chargé de pathogènes et prépare la muqueuse aux traitements",
      "Il réduit la fièvre par effet réflexe",
      "Il stimule la réponse immunitaire locale"
    ],
    correct: 1,
    explanation: "<strong>« On ne traite pas une muqueuse sale. »</strong> Le mucus stagnant constitue un milieu de culture pour les pathogènes et crée une barrière physique. L'éliminer mécanique­ment est la base de toute prise en charge, et conditionne l'efficacité des sprays locaux."
  },
  {
    theme: "Eau de mer",
    text: "Un patient se plaint d'un nez \"complètement bouché\". Quelle eau de mer lui conseillez-vous en priorité ?",
    options: [
      "Isotonique, pour ne pas agresser la muqueuse",
      "Hypertonique, pour son effet décongestionnant osmotique",
      "L'une ou l'autre, la différence est négligeable",
      "Aucune, il faut d'abord un vasoconstricteur"
    ],
    correct: 1,
    explanation: "<strong>Hypertonique</strong> en cas de congestion. Sa concentration en sel crée un appel d'eau par osmose, ce qui dégonfle naturellement la muqueuse. L'isotonique reste adapté à l'entretien quotidien ou chez les enfants et nourrissons."
  },
  {
    theme: "Vasoconstricteurs",
    text: "Parmi ces profils, lequel peut recevoir un vasoconstricteur nasal (ex. Aturgyl) ?",
    options: [
      "Femme enceinte de 6 mois avec rhume sévère",
      "Homme de 40 ans, normotendu, sans antécédent particulier",
      "Enfant de 12 ans avec rhume depuis 3 jours",
      "Patient hypertendu bien équilibré sous traitement"
    ],
    correct: 1,
    explanation: "Les 3 contre-indications <strong>absolues</strong> des vasoconstricteurs sont : l'<strong>âge < 15 ans</strong>, l'<strong>hypertension artérielle</strong> (même traitée et équilibrée) et la <strong>grossesse</strong>. Risque d'AVC ou d'infarctus (recommandation ANSM). Seul le profil de l'homme normotendu de 40 ans est éligible."
  },
  {
    theme: "Vasoconstricteurs",
    text: "Quelle est la durée maximale d'utilisation d'un spray vasoconstricteur nasal ?",
    options: ["3 jours", "5 jours", "7 jours", "10 jours"],
    correct: 1,
    explanation: "<strong>5 jours maximum.</strong> Au-delà, on risque la <em>rhinite médicamenteuse</em> (ou effet rebond) : la muqueuse devient dépendante du produit et le nez reste bouché dès l'arrêt. C'est un point de conseil systématique à délivrer lors de la dispensation."
  },
  {
    theme: "Antihistaminiques",
    text: "Dans les spécialités rhume (Actifed, Fervex…), quel effet de l'antihistaminique H1 est réellement exploité ?",
    options: [
      "L'effet anti-allergique pour calmer l'inflammation",
      "L'effet antihistaminique pur qui réduit la rhinorrhée",
      "L'effet anticholinergique qui assèche les sécrétions",
      "L'effet antipyrétique qui potentialise le paracétamol"
    ],
    correct: 2,
    explanation: "C'est l'<strong>effet anticholinergique</strong> (effet secondaire classique des H1 de 1ère génération) qui est ici recherché : il réduit les sécrétions nasales. Conséquence : <strong>somnolence marquée</strong>. À conseiller plutôt pour la prise du soir, et à signaler explicitement au patient."
  },
  {
    theme: "Sécurité / Associations",
    text: "Un patient achète une boîte de Fervex. Quel risque devez-vous systématiquement vérifier ?",
    options: [
      "Une interaction avec les AINS qu'il prendrait à côté",
      "Un surdosage en paracétamol si prise concomitante d'un autre antalgique",
      "Un risque de dépendance aux antihistaminiques",
      "Une interaction avec les antibiotiques en cours"
    ],
    correct: 1,
    explanation: "Les spécialités « rhume » (Fervex, Actifed…) contiennent souvent <strong>500 mg à 1 g de paracétamol</strong> par prise. Si le patient prend en parallèle du Doliprane, un Efferalgan ou un autre AINS contenant du paracétamol, le seuil hépatotoxique peut être atteint rapidement. Vérification systématique obligatoire."
  },
  {
    theme: "Corticoïdes locaux",
    text: "Pourquoi la mométasone (Nasonex®) est-elle peu pertinente dans le rhume viral aigu ?",
    options: [
      "Elle est trop puissante et risque de provoquer une immunodépression locale",
      "Son pic d'efficacité est atteint en 24 à 48h, souvent après la résolution du rhume",
      "Elle est contre-indiquée en cas d'infection virale active",
      "Elle interagit avec les vasoconstricteurs"
    ],
    correct: 1,
    explanation: "La mométasone est une molécule de <strong>fond</strong> dont l'effet maximal s'installe en <strong>24 à 48 heures</strong>. Sur un rhume de 3 jours, elle commence à agir au moment où le patient guérit naturellement. Le <strong>Pivalone</strong> (liste I) est plus cohérent : action locale et quasi-immédiate."
  },
  {
    theme: "Pédiatrie",
    text: "Parents d'un enfant de 4 ans avec nez bouché. Que leur conseillez-vous ?",
    options: [
      "Aturgyl pédiatrique en spray, demi-dose",
      "Actifed sirop, en respectant le dosage poids",
      "Lavages au sérum physiologique intensifs + paracétamol si fièvre",
      "Huile essentielle d'eucalyptol en inhalation"
    ],
    correct: 2,
    explanation: "Chez l'enfant <strong>< 6 ans</strong>, les décongestionnants (oraux ou nasaux) et les produits à base de terpènes (eucalyptol, camphre) sont <strong>strictement contre-indiqués</strong>. La prise en charge repose exclusivement sur les lavages nasaux au sérum physiologique, l'hydratation et le paracétamol si nécessaire."
  },
  {
    theme: "Huiles essentielles",
    text: "Concernant les produits à base d'eucalyptol ou de camphre (baumes, inhalations), quelle contre-indication est souvent sous-estimée ?",
    options: [
      "Hypertension artérielle",
      "Diabète de type 2",
      "Antécédents de convulsions ou épilepsie",
      "Insuffisance rénale légère"
    ],
    correct: 2,
    explanation: "L'eucalyptol, le camphre et les terpènes apparentés sont <strong>neurotoxiques</strong> à doses élevées et peuvent abaisser le seuil épileptogène. Ils sont contre-indiqués chez les patients avec <strong>antécédents de convulsions ou d'épilepsie</strong>, et également chez les asthmatiques (bronchospasme possible)."
  },
  {
    theme: "Orientation",
    text: "Lequel de ces signes doit vous orienter vers un médecin sans délai ?",
    options: [
      "Rhume depuis 5 jours avec nez qui coule",
      "Légère fatigue et éternuements fréquents",
      "Douleur unilatérale intense sous l'orbite depuis 48h",
      "Gorge légèrement irritée sans fièvre"
    ],
    correct: 2,
    explanation: "Une <strong>douleur unilatérale intense sous l'œil</strong> évoque une <strong>sinusite maxillaire</strong> (possible surinfection bactérienne). Les autres drapeaux rouges à mémoriser : fièvre > 39 °C persistante au-delà de 48h, gêne respiratoire, sibilants, ou symptômes persistant au-delà de <strong>10 jours</strong>."
  },
  {
    theme: "Conseil global",
    text: "Un patient demande le conseil le plus efficace pour soulager son rhume rapidement. Que lui proposez-vous en priorité absolue ?",
    options: [
      "Un vasoconstricteur nasal pour désengorger immédiatement",
      "Un antihistaminique H1 pour stopper la rhinorrhée",
      "Des lavages nasaux fréquents à l'eau hypertonique",
      "Un corticoïde local pour réduire l'inflammation"
    ],
    correct: 2,
    explanation: "Le <strong>lavage nasal hypertonique fréquent</strong> reste la pierre angulaire : sans risque, sans contre-indication majeure, efficace, et prépare la muqueuse à tout traitement complémentaire. C'est le message de conseil prioritaire à délivrer systématiquement."
  }
];

let current = 0;
let score = 0;
let answered = [];
let userAnswers = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  current = 0; score = 0; answered = []; userAnswers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const total = QUESTIONS.length;

  document.getElementById('progress-bar').style.width = ((current / total) * 100) + '%';
  document.getElementById('progress-label').textContent = `${current + 1} / ${total}`;
  document.getElementById('score-display').textContent = `Score : ${score}`;
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('q-theme').textContent = q.theme;
  document.getElementById('q-text').textContent = q.text;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  document.getElementById('next-btn').className = 'next-btn';
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = chosen === q.correct;
  if (isCorrect) score++;
  userAnswers[current] = chosen;

  buttons.forEach((btn, i) => {
    if (i === q.correct) btn.classList.add('correct');
    else if (i === chosen && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });

  const fb = document.getElementById('feedback-box');
  const fbTitle = document.getElementById('fb-title');
  const fbBody = document.getElementById('fb-body');

  if (isCorrect) {
    fb.className = 'feedback-box correct-fb show';
    fbTitle.textContent = '✓ Bonne réponse !';
  } else {
    fb.className = 'feedback-box wrong-fb show';
    fbTitle.textContent = '✗ Pas tout à fait…';
  }
  fbBody.innerHTML = q.explanation;

  document.getElementById('next-btn').className = 'next-btn show';
  document.getElementById('next-btn').textContent =
    current < QUESTIONS.length - 1 ? 'Question suivante →' : 'Voir mes résultats →';
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  showScreen('screen-results');
  const total = QUESTIONS.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('res-score').textContent = `${score}/${total}`;
  document.getElementById('res-pct').textContent = `${pct}%`;
  document.getElementById('result-circle').style.setProperty('--pct', pct + '%');

  let title, msg;
  if (pct === 100) {
    title = '🏆 Expertise confirmée !';
    msg = 'Résultat parfait. Vous maîtrisez la prise en charge du rhume au comptoir. Votre conseil est solide.';
  } else if (pct >= 75) {
    title = '👍 Très bon niveau';
    msg = 'Bonne maîtrise générale. Relisez les points manqués ci-dessous pour consolider.';
  } else if (pct >= 50) {
    title = '📚 Des lacunes à combler';
    msg = 'Niveau intermédiaire. Certains points clés (CI des vasoconstricteurs, pédiatrie) méritent une révision.';
  } else {
    title = '🔁 À retravailler';
    msg = 'Les fondamentaux ne sont pas encore acquis. Recommencez après avoir relu le référentiel.';
  }
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-msg').textContent = msg;

  const list = document.getElementById('review-list');
  list.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const isOk = userAnswers[i] === q.correct;
    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML = `
      <span class="review-icon">${isOk ? '✅' : '❌'}</span>
      <div>
        <div class="review-q">${q.text}</div>
        ${!isOk ? `<div class="review-ans">Bonne réponse : <strong>${q.options[q.correct]}</strong></div>` : ''}
      </div>`;
    list.appendChild(item);
  });
}

function restartQuiz() {
  startQuiz();
}
</script>
